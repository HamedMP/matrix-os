<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f7de1"/>
      <stop offset="0.5" stop-color="#5f9fe6"/>
      <stop offset="0.82" stop-color="#a8d4f0"/>
      <stop offset="1" stop-color="#c2e2f5"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7ec44c"/>
      <stop offset="0.3" stop-color="#6db33f"/>
      <stop offset="0.7" stop-color="#55a035"/>
      <stop offset="1" stop-color="#3e8b2f"/>
    </linearGradient>
    <linearGradient id="grassFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9ccb78"/>
      <stop offset="1" stop-color="#63a545"/>
    </linearGradient>
    <filter id="cloudSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="cloudSofter" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <clipPath id="mainHill">
      <path d="M -10 1080 L -10 905 C 220 850 450 745 730 690 C 960 645 1170 640 1360 705 C 1560 775 1760 835 1930 865 L 1930 1080 Z"/>
    </clipPath>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- distant haze at the horizon -->
  <ellipse cx="960" cy="700" rx="1200" ry="140" fill="#d8ecf8" opacity="0.45" filter="url(#cloudSofter)"/>

  <!-- cumulus clouds -->
  <g fill="#ffffff">
    <g filter="url(#cloudSoft)" opacity="0.95">
      <ellipse cx="330" cy="215" rx="95" ry="42"/>
      <ellipse cx="445" cy="185" rx="115" ry="55"/>
      <ellipse cx="560" cy="222" rx="100" ry="44"/>
      <ellipse cx="450" cy="245" rx="170" ry="36"/>
    </g>
    <g filter="url(#cloudSoft)" opacity="0.85">
      <ellipse cx="1360" cy="300" rx="90" ry="36"/>
      <ellipse cx="1465" cy="275" rx="105" ry="46"/>
      <ellipse cx="1570" cy="305" rx="85" ry="34"/>
      <ellipse cx="1465" cy="322" rx="150" ry="28"/>
    </g>
    <g filter="url(#cloudSofter)" opacity="0.7">
      <ellipse cx="950" cy="150" rx="120" ry="30"/>
      <ellipse cx="1040" cy="132" rx="80" ry="26"/>
      <ellipse cx="820" cy="420" rx="60" ry="16"/>
    </g>
    <g filter="url(#cloudSofter)" opacity="0.55">
      <ellipse cx="1790" cy="180" rx="95" ry="24"/>
      <ellipse cx="120" cy="430" rx="70" ry="18"/>
    </g>
  </g>

  <!-- gentle far hill on the right -->
  <path fill="url(#grassFar)" opacity="0.9"
    d="M 1050 1080 L 1050 800 C 1180 720 1330 668 1480 662 C 1650 655 1810 700 1930 748 L 1930 1080 Z"/>

  <!-- main rolling hill sweeping from the lower left -->
  <path fill="url(#grass)"
    d="M -10 1080 L -10 905 C 220 850 450 745 730 690 C 960 645 1170 640 1360 705 C 1560 775 1760 835 1930 865 L 1930 1080 Z"/>

  <!-- soft sunlight on the crest (clipped to the hill so it never bleeds into the sky) -->
  <ellipse cx="900" cy="730" rx="520" ry="110" fill="#b7e08a" opacity="0.35" filter="url(#cloudSofter)" clip-path="url(#mainHill)"/>
</svg>
