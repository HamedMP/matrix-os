<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tetris</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:var(--matrix-bg,#f5f5f7);
  --fg:var(--matrix-fg,#1d1d1f);
  --accent:var(--matrix-accent,#007aff);
  --surface:var(--matrix-card-bg,#ffffff);
  --border:var(--matrix-border,#d2d2d7);
  --muted:var(--matrix-muted-fg,#86868b);
}
body{background:var(--bg);color:var(--fg);font-family:var(--matrix-font-sans,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif);display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;user-select:none}
.back{position:fixed;top:12px;left:12px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:18px;cursor:pointer;text-decoration:none;z-index:20;transition:background .15s,color .15s}
.back:hover{background:var(--border);color:var(--fg)}
.game-wrap{display:flex;gap:20px;align-items:flex-start}
canvas#board{border:2px solid var(--border);border-radius:4px;background:var(--surface)}
.side{display:flex;flex-direction:column;gap:14px;width:120px}
.box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center}
.box .lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:4px}
.box .val{font-size:20px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
.box .val.hi{font-size:12px;color:var(--muted);margin-top:2px}
canvas.preview{background:var(--surface);border-radius:4px;display:block;margin:6px auto 0}
.overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:color-mix(in srgb,var(--bg) 85%,transparent);z-index:10;backdrop-filter:blur(8px)}
.overlay h1{font-size:32px;margin-bottom:6px;color:var(--accent);letter-spacing:2px}
.overlay .sub{font-size:15px;color:var(--muted);margin-bottom:20px}
.overlay button{padding:12px 36px;font-size:15px;background:var(--accent);color:var(--surface);border:none;border-radius:8px;cursor:pointer;font-weight:700;letter-spacing:.5px;transition:background .15s,transform .1s}
.overlay button:hover{background:color-mix(in srgb,var(--accent) 80%,black);transform:scale(1.03)}
.hidden{display:none!important}
.controls{margin-top:10px;font-size:10px;color:var(--muted);text-align:center;line-height:1.6}
.flash-overlay{position:fixed;inset:0;background:#fff;pointer-events:none;opacity:0;z-index:5;transition:opacity .15s}
</style>
</head>
<body>
<a class="back" href="../index.html" title="Back">&#8592;</a>
<div class="game-wrap">
  <div>
    <canvas id="board" width="240" height="480"></canvas>
    <div class="controls">Arrows/WASD: move &amp; rotate | Z: rotate CCW | Space: drop | C: hold</div>
  </div>
  <div class="side">
    <div class="box"><div class="lbl">Score</div><div class="val" id="score">0</div><div class="val hi" id="best"></div></div>
    <div class="box"><div class="lbl">Level</div><div class="val" id="level">1</div></div>
    <div class="box"><div class="lbl">Lines</div><div class="val" id="lines">0</div></div>
    <div class="box"><div class="lbl">Next</div><canvas class="preview" id="nextCanvas" width="96" height="80"></canvas></div>
    <div class="box"><div class="lbl">Hold</div><canvas class="preview" id="holdCanvas" width="96" height="80"></canvas></div>
  </div>
</div>
<div class="overlay" id="startScreen"><h1>TETRIS</h1><div class="sub">Classic block puzzle</div><button id="startBtn">Play</button></div>
<div class="overlay hidden" id="gameOverScreen"><h1>Game Over</h1><div class="sub" id="finalScore"></div><button id="restartBtn">Play Again</button></div>
<div class="flash-overlay" id="flashOverlay"></div>

<script>
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const nextCtx = document.getElementById('nextCanvas').getContext('2d');
const holdCtx = document.getElementById('holdCanvas').getContext('2d');
const flashEl = document.getElementById('flashOverlay');

const COLS = 10, ROWS = 20, B = 24;
const BRIDGE = window.location.origin + '/api/bridge/data';

const COLORS = { I:'#06d6e0', O:'#f5c842', T:'#b07af5', S:'#3de86a', Z:'#f04848', J:'#3b8bf5', L:'#f58a2e' };

// SRS piece definitions: 4 rotation states per piece (cells in a bounding box)
const PIECES = {
  I:[[[0,1],[1,1],[2,1],[3,1]],[[2,0],[2,1],[2,2],[2,3]],[[0,2],[1,2],[2,2],[3,2]],[[1,0],[1,1],[1,2],[1,3]]],
  O:[[[1,0],[2,0],[1,1],[2,1]],[[1,0],[2,0],[1,1],[2,1]],[[1,0],[2,0],[1,1],[2,1]],[[1,0],[2,0],[1,1],[2,1]]],
  T:[[[1,0],[0,1],[1,1],[2,1]],[[1,0],[1,1],[2,1],[1,2]],[[0,1],[1,1],[2,1],[1,2]],[[1,0],[0,1],[1,1],[1,2]]],
  S:[[[1,0],[2,0],[0,1],[1,1]],[[1,0],[1,1],[2,1],[2,2]],[[1,1],[2,1],[0,2],[1,2]],[[0,0],[0,1],[1,1],[1,2]]],
  Z:[[[0,0],[1,0],[1,1],[2,1]],[[2,0],[1,1],[2,1],[1,2]],[[0,1],[1,1],[1,2],[2,2]],[[1,0],[0,1],[1,1],[0,2]]],
  J:[[[0,0],[0,1],[1,1],[2,1]],[[1,0],[2,0],[1,1],[1,2]],[[0,1],[1,1],[2,1],[2,2]],[[1,0],[1,1],[0,2],[1,2]]],
  L:[[[2,0],[0,1],[1,1],[2,1]],[[1,0],[1,1],[1,2],[2,2]],[[0,1],[1,1],[2,1],[0,2]],[[0,0],[1,0],[1,1],[1,2]]]
};
const NAMES = ['I','O','T','S','Z','J','L'];

// SRS wall kick tables (CW). Offsets are (dx, dy) where +y is down on screen.
const KICK_JLSTZ=[
  [[0,0],[-1,0],[-1,-1],[0,2],[-1,2]],
  [[0,0],[1,0],[1,1],[0,-2],[1,-2]],
  [[0,0],[1,0],[1,-1],[0,2],[1,2]],
  [[0,0],[-1,0],[-1,1],[0,-2],[-1,-2]]
];
const KICK_I=[
  [[0,0],[-2,0],[1,0],[-2,-1],[1,2]],
  [[0,0],[-1,0],[2,0],[-1,2],[2,-1]],
  [[0,0],[2,0],[-1,0],[2,1],[-1,-2]],
  [[0,0],[1,0],[-2,0],[1,-2],[-2,1]]
];

// Read CSS custom properties for canvas drawing
function getThemeColors() {
  const s = getComputedStyle(document.documentElement);
  return {
    surface: s.getPropertyValue('--surface').trim() || '#ffffff',
    border: s.getPropertyValue('--border').trim() || '#d2d2d7',
    fg: s.getPropertyValue('--fg').trim() || '#1d1d1f',
    muted: s.getPropertyValue('--muted').trim() || '#86868b',
  };
}
let theme = { surface: '#ffffff', border: '#d2d2d7', fg: '#1d1d1f', muted: '#86868b' };

// Audio context (shared, created on first interaction)
let audioCtx = null;
function getAudio() { if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function sfx(freq,dur,type='square',vol=0.04) {
  try { const ac=getAudio(),o=ac.createOscillator(),g=ac.createGain(); o.type=type; o.frequency.value=freq; g.gain.value=vol; g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur); o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime+dur); } catch{}
}
function sfxMove(){sfx(220,0.04,'sine',0.03)} function sfxRotate(){sfx(330,0.06,'sine',0.04)}
function sfxDrop(){sfx(180,0.1,'triangle',0.06)} function sfxLock(){sfx(140,0.08,'square',0.03)}
function sfxClear(n){sfx(n===4?880:550,0.2,'sine',0.06);if(n===4)setTimeout(()=>sfx(1100,0.15,'sine',0.05),100)}
function sfxGameOver(){sfx(180,0.15,'sawtooth',0.05);setTimeout(()=>sfx(120,0.3,'sawtooth',0.04),150)}
function sfxLevelUp(){sfx(660,0.08,'sine',0.04);setTimeout(()=>sfx(880,0.12,'sine',0.05),80)}

// Game state
let grid, piece, pName, pRot, px, py, ghostY;
let bag, nextName, holdName, canHold;
let score, level, linesCleared, bestScore = 0;
let alive, animating;
let lockTimer, lockMoves, lockDelay = 500;
let lastGravity, dropInterval, rafId;
let particles = [], lockFlashCells = [], lockFlashTime = 0;
let lastFrameTime = 0;

// DAS state
const keys = {};
let dasDir = null, dasTimer = 0, dasAccum = 0;
const DAS_DELAY = 170, DAS_RATE = 50;

// 7-bag randomizer
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}
function fillBag(){bag=bag.concat(shuffle([...NAMES]))}
function pullPiece(){if(bag.length<7)fillBag();return bag.shift()}

function getCells(name,rot){return PIECES[name][rot]}
function valid(cs,ox,oy){
  for(const[cx,cy]of cs){const x=ox+cx,y=oy+cy;if(x<0||x>=COLS||y>=ROWS)return false;if(y>=0&&grid[y][x])return false}
  return true;
}

function calcGhost(){let gy=py;const cs=getCells(pName,pRot);while(valid(cs,px,gy+1))gy++;ghostY=gy}

function spawn(name){
  pName=name; pRot=0; piece=getCells(name,0);
  px=name==='O'?4:3; py=-1;
  canHold=true; lockTimer=0; lockMoves=0;
  calcGhost();
  if(!valid(piece,px,py)&&!valid(piece,px,py+1)){alive=false;sfxGameOver();endGame()}
}

function tryMove(dx,dy){
  if(valid(piece,px+dx,py+dy)){px+=dx;py+=dy;calcGhost();resetLockTimer();return true}
  return false;
}

function tryRotate(dir){
  const newRot=(pRot+(dir===1?1:3))%4;
  const newCells=getCells(pName,newRot);
  if(pName==='O'){if(valid(newCells,px,py)){pRot=newRot;piece=newCells;calcGhost();resetLockTimer();return true}return false}
  const table=pName==='I'?KICK_I:KICK_JLSTZ;
  let kicks;
  if(dir===1){kicks=table[pRot]}
  else{
    // CCW kicks: negate the CW kicks from target->source
    kicks=table[newRot].map(([kx,ky])=>[-kx,-ky]);
  }
  for(const[kx,ky]of kicks){
    if(valid(newCells,px+kx,py+ky)){
      px+=kx;py+=ky;pRot=newRot;piece=newCells;calcGhost();resetLockTimer();return true;
    }
  }
  return false;
}

function resetLockTimer(){if(py===ghostY&&lockMoves<15){lockTimer=0;lockMoves++}}

function lockPiece(){
  lockFlashCells=[];
  for(const[cx,cy]of piece){const x=px+cx,y=py+cy;if(y>=0){grid[y][x]=pName;lockFlashCells.push([x,y])}}
  lockFlashTime=performance.now();
  sfxLock();
  checkLines();
}

function checkLines(){
  const full=[];
  for(let r=0;r<ROWS;r++)if(grid[r].every(c=>c))full.push(r);
  if(full.length){
    animating=true;
    sfxClear(full.length);
    const pts=[0,100,300,500,800];
    const oldLevel=level;
    // Spawn particles before removing rows
    for(const r of full)for(let c=0;c<COLS;c++){
      const col=COLORS[grid[r][c]]||'#fff';
      for(let i=0;i<3;i++)particles.push({x:c*B+B/2,y:r*B+B/2,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*3-1,life:1,decay:0.015+Math.random()*0.015,color:col,size:2+Math.random()*2});
    }
    score+=(pts[full.length]||0)*level;
    linesCleared+=full.length;
    level=Math.floor(linesCleared/10)+1;
    dropInterval=getSpeed();
    updateUI();
    if(level>oldLevel){sfxLevelUp();flashScreen()}
    animateLineClear(full,0);
  } else { nextTurn(); }
}

function animateLineClear(rows,phase){
  if(phase<8){
    draw(rows,phase%2===0);
    setTimeout(()=>animateLineClear(rows,phase+1),30);
  } else {
    for(let i=rows.length-1;i>=0;i--){grid.splice(rows[i],1);grid.unshift(Array(COLS).fill(null))}
    animating=false;
    nextTurn();
  }
}

function nextTurn(){
  spawn(nextName);
  nextName=pullPiece();
  drawPreview(nextCtx,nextName);
}

function flashScreen(){flashEl.style.opacity='0.12';setTimeout(()=>flashEl.style.opacity='0',150)}
function getSpeed(){return Math.max(50,500-(level-1)*40)}

// --- Drawing ---
function drawBlock(c,x,y,name,alpha){
  c.globalAlpha=alpha||1;
  const col=COLORS[name];
  c.fillStyle=col;
  c.fillRect(x+1,y+1,B-2,B-2);
  c.fillStyle='rgba(255,255,255,0.18)';
  c.fillRect(x+1,y+1,B-2,2);
  c.fillRect(x+1,y+1,2,B-2);
  c.fillStyle='rgba(0,0,0,0.25)';
  c.fillRect(x+1,y+B-3,B-2,2);
  c.fillRect(x+B-3,y+1,2,B-2);
  c.fillStyle='rgba(255,255,255,0.06)';
  c.fillRect(x+4,y+4,B-8,B-8);
  c.globalAlpha=1;
}

function draw(flashRows,flashWhite){
  ctx.fillStyle=theme.surface;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  // Grid lines
  ctx.strokeStyle=theme.border;
  ctx.globalAlpha=0.25;
  ctx.lineWidth=0.5;
  for(let x=1;x<COLS;x++){ctx.beginPath();ctx.moveTo(x*B,0);ctx.lineTo(x*B,canvas.height);ctx.stroke()}
  for(let y=1;y<ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*B);ctx.lineTo(canvas.width,y*B);ctx.stroke()}
  ctx.globalAlpha=1;

  const now=performance.now();
  const lockAlpha=lockFlashTime?Math.max(0,1-(now-lockFlashTime)/200):0;

  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(!grid[r][c])continue;
    if(flashRows&&flashRows.includes(r)){
      if(flashWhite){ctx.fillStyle='#fff';ctx.fillRect(c*B+1,r*B+1,B-2,B-2)}
      else drawBlock(ctx,c*B,r*B,grid[r][c]);
    } else {
      drawBlock(ctx,c*B,r*B,grid[r][c]);
      if(lockAlpha>0&&lockFlashCells.some(([fx,fy])=>fx===c&&fy===r)){
        ctx.fillStyle=`rgba(255,255,255,${lockAlpha*0.3})`;ctx.fillRect(c*B+1,r*B+1,B-2,B-2);
      }
    }
  }

  if(!alive||animating){drawParticles();return}

  // Ghost piece
  if(ghostY!==py)for(const[cx,cy]of piece){
    const gx=px+cx,gy=ghostY+cy;
    if(gy>=0){
      ctx.globalAlpha=0.15;ctx.strokeStyle=COLORS[pName];ctx.lineWidth=1;
      ctx.strokeRect(gx*B+2,gy*B+2,B-4,B-4);
      ctx.globalAlpha=0.06;ctx.fillStyle=COLORS[pName];
      ctx.fillRect(gx*B+2,gy*B+2,B-4,B-4);
      ctx.globalAlpha=1;
    }
  }
  // Active piece
  for(const[cx,cy]of piece){const x=px+cx,y=py+cy;if(y>=0)drawBlock(ctx,x*B,y*B,pName)}
  drawParticles();
}

function drawParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=p.decay;
    if(p.life<=0){particles.splice(i,1);continue}
    ctx.globalAlpha=p.life*0.8;ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1;
}

function drawPreview(pCtx,name){
  const w=pCtx.canvas.width,h=pCtx.canvas.height;
  pCtx.fillStyle=theme.surface;pCtx.fillRect(0,0,w,h);
  if(!name)return;
  const cs=getCells(name,0);
  const minX=Math.min(...cs.map(c=>c[0])),maxX=Math.max(...cs.map(c=>c[0]));
  const minY=Math.min(...cs.map(c=>c[1])),maxY=Math.max(...cs.map(c=>c[1]));
  const pw=(maxX-minX+1)*18,ph=(maxY-minY+1)*18;
  const ox=(w-pw)/2-minX*18,oy=(h-ph)/2-minY*18;
  for(const[cx,cy]of cs){
    const bx=ox+cx*18,by=oy+cy*18;
    pCtx.fillStyle=COLORS[name];pCtx.fillRect(bx+1,by+1,16,16);
    pCtx.fillStyle='rgba(255,255,255,0.15)';pCtx.fillRect(bx+1,by+1,16,2);pCtx.fillRect(bx+1,by+1,2,16);
    pCtx.fillStyle='rgba(0,0,0,0.2)';pCtx.fillRect(bx+1,by+15,16,2);pCtx.fillRect(bx+15,by+1,2,16);
  }
}

function updateUI(){
  document.getElementById('score').textContent=score.toLocaleString();
  document.getElementById('level').textContent=level;
  document.getElementById('lines').textContent=linesCleared;
  document.getElementById('best').textContent=bestScore>0?'Best: '+bestScore.toLocaleString():'';
}

// --- Main loop (rAF-based with delta time) ---
function loop(ts){
  const dt=ts-lastFrameTime;
  lastFrameTime=ts;

  if(alive&&!animating){
    // DAS auto-repeat
    if(dasDir){
      dasTimer+=dt;
      if(dasTimer>=DAS_DELAY){
        dasAccum+=dt;
        while(dasAccum>=DAS_RATE){
          dasAccum-=DAS_RATE;
          if(dasDir==='left')tryMove(-1,0);
          else if(dasDir==='right')tryMove(1,0);
          else if(dasDir==='down'){if(tryMove(0,1)){score++;updateUI()}}
        }
      }
    }

    // Lock delay
    if(py===ghostY){
      lockTimer+=dt;
      if(lockTimer>=lockDelay){lockPiece();lastGravity=ts;rafId=requestAnimationFrame(loop);return}
    } else { lockTimer=0;lockMoves=0; }

    // Gravity
    if(ts-lastGravity>=dropInterval){
      if(valid(piece,px,py+1)){py++;calcGhost()}
      lastGravity=ts;
    }
  }

  draw();
  rafId=requestAnimationFrame(loop);
}

function hardDrop(){
  let d=0;
  while(valid(piece,px,py+1)){py++;d++}
  score+=d*2;updateUI();sfxDrop();
  for(const[cx,cy]of piece){
    const bx=(px+cx)*B+B/2,by=(py+cy)*B+B;
    for(let i=0;i<2;i++)particles.push({x:bx,y:by,vx:(Math.random()-0.5)*3,vy:-Math.random()*2,life:0.6,decay:0.025,color:COLORS[pName],size:2});
  }
  lockPiece();
}

function doHold(){
  if(!canHold)return;canHold=false;sfxRotate();
  if(!holdName){holdName=pName;nextTurn()}
  else{const tmp=holdName;holdName=pName;spawn(tmp)}
  drawPreview(holdCtx,holdName);draw();
}

function endGame(){
  saveBest();
  document.getElementById('finalScore').textContent='Score: '+score.toLocaleString()+'  |  Level: '+level+'  |  Lines: '+linesCleared;
  document.getElementById('gameOverScreen').classList.remove('hidden');
}

async function loadBest(){
  try{const r=await fetch(BRIDGE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'read',app:'tetris',key:'best'})});const d=await r.json();if(d&&typeof d==='number')bestScore=d}catch{}
}
async function saveBest(){
  try{if(score>bestScore){bestScore=score;await fetch(BRIDGE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'write',app:'tetris',key:'best',value:score})})}}catch{}
  updateUI();
}

function startGame(){
  theme = getThemeColors();
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  score=0;level=1;linesCleared=0;alive=true;animating=false;
  holdName=null;canHold=true;lockTimer=0;lockMoves=0;
  particles=[];lockFlashCells=[];bag=[];
  fillBag();dropInterval=getSpeed();
  const first=pullPiece();
  nextName=pullPiece();
  spawn(first);
  drawPreview(nextCtx,nextName);
  drawPreview(holdCtx,null);
  updateUI();
  lastGravity=performance.now();
  lastFrameTime=performance.now();
  if(rafId)cancelAnimationFrame(rafId);
  rafId=requestAnimationFrame(loop);
}

// --- Input ---
document.addEventListener('keydown',e=>{
  if(!alive||animating)return;
  const k=e.key;
  if(keys[k]){e.preventDefault();return}
  keys[k]=true;
  switch(k){
    case'ArrowLeft':case'a':if(tryMove(-1,0))sfxMove();dasDir='left';dasTimer=0;dasAccum=0;break;
    case'ArrowRight':case'd':if(tryMove(1,0))sfxMove();dasDir='right';dasTimer=0;dasAccum=0;break;
    case'ArrowDown':case's':if(tryMove(0,1)){score++;updateUI();sfxMove()}dasDir='down';dasTimer=0;dasAccum=0;break;
    case'ArrowUp':case'w':if(tryRotate(1))sfxRotate();break;
    case'z':case'Z':if(tryRotate(-1))sfxRotate();break;
    case' ':hardDrop();break;
    case'c':case'C':doHold();break;
    default:return;
  }
  e.preventDefault();draw();
});

document.addEventListener('keyup',e=>{
  keys[e.key]=false;
  const k=e.key;
  if((k==='ArrowLeft'||k==='a')&&dasDir==='left')dasDir=null;
  if((k==='ArrowRight'||k==='d')&&dasDir==='right')dasDir=null;
  if((k==='ArrowDown'||k==='s')&&dasDir==='down')dasDir=null;
});

// Init
loadBest().then(updateUI);
theme = getThemeColors();
ctx.fillStyle=theme.surface;ctx.fillRect(0,0,canvas.width,canvas.height);
drawPreview(nextCtx,null);drawPreview(holdCtx,null);
document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('restartBtn').addEventListener('click',startGame);
</script>
</body>
</html>
