<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}
.header {
  display: flex;
  gap: 24px;
  margin-bottom: 12px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.header span { color: #888; }
.header .value { color: #4ade80; font-variant-numeric: tabular-nums; }
canvas {
  border: 2px solid #222;
  border-radius: 4px;
  background: #111;
}
.overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.85);
  z-index: 10;
}
.overlay h1 {
  font-size: 28px;
  margin-bottom: 8px;
  color: #4ade80;
}
.overlay .score-display {
  font-size: 18px;
  color: #888;
  margin-bottom: 20px;
}
.overlay button {
  padding: 10px 28px;
  font-size: 16px;
  background: #4ade80;
  color: #000;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
}
.overlay button:hover { background: #22c55e; }
.hidden { display: none !important; }
.controls {
  margin-top: 12px;
  font-size: 12px;
  color: #555;
}
</style>
</head>
<body>

<div class="header">
  <div><span>Score </span><span class="value" id="score">0</span></div>
  <div><span>High Score </span><span class="value" id="highScore">0</span></div>
  <div><span>Level </span><span class="value" id="level">1</span></div>
</div>

<canvas id="game" width="400" height="400"></canvas>

<div class="controls">Arrow keys or WASD to move</div>

<div class="overlay" id="startScreen">
  <h1>Snake</h1>
  <div class="score-display">Classic arcade game</div>
  <button onclick="startGame()">Play</button>
</div>

<div class="overlay hidden" id="gameOverScreen">
  <h1>Game Over</h1>
  <div class="score-display" id="finalScore"></div>
  <button onclick="startGame()">Play Again</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;

let snake, food, direction, nextDirection, score, highScore, level, gameLoop, alive;

const BRIDGE_URL = window.location.origin + '/api/bridge/data';

async function loadHighScore() {
  try {
    const res = await fetch(BRIDGE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'read', app: 'snake', key: 'highscore' }),
    });
    const data = await res.json();
    if (data && typeof data === 'number') highScore = data;
  } catch {}
  document.getElementById('highScore').textContent = highScore;
}

async function saveHighScore() {
  try {
    await fetch(BRIDGE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'write', app: 'snake', key: 'highscore', value: highScore }),
    });
  } catch {}
}

function playSound(freq, duration, type) {
  try {
    const actx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.type = type || 'square';
    osc.frequency.value = freq;
    gain.gain.value = 0.08;
    gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + duration);
    osc.connect(gain);
    gain.connect(actx.destination);
    osc.start();
    osc.stop(actx.currentTime + duration);
  } catch {}
}

function spawnFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS),
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  return pos;
}

function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');

  snake = [{ x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) }];
  direction = { x: 1, y: 0 };
  nextDirection = { x: 1, y: 0 };
  score = 0;
  level = 1;
  alive = true;
  food = spawnFood();
  updateDisplay();

  if (gameLoop) clearInterval(gameLoop);
  gameLoop = setInterval(tick, getSpeed());
}

function getSpeed() {
  return Math.max(60, 150 - (level - 1) * 10);
}

function tick() {
  if (!alive) return;

  direction = nextDirection;
  const head = {
    x: snake[0].x + direction.x,
    y: snake[0].y + direction.y,
  };

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    return gameOver();
  }
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    return gameOver();
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10 * level;
    playSound(520, 0.1, 'sine');
    food = spawnFood();

    const newLevel = Math.floor(score / 50) + 1;
    if (newLevel !== level) {
      level = newLevel;
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, getSpeed());
      playSound(700, 0.15, 'sine');
    }
  } else {
    snake.pop();
  }

  updateDisplay();
  draw();
}

function gameOver() {
  alive = false;
  clearInterval(gameLoop);
  playSound(200, 0.3, 'sawtooth');

  if (score > highScore) {
    highScore = score;
    document.getElementById('highScore').textContent = highScore;
    saveHighScore();
  }

  document.getElementById('finalScore').textContent = `Score: ${score}`;
  document.getElementById('gameOverScreen').classList.remove('hidden');
}

function updateDisplay() {
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
}

function draw() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x * GRID, 0);
    ctx.lineTo(x * GRID, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * GRID);
    ctx.lineTo(canvas.width, y * GRID);
    ctx.stroke();
  }

  // Food
  ctx.fillStyle = '#ef4444';
  ctx.shadowColor = '#ef4444';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, GRID / 2 - 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Snake
  for (let i = 0; i < snake.length; i++) {
    const seg = snake[i];
    const t = 1 - (i / snake.length) * 0.5;
    const r = Math.floor(74 * t);
    const g = Math.floor(222 * t);
    const b = Math.floor(128 * t);
    ctx.fillStyle = `rgb(${r},${g},${b})`;

    const pad = i === 0 ? 1 : 2;
    ctx.fillRect(seg.x * GRID + pad, seg.y * GRID + pad, GRID - pad * 2, GRID - pad * 2);

    if (i === 0) {
      // Eyes
      ctx.fillStyle = '#fff';
      const eyeSize = 3;
      const eyeOffX = direction.x === 0 ? 4 : (direction.x > 0 ? 6 : -2);
      const eyeOffY = direction.y === 0 ? 4 : (direction.y > 0 ? 6 : -2);
      ctx.fillRect(seg.x * GRID + 5 + (direction.y !== 0 ? -3 : 0) + eyeOffX * 0.3, seg.y * GRID + 5 + (direction.x !== 0 ? -3 : 0) + eyeOffY * 0.3, eyeSize, eyeSize);
      ctx.fillRect(seg.x * GRID + 5 + (direction.y !== 0 ? 5 : 0) + eyeOffX * 0.3, seg.y * GRID + 5 + (direction.x !== 0 ? 5 : 0) + eyeOffY * 0.3, eyeSize, eyeSize);
    }
  }
}

document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if ((key === 'arrowup' || key === 'w') && direction.y === 0) nextDirection = { x: 0, y: -1 };
  else if ((key === 'arrowdown' || key === 's') && direction.y === 0) nextDirection = { x: 0, y: 1 };
  else if ((key === 'arrowleft' || key === 'a') && direction.x === 0) nextDirection = { x: -1, y: 0 };
  else if ((key === 'arrowright' || key === 'd') && direction.x === 0) nextDirection = { x: 1, y: 0 };

  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase()) || ['w','a','s','d'].includes(key)) {
    e.preventDefault();
  }
});

// Touch controls
let touchStart = null;
canvas.addEventListener('touchstart', (e) => {
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  e.preventDefault();
});
canvas.addEventListener('touchend', (e) => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 20 && direction.x === 0) nextDirection = { x: 1, y: 0 };
    else if (dx < -20 && direction.x === 0) nextDirection = { x: -1, y: 0 };
  } else {
    if (dy > 20 && direction.y === 0) nextDirection = { x: 0, y: 1 };
    else if (dy < -20 && direction.y === 0) nextDirection = { x: 0, y: -1 };
  }
  touchStart = null;
  e.preventDefault();
});

highScore = 0;
loadHighScore();
draw = draw || function(){};
// Initial draw
ctx.fillStyle = '#111';
ctx.fillRect(0, 0, canvas.width, canvas.height);
</script>
</body>
</html>
