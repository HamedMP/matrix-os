<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --board-size: min(88vw, 88vh, 420px);
  --cell-gap: calc(var(--board-size) * 0.022);
  --cell-size: calc((var(--board-size) - var(--cell-gap) * 5) / 4);
  --radius: 10px;
}
body {
  background: #0a0a0a; color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100vh; overflow: hidden; user-select: none;
  -webkit-user-select: none; -webkit-touch-callout: none;
}

/* Back button */
.back-btn {
  position: fixed; top: 14px; left: 14px; z-index: 100;
  width: 36px; height: 36px; border-radius: 8px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  color: #999; font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, color 0.2s;
  text-decoration: none;
}
.back-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

/* Header */
.header {
  display: flex; align-items: center; gap: 16px;
  width: var(--board-size); margin-bottom: 14px; justify-content: space-between;
}
.title { font-size: 32px; font-weight: 800; color: #e2e8f0; letter-spacing: -1px; }
.score-group { display: flex; gap: 8px; }
.score-box {
  background: #1a1a1a; border-radius: 8px; padding: 8px 14px;
  text-align: center; min-width: 72px; position: relative; overflow: hidden;
}
.score-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: #666; font-weight: 600; }
.score-value { font-size: 20px; font-weight: 700; color: #f6e05e; font-variant-numeric: tabular-nums; }
.score-pop {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%); color: #f6e05e;
  font-size: 14px; font-weight: 700; pointer-events: none;
  animation: floatUp 0.7s ease-out forwards; opacity: 0;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translate(-50%, -50%); }
  100% { opacity: 0; transform: translate(-50%, -180%); }
}

/* Controls row */
.controls-row {
  display: flex; gap: 8px; width: var(--board-size);
  margin-bottom: 10px; justify-content: flex-end;
}
.ctrl-btn {
  padding: 6px 14px; font-size: 12px; font-weight: 600;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  color: #888; border-radius: 6px; cursor: pointer;
  transition: background 0.2s, color 0.2s; text-transform: uppercase; letter-spacing: 0.5px;
}
.ctrl-btn:hover { background: rgba(255,255,255,0.12); color: #ccc; }
.ctrl-btn:disabled { opacity: 0.3; cursor: default; }

/* Board */
.board-wrap { position: relative; }
.board {
  width: var(--board-size); height: var(--board-size);
  background: #1a1a1a; border-radius: 14px; position: relative;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
}
.cell-bg {
  position: absolute; border-radius: var(--radius);
  width: var(--cell-size); height: var(--cell-size);
  background: #252525;
}
.tile {
  position: absolute; border-radius: var(--radius);
  width: var(--cell-size); height: var(--cell-size);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; z-index: 2;
  transition: transform 0.14s ease-in-out;
  will-change: transform;
}
.tile.pop-in {
  animation: popIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
.tile.merge-pop {
  animation: mergePop 0.22s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
@keyframes popIn {
  0% { transform: var(--tx) scale(0); opacity: 0; }
  100% { transform: var(--tx) scale(1); opacity: 1; }
}
@keyframes mergePop {
  0% { transform: var(--tx) scale(1); }
  40% { transform: var(--tx) scale(1.2); }
  100% { transform: var(--tx) scale(1); }
}

/* Overlays */
.overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(10,10,10,0.8); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  border-radius: 14px; z-index: 20; opacity: 1; transition: opacity 0.3s;
}
.overlay.hidden { opacity: 0; pointer-events: none; }
.overlay h1 { font-size: 36px; font-weight: 800; margin-bottom: 6px; color: #f6e05e; }
.overlay .sub { font-size: 15px; color: #888; margin-bottom: 18px; }
.overlay button {
  padding: 12px 32px; font-size: 15px; font-weight: 700;
  background: linear-gradient(135deg, #f6e05e, #d69e2e); color: #0a0a0a;
  border: none; border-radius: 8px; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 16px rgba(246,224,94,0.25);
}
.overlay button:hover { transform: scale(1.04); box-shadow: 0 6px 24px rgba(246,224,94,0.35); }

.hint { margin-top: 12px; font-size: 11px; color: #555; text-align: center; width: var(--board-size); }
</style>
</head>
<body>

<a class="back-btn" href="../index.html" title="Back">&#8592;</a>

<div class="header">
  <div class="title">2048</div>
  <div class="score-group">
    <div class="score-box" id="scoreBox">
      <div class="score-label">Score</div>
      <div class="score-value" id="score">0</div>
    </div>
    <div class="score-box">
      <div class="score-label">Best</div>
      <div class="score-value" id="best">0</div>
    </div>
  </div>
</div>

<div class="controls-row">
  <button class="ctrl-btn" id="undoBtn" disabled>Undo</button>
  <button class="ctrl-btn" id="newBtn">New</button>
</div>

<div class="board-wrap">
  <div class="board" id="board"></div>
  <div class="overlay" id="startOverlay">
    <h1>2048</h1>
    <div class="sub">Merge tiles to reach 2048</div>
    <button id="startBtn">Play</button>
  </div>
  <div class="overlay hidden" id="winOverlay">
    <h1>You Win!</h1>
    <div class="sub" id="winSub">Score: 0</div>
    <button id="continueBtn" style="margin-bottom:8px">Keep Going</button>
    <button id="winNewBtn" style="background:rgba(255,255,255,0.1);color:#ccc;box-shadow:none">New Game</button>
  </div>
  <div class="overlay hidden" id="loseOverlay">
    <h1>Game Over</h1>
    <div class="sub" id="loseSub">Score: 0</div>
    <button id="loseBtn">Try Again</button>
  </div>
</div>

<div class="hint">Arrow keys / WASD / swipe</div>

<script>
const BRIDGE = window.location.origin + '/api/bridge/data';
const S = 4;
const TILE_COLORS = {
  2:    { bg: '#2d3748', fg: '#e2e8f0' },
  4:    { bg: '#4a5568', fg: '#e2e8f0' },
  8:    { bg: '#c05621', fg: '#fff' },
  16:   { bg: '#c53030', fg: '#fff' },
  32:   { bg: '#e53e3e', fg: '#fff' },
  64:   { bg: '#dd6b20', fg: '#fff' },
  128:  { bg: '#d69e2e', fg: '#fff' },
  256:  { bg: '#ecc94b', fg: '#1a1a1a' },
  512:  { bg: '#f6ad55', fg: '#1a1a1a' },
  1024: { bg: '#fbd38d', fg: '#1a1a1a' },
  2048: { bg: '#f6e05e', fg: '#1a1a1a' },
  4096: { bg: '#48bb78', fg: '#fff' },
  8192: { bg: '#38b2ac', fg: '#fff' },
};
function tileStyle(v) { return TILE_COLORS[v] || { bg: '#9f7aea', fg: '#fff' }; }
function tileFont(v) { return v >= 1024 ? Math.round(cellPx * 0.28) + 'px' : v >= 128 ? Math.round(cellPx * 0.34) + 'px' : Math.round(cellPx * 0.42) + 'px'; }

let grid, score, best = 0, won = false, prevState = null, moving = false;
let cellPx, gapPx, boardEl;

const audioCtx = (() => { try { return new (window.AudioContext || window.webkitAudioContext)(); } catch { return null; } })();
function playSound(freq, dur, vol = 0.06) {
  if (!audioCtx) return;
  try {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = freq;
    g.gain.value = vol; g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch {}
}

function cellPos(rc) {
  return gapPx + rc * (cellPx + gapPx);
}

function initBoard() {
  boardEl = document.getElementById('board');
  const rect = boardEl.getBoundingClientRect();
  const boardPx = rect.width;
  gapPx = boardPx * 0.022;
  cellPx = (boardPx - gapPx * 5) / 4;
  boardEl.innerHTML = '';
  for (let r = 0; r < S; r++)
    for (let c = 0; c < S; c++) {
      const bg = document.createElement('div');
      bg.className = 'cell-bg';
      bg.style.left = cellPos(c) + 'px';
      bg.style.top = cellPos(r) + 'px';
      bg.style.width = cellPx + 'px';
      bg.style.height = cellPx + 'px';
      boardEl.appendChild(bg);
    }
}

function createTileEl(r, c, val, anim) {
  const el = document.createElement('div');
  el.className = 'tile';
  const s = tileStyle(val);
  el.style.width = cellPx + 'px';
  el.style.height = cellPx + 'px';
  el.style.background = s.bg;
  el.style.color = s.fg;
  el.style.fontSize = tileFont(val);
  el.textContent = val;
  const tx = `translate(${cellPos(c)}px, ${cellPos(r)}px)`;
  el.style.setProperty('--tx', tx);
  el.style.transform = tx;
  if (val === 2048) el.style.boxShadow = '0 0 24px rgba(246,224,94,0.5), 0 0 48px rgba(246,224,94,0.2)';
  else el.style.boxShadow = '0 2px 8px rgba(0,0,0,0.3)';
  if (anim === 'pop') el.classList.add('pop-in');
  if (anim === 'merge') el.classList.add('merge-pop');
  return el;
}

function renderFull(newTiles, mergedTiles) {
  boardEl.querySelectorAll('.tile').forEach(t => t.remove());
  for (let r = 0; r < S; r++)
    for (let c = 0; c < S; c++) {
      if (grid[r][c] === 0) continue;
      let anim = null;
      if (newTiles && newTiles.some(p => p[0] === r && p[1] === c)) anim = 'pop';
      if (mergedTiles && mergedTiles.some(p => p[0] === r && p[1] === c)) anim = 'merge';
      boardEl.appendChild(createTileEl(r, c, grid[r][c], anim));
    }
  document.getElementById('score').textContent = score;
}

function showScorePop(pts) {
  if (pts <= 0) return;
  const box = document.getElementById('scoreBox');
  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.textContent = '+' + pts;
  box.appendChild(pop);
  setTimeout(() => pop.remove(), 700);
}

function slideRow(row) {
  let arr = row.filter(v => v !== 0);
  const merged = [];
  let pts = 0;
  for (let i = 0; i < arr.length - 1; i++) {
    if (arr[i] === arr[i + 1]) {
      arr[i] *= 2;
      pts += arr[i];
      arr[i + 1] = 0;
      merged.push(i);
    }
  }
  arr = arr.filter(v => v !== 0);
  while (arr.length < S) arr.push(0);
  return { result: arr, merged, pts };
}

function move(dir) {
  if (moving) return;
  const prev = grid.map(r => [...r]);
  const prevScore = score;
  const mergedPositions = [];
  let totalPts = 0;

  if (dir === 'left' || dir === 'right') {
    for (let r = 0; r < S; r++) {
      let row = [...grid[r]];
      if (dir === 'right') row.reverse();
      const { result, merged, pts } = slideRow(row);
      if (dir === 'right') result.reverse();
      grid[r] = result;
      totalPts += pts;
      merged.forEach(i => {
        const c = dir === 'right' ? S - 1 - i : i;
        mergedPositions.push([r, c]);
      });
    }
  } else {
    for (let c = 0; c < S; c++) {
      let col = [];
      for (let r = 0; r < S; r++) col.push(grid[r][c]);
      if (dir === 'down') col.reverse();
      const { result, merged, pts } = slideRow(col);
      if (dir === 'down') result.reverse();
      for (let r = 0; r < S; r++) grid[r][c] = result[r];
      totalPts += pts;
      merged.forEach(i => {
        const r = dir === 'down' ? S - 1 - i : i;
        mergedPositions.push([r, c]);
      });
    }
  }

  let changed = false;
  for (let r = 0; r < S; r++)
    for (let c = 0; c < S; c++)
      if (prev[r][c] !== grid[r][c]) { changed = true; break; }

  if (!changed) { grid = prev; return; }

  prevState = { grid: prev, score: prevScore, won };
  document.getElementById('undoBtn').disabled = false;
  score += totalPts;
  if (totalPts > 0) showScorePop(totalPts);
  if (mergedPositions.length > 0) playSound(520 + Math.min(totalPts, 2000) * 0.2, 0.1);

  moving = true;

  /* Animate existing tiles sliding to new positions */
  const tileEls = boardEl.querySelectorAll('.tile');
  /* For simplicity: just render the new state with animations after a brief pause to allow CSS transition */
  const newPos = addRandom();
  if (newPos) playSound(330, 0.06, 0.03);

  renderFull(newPos ? [newPos] : [], mergedPositions);

  if (score > best) {
    best = score;
    document.getElementById('best').textContent = best;
    saveBest();
  }

  if (!won && grid.some(r => r.some(v => v === 2048))) {
    won = true;
    setTimeout(() => {
      document.getElementById('winSub').textContent = 'Score: ' + score;
      document.getElementById('winOverlay').classList.remove('hidden');
    }, 300);
    moving = false;
    return;
  }

  if (isGameOver()) {
    setTimeout(() => {
      document.getElementById('loseSub').textContent = 'Score: ' + score;
      document.getElementById('loseOverlay').classList.remove('hidden');
      playSound(180, 0.4, 0.08);
    }, 300);
  }

  setTimeout(() => { moving = false; }, 160);
}

function addRandom() {
  const empty = [];
  for (let r = 0; r < S; r++)
    for (let c = 0; c < S; c++)
      if (grid[r][c] === 0) empty.push([r, c]);
  if (!empty.length) return null;
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
  return [r, c];
}

function isGameOver() {
  for (let r = 0; r < S; r++)
    for (let c = 0; c < S; c++) {
      if (grid[r][c] === 0) return false;
      if (c < S - 1 && grid[r][c] === grid[r][c + 1]) return false;
      if (r < S - 1 && grid[r][c] === grid[r + 1][c]) return false;
    }
  return true;
}

function undo() {
  if (!prevState) return;
  grid = prevState.grid;
  score = prevState.score;
  won = prevState.won;
  prevState = null;
  document.getElementById('undoBtn').disabled = true;
  renderFull();
}

function newGame() {
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('winOverlay').classList.add('hidden');
  document.getElementById('loseOverlay').classList.add('hidden');
  grid = Array.from({ length: S }, () => Array(S).fill(0));
  score = 0; won = false; prevState = null; moving = false;
  document.getElementById('undoBtn').disabled = true;
  addRandom(); addRandom();
  renderFull();
}

async function loadBest() {
  try {
    const r = await fetch(BRIDGE, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'read', app: '2048', key: 'best' }),
    });
    const d = await r.json();
    if (typeof d === 'number' && d > 0) best = d;
  } catch {}
  document.getElementById('best').textContent = best;
}
async function saveBest() {
  try {
    await fetch(BRIDGE, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'write', app: '2048', key: 'best', value: best }),
    });
  } catch {}
}

/* Event wiring */
document.getElementById('startBtn').addEventListener('click', newGame);
document.getElementById('continueBtn').addEventListener('click', () => { document.getElementById('winOverlay').classList.add('hidden'); });
document.getElementById('winNewBtn').addEventListener('click', newGame);
document.getElementById('loseBtn').addEventListener('click', newGame);
document.getElementById('newBtn').addEventListener('click', newGame);
document.getElementById('undoBtn').addEventListener('click', undo);

document.addEventListener('keydown', e => {
  const map = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down',
    a: 'left', d: 'right', w: 'up', s: 'down', z: 'undo' };
  const action = map[e.key];
  if (action === 'undo') { e.preventDefault(); undo(); }
  else if (action) { e.preventDefault(); move(action); }
});

let touchStart = null;
document.addEventListener('touchstart', e => {
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
document.addEventListener('touchmove', e => {
  if (touchStart) e.preventDefault();
}, { passive: false });
document.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  touchStart = null;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < 30) return;
  if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
  else move(dy > 0 ? 'down' : 'up');
});

/* Init */
initBoard();
loadBest();
</script>
</body>
</html>
