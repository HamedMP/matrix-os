<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minesweeper</title>
<style>
:root {
  --bg: var(--matrix-bg, #f5f5f7);
  --fg: var(--matrix-fg, #1d1d1f);
  --accent: var(--matrix-accent, #007aff);
  --surface: var(--matrix-card-bg, #ffffff);
  --border: var(--matrix-border, #d2d2d7);
  --muted: var(--matrix-muted-fg, #86868b);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--matrix-font-sans, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: auto;
  user-select: none;
  padding: 16px;
}

.back-btn {
  position: fixed;
  top: 12px;
  left: 12px;
  width: 32px;
  height: 32px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  z-index: 20;
  text-decoration: none;
}
.back-btn:hover { background: color-mix(in srgb, var(--fg) 8%, transparent); color: var(--fg); border-color: color-mix(in srgb, var(--fg) 20%, transparent); }

.container { display: flex; flex-direction: column; align-items: center; gap: 10px; }

.difficulty-bar {
  display: flex;
  gap: 6px;
}
.difficulty-bar button {
  padding: 5px 14px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  background: var(--surface);
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
}
.difficulty-bar button:hover { background: color-mix(in srgb, var(--fg) 6%, var(--surface)); color: var(--fg); border-color: color-mix(in srgb, var(--fg) 20%, transparent); }
.difficulty-bar button.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.info-bar {
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px;
  min-width: 220px;
}

.counter {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 4px 10px;
  font-size: 13px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.counter .label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.counter .val { color: var(--fg); min-width: 24px; text-align: center; }
.counter.mines .val { color: #ef4444; }
.counter.timer .val { color: var(--accent); }

.face-btn {
  width: 32px;
  height: 32px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.1s;
  flex-shrink: 0;
}
.face-btn:hover { background: color-mix(in srgb, var(--fg) 6%, var(--surface)); }
.face-btn:active { transform: scale(0.92); }

.best-time {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.3px;
  height: 14px;
}

.board {
  display: inline-grid;
  gap: 1px;
  background: var(--border);
  padding: 3px;
  border-radius: 6px;
  border: 1px solid var(--border);
}

.cell {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.08s, transform 0.12s;
  position: relative;
}
.cell.covered {
  background: color-mix(in srgb, var(--fg) 8%, var(--surface));
  border-top: 1px solid color-mix(in srgb, var(--fg) 6%, var(--surface));
  border-left: 1px solid color-mix(in srgb, var(--fg) 5%, var(--surface));
  border-right: 1px solid color-mix(in srgb, var(--fg) 10%, var(--surface));
  border-bottom: 1px solid color-mix(in srgb, var(--fg) 12%, var(--surface));
  box-shadow: 0 1px 2px color-mix(in srgb, var(--fg) 10%, transparent);
}
.cell.covered:hover { background: color-mix(in srgb, var(--fg) 14%, var(--surface)); }
.cell.revealed {
  background: color-mix(in srgb, var(--fg) 3%, var(--bg));
  cursor: default;
  border: 1px solid var(--border);
}
.cell.revealed.chord-highlight { background: color-mix(in srgb, var(--fg) 6%, var(--bg)); }
.cell.mine-hit { background: #7f1d1d !important; }
.cell.mine-show { background: var(--surface); }
.cell.wrong-flag { background: var(--surface); }

.cell.flagged::after {
  content: '';
  display: block;
  width: 8px;
  height: 8px;
  background: #ef4444;
  border-radius: 50%;
  box-shadow: 0 0 4px rgba(239,68,68,0.5);
}

.cell.pop {
  animation: cellPop 0.15s ease-out;
}
@keyframes cellPop {
  0% { transform: scale(0.85); }
  60% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

.c1 { color: #3b82f6; }
.c2 { color: #22c55e; }
.c3 { color: #ef4444; }
.c4 { color: #8b5cf6; }
.c5 { color: #a0522d; }
.c6 { color: #06b6d4; }
.c7 { color: var(--fg); }
.c8 { color: var(--muted); }
</style>
</head>
<body>

<a class="back-btn" href="../index.html" title="Back">&larr;</a>

<div class="container">
  <div class="difficulty-bar">
    <button class="active" data-level="beginner">Beginner</button>
    <button data-level="intermediate">Intermediate</button>
    <button data-level="expert">Expert</button>
  </div>

  <div class="info-bar">
    <div class="counter mines">
      <span class="label">Mines</span>
      <span class="val" id="mineCount">10</span>
    </div>
    <button class="face-btn" id="faceBtn" title="New Game">&#128578;</button>
    <div class="counter timer">
      <span class="label">Time</span>
      <span class="val" id="timer">0</span>
    </div>
  </div>

  <div class="best-time" id="bestTime"></div>
  <div class="board" id="board"></div>
</div>

<script>
const LEVELS = {
  beginner:     { rows: 9,  cols: 9,  mines: 10 },
  intermediate: { rows: 16, cols: 16, mines: 40 },
  expert:       { rows: 16, cols: 30, mines: 99 },
};

const FACES = { normal: '\u{1F642}', pressed: '\u{1F62F}', dead: '\u{1F635}', cool: '\u{1F60E}' };
const BRIDGE_URL = window.location.origin + '/api/bridge/data';

let level = 'beginner';
let grid, revealedMap, flaggedMap, rows, cols, totalMines;
let gameOver, firstClick, timerID, seconds, flagCount;
let bestTimes = {};
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch { return null; }
  }
  return audioCtx;
}

function playTone(freq, dur, type, vol) {
  const ac = getAudioCtx();
  if (!ac) return;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = type || 'sine';
  o.frequency.value = freq;
  g.gain.value = vol || 0.06;
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g);
  g.connect(ac.destination);
  o.start();
  o.stop(ac.currentTime + dur);
}

function sfxReveal() { playTone(700, 0.04); }
function sfxFlag() { playTone(400, 0.06, 'triangle'); }
function sfxUnflag() { playTone(300, 0.06, 'triangle'); }
function sfxCascade() { playTone(900, 0.08, 'sine', 0.03); }
function sfxExplosion() {
  playTone(120, 0.4, 'sawtooth', 0.1);
  setTimeout(() => playTone(80, 0.3, 'square', 0.05), 50);
}
function sfxWin() {
  playTone(523, 0.1); setTimeout(() => playTone(659, 0.1), 80);
  setTimeout(() => playTone(784, 0.1), 160); setTimeout(() => playTone(1047, 0.2), 260);
}

function setFace(state) {
  document.getElementById('faceBtn').textContent = FACES[state];
}

function neighbors(r, c) {
  const res = [];
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      if (!dr && !dc) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) res.push([nr, nc]);
    }
  return res;
}

function initGame() {
  clearInterval(timerID);
  const cfg = LEVELS[level];
  rows = cfg.rows; cols = cfg.cols; totalMines = cfg.mines;
  grid = Array.from({ length: rows }, () => Array(cols).fill(0));
  revealedMap = Array.from({ length: rows }, () => Array(cols).fill(false));
  flaggedMap = Array.from({ length: rows }, () => Array(cols).fill(false));
  gameOver = false; firstClick = true; seconds = 0; flagCount = 0;

  document.getElementById('timer').textContent = '0';
  document.getElementById('mineCount').textContent = totalMines;
  setFace('normal');
  renderBoard();
  loadBestTime();
}

function placeMines(safeR, safeC) {
  const safe = new Set();
  safe.add(safeR * cols + safeC);
  for (const [nr, nc] of neighbors(safeR, safeC)) safe.add(nr * cols + nc);

  let placed = 0;
  while (placed < totalMines) {
    const r = Math.floor(Math.random() * rows);
    const c = Math.floor(Math.random() * cols);
    if (grid[r][c] === -1 || safe.has(r * cols + c)) continue;
    grid[r][c] = -1;
    placed++;
  }
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++) {
      if (grid[r][c] === -1) continue;
      let cnt = 0;
      for (const [nr, nc] of neighbors(r, c)) if (grid[nr][nc] === -1) cnt++;
      grid[r][c] = cnt;
    }
}

function cellEl(r, c) {
  return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
}

function renderBoard() {
  const el = document.getElementById('board');
  el.innerHTML = '';
  el.style.gridTemplateColumns = `repeat(${cols}, 28px)`;

  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;
      updateCellDOM(cell, r, c);
      cell.addEventListener('click', () => onClick(r, c));
      cell.addEventListener('dblclick', () => onChord(r, c));
      cell.addEventListener('contextmenu', e => { e.preventDefault(); onRightClick(r, c); });
      cell.addEventListener('mousedown', () => { if (!gameOver && !revealedMap[r][c]) setFace('pressed'); });
      cell.addEventListener('mouseup', () => { if (!gameOver) setFace('normal'); });
      el.appendChild(cell);
    }
  updateMineCounter();
}

function updateCellDOM(cell, r, c, animate) {
  cell.className = 'cell';
  if (animate) cell.classList.add('pop');

  if (revealedMap[r][c]) {
    cell.classList.add('revealed');
    if (grid[r][c] === -1) {
      cell.textContent = '*';
      cell.style.fontWeight = '900';
      cell.style.fontSize = '16px';
    } else if (grid[r][c] > 0) {
      cell.textContent = grid[r][c];
      cell.classList.add('c' + grid[r][c]);
    } else {
      cell.textContent = '';
    }
  } else {
    cell.classList.add('covered');
    if (flaggedMap[r][c]) cell.classList.add('flagged');
    cell.textContent = '';
  }
}

function updateMineCounter() {
  document.getElementById('mineCount').textContent = totalMines - flagCount;
}

function startTimer() {
  timerID = setInterval(() => {
    seconds++;
    document.getElementById('timer').textContent = seconds;
  }, 1000);
}

function onClick(r, c) {
  if (gameOver || flaggedMap[r][c]) return;
  if (revealedMap[r][c]) { onChord(r, c); return; }

  if (firstClick) {
    firstClick = false;
    placeMines(r, c);
    startTimer();
  }

  if (grid[r][c] === -1) {
    lose(r, c);
    return;
  }

  const revealed = floodReveal(r, c);
  animateRevealed(revealed);
  if (revealed.length > 1) sfxCascade(); else sfxReveal();
  checkWin();
}

function onRightClick(r, c) {
  if (gameOver || revealedMap[r][c]) return;
  flaggedMap[r][c] = !flaggedMap[r][c];
  flagCount += flaggedMap[r][c] ? 1 : -1;
  const cell = cellEl(r, c);
  if (cell) updateCellDOM(cell, r, c);
  updateMineCounter();
  flaggedMap[r][c] ? sfxFlag() : sfxUnflag();
}

function onChord(r, c) {
  if (gameOver || !revealedMap[r][c] || grid[r][c] <= 0) return;
  const nbrs = neighbors(r, c);
  let adjFlags = 0;
  for (const [nr, nc] of nbrs) if (flaggedMap[nr][nc]) adjFlags++;
  if (adjFlags !== grid[r][c]) return;

  let allRevealed = [];
  let hitMine = false;
  for (const [nr, nc] of nbrs) {
    if (revealedMap[nr][nc] || flaggedMap[nr][nc]) continue;
    if (grid[nr][nc] === -1) { hitMine = true; continue; }
    allRevealed.push(...floodReveal(nr, nc));
  }
  if (hitMine) {
    for (const [nr, nc] of nbrs) {
      if (!revealedMap[nr][nc] && !flaggedMap[nr][nc] && grid[nr][nc] === -1) {
        lose(nr, nc);
        return;
      }
    }
  }
  animateRevealed(allRevealed);
  if (allRevealed.length > 0) sfxReveal();
  checkWin();
}

function floodReveal(r, c) {
  const stack = [[r, c]];
  const revealed = [];
  while (stack.length) {
    const [cr, cc] = stack.pop();
    if (cr < 0 || cr >= rows || cc < 0 || cc >= cols) continue;
    if (revealedMap[cr][cc] || flaggedMap[cr][cc]) continue;
    revealedMap[cr][cc] = true;
    revealed.push([cr, cc]);
    if (grid[cr][cc] === 0) {
      for (const [nr, nc] of neighbors(cr, cc)) stack.push([nr, nc]);
    }
  }
  return revealed;
}

function animateRevealed(cells) {
  for (let i = 0; i < cells.length; i++) {
    const [r, c] = cells[i];
    const cell = cellEl(r, c);
    if (cell) {
      const delay = Math.min(i * 8, 200);
      setTimeout(() => updateCellDOM(cell, r, c, true), delay);
    }
  }
}

function checkWin() {
  let unrevealed = 0;
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (!revealedMap[r][c]) unrevealed++;
  if (unrevealed === totalMines) win();
}

function win() {
  gameOver = true;
  clearInterval(timerID);
  setFace('cool');
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++) {
      if (!revealedMap[r][c] && !flaggedMap[r][c]) {
        flaggedMap[r][c] = true;
        flagCount++;
        const cell = cellEl(r, c);
        if (cell) updateCellDOM(cell, r, c);
      }
    }
  updateMineCounter();
  sfxWin();
  saveBestTime();
}

function lose(hitR, hitC) {
  gameOver = true;
  clearInterval(timerID);
  setFace('dead');
  sfxExplosion();

  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++) {
      const cell = cellEl(r, c);
      if (!cell) continue;
      if (grid[r][c] === -1 && !flaggedMap[r][c]) {
        revealedMap[r][c] = true;
        updateCellDOM(cell, r, c, true);
        if (r === hitR && c === hitC) {
          cell.classList.add('mine-hit');
        } else {
          cell.classList.add('mine-show');
        }
      } else if (flaggedMap[r][c] && grid[r][c] !== -1) {
        cell.classList.remove('flagged');
        cell.classList.add('wrong-flag', 'revealed');
        cell.textContent = 'X';
        cell.style.color = '#ef4444';
      }
    }
}

async function loadBestTime() {
  const el = document.getElementById('bestTime');
  if (bestTimes[level] !== undefined) {
    el.textContent = bestTimes[level] !== null ? `Best: ${bestTimes[level]}s` : '';
    return;
  }
  try {
    const res = await fetch(BRIDGE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'read', app: 'minesweeper', key: 'best-' + level }),
    });
    const data = await res.json();
    bestTimes[level] = data || null;
    el.textContent = data ? `Best: ${data}s` : '';
  } catch {
    bestTimes[level] = null;
    el.textContent = '';
  }
}

async function saveBestTime() {
  const el = document.getElementById('bestTime');
  const prev = bestTimes[level];
  if (prev !== null && prev !== undefined && prev <= seconds) {
    el.textContent = `Best: ${prev}s`;
    return;
  }
  bestTimes[level] = seconds;
  el.textContent = `Best: ${seconds}s`;
  try {
    await fetch(BRIDGE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'write', app: 'minesweeper', key: 'best-' + level, value: seconds }),
    });
  } catch {}
}

function setLevel(newLevel) {
  level = newLevel;
  document.querySelectorAll('.difficulty-bar button').forEach(b => {
    b.classList.toggle('active', b.dataset.level === level);
  });
  initGame();
}

document.querySelectorAll('.difficulty-bar button').forEach(b => {
  b.addEventListener('click', () => setLevel(b.dataset.level));
});
document.getElementById('faceBtn').addEventListener('click', initGame);

initGame();
</script>
</body>
</html>
