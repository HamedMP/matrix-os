<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Matrix OS</title>
  <style>
    :root {
      --bg: var(--matrix-bg, #f5f5f7);
      --fg: var(--matrix-fg, #1d1d1f);
      --accent: var(--matrix-accent, #007aff);
      --surface: var(--matrix-card-bg, #ffffff);
      --border: var(--matrix-border, #d2d2d7);
      --muted: var(--matrix-muted-fg, #86868b);
      --input-bg: var(--matrix-input-bg, #f5f5f7);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-y: auto;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* --- Hero Section --- */
    .hero {
      position: relative;
      background: linear-gradient(135deg,
        color-mix(in srgb, var(--accent) 12%, var(--bg)),
        color-mix(in srgb, var(--accent) 4%, var(--bg))
      );
      padding: 3rem 1.5rem 2.5rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -60%;
      left: -20%;
      width: 140%;
      height: 200%;
      background: radial-gradient(
        ellipse at 50% 0%,
        color-mix(in srgb, var(--accent) 8%, transparent) 0%,
        transparent 70%
      );
      pointer-events: none;
    }

    /* --- Avatar --- */
    .avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 1.25rem;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(145deg,
        var(--accent),
        color-mix(in srgb, var(--accent) 70%, #000)
      );
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      box-shadow:
        0 0 0 4px var(--surface),
        0 0 0 6px color-mix(in srgb, var(--accent) 30%, transparent),
        0 8px 24px color-mix(in srgb, var(--accent) 15%, transparent);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      user-select: none;
    }

    .avatar:hover {
      transform: scale(1.05);
    }

    /* --- Display Name --- */
    .display-name {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 0.5rem;
      color: var(--fg);
    }

    /* --- Handle Badge --- */
    .handle {
      display: inline-block;
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      color: var(--accent);
      font-size: 0.8125rem;
      font-weight: 500;
      padding: 0.3rem 0.85rem;
      border-radius: 100px;
      margin-bottom: 1rem;
      letter-spacing: 0.01em;
    }

    /* --- Bio --- */
    .bio {
      font-size: 1.0625rem;
      line-height: 1.65;
      color: var(--muted);
      max-width: 460px;
      margin: 0 auto 1.25rem;
    }

    /* --- Links --- */
    .links {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    .link-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--muted);
      font-size: 0.8125rem;
      font-weight: 500;
      text-decoration: none;
      padding: 0.4rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 100px;
      background: var(--surface);
      transition: all 0.2s ease;
    }

    .link-pill:hover {
      color: var(--accent);
      border-color: color-mix(in srgb, var(--accent) 40%, transparent);
      background: color-mix(in srgb, var(--accent) 5%, var(--surface));
      transform: translateY(-1px);
      box-shadow: 0 2px 8px color-mix(in srgb, var(--accent) 10%, transparent);
    }

    .link-pill svg {
      width: 14px;
      height: 14px;
      opacity: 0.6;
    }

    .link-pill:hover svg {
      opacity: 1;
    }

    /* --- Stats Strip --- */
    .stats-strip {
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--fg);
      line-height: 1.2;
    }

    .stat-label {
      font-size: 0.6875rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    /* --- Content Area --- */
    .content {
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
    }

    /* --- Section --- */
    .section-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .section-header h2 {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .section-header .line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* --- Apps Grid --- */
    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 0.75rem;
    }

    .app-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.125rem;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .app-card:hover {
      border-color: color-mix(in srgb, var(--accent) 30%, var(--border));
      box-shadow: 0 4px 16px color-mix(in srgb, var(--fg) 6%, transparent);
      transform: translateY(-2px);
    }

    .app-card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg,
        color-mix(in srgb, var(--accent) 15%, var(--bg)),
        color-mix(in srgb, var(--accent) 8%, var(--bg))
      );
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.75rem;
      color: var(--accent);
    }

    .app-card-name {
      font-weight: 600;
      font-size: 0.875rem;
      margin-bottom: 0.25rem;
      line-height: 1.3;
    }

    .app-card-desc {
      color: var(--muted);
      font-size: 0.75rem;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .app-card-badge {
      display: inline-block;
      font-size: 0.625rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      background: color-mix(in srgb, var(--accent) 8%, transparent);
      color: var(--accent);
      margin-top: 0.625rem;
    }

    /* --- Empty State --- */
    .empty-state {
      text-align: center;
      padding: 3rem 1.5rem;
    }

    .empty-illustration {
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem;
      position: relative;
    }

    .empty-illustration .circle {
      position: absolute;
      border-radius: 50%;
    }

    .empty-illustration .circle-1 {
      width: 120px;
      height: 120px;
      top: 0;
      left: 0;
      background: color-mix(in srgb, var(--accent) 6%, transparent);
    }

    .empty-illustration .circle-2 {
      width: 80px;
      height: 80px;
      top: 20px;
      left: 20px;
      background: color-mix(in srgb, var(--accent) 10%, transparent);
    }

    .empty-illustration .circle-3 {
      width: 40px;
      height: 40px;
      top: 40px;
      left: 40px;
      background: color-mix(in srgb, var(--accent) 18%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }

    .empty-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--fg);
      margin-bottom: 0.375rem;
    }

    .empty-desc {
      font-size: 0.8125rem;
      color: var(--muted);
      line-height: 1.5;
      max-width: 280px;
      margin: 0 auto 1.25rem;
    }

    .empty-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      padding: 0.5rem 1.1rem;
      border-radius: 100px;
      border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
      background: color-mix(in srgb, var(--accent) 5%, transparent);
      transition: all 0.2s ease;
      cursor: default;
    }

    .empty-cta:hover {
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      border-color: color-mix(in srgb, var(--accent) 40%, transparent);
    }

    /* --- Footer --- */
    .footer {
      text-align: center;
      padding: 2rem 1.5rem 2.5rem;
      color: var(--muted);
      font-size: 0.6875rem;
      letter-spacing: 0.02em;
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* --- Animations --- */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate {
      opacity: 0;
      animation: fadeInUp 0.5s ease forwards;
    }

    .animate-delay-1 { animation-delay: 0.05s; }
    .animate-delay-2 { animation-delay: 0.12s; }
    .animate-delay-3 { animation-delay: 0.2s; }
    .animate-delay-4 { animation-delay: 0.28s; }
    .animate-delay-5 { animation-delay: 0.36s; }
    .animate-delay-6 { animation-delay: 0.44s; }

    /* --- Loading Skeleton --- */
    .skeleton {
      background: linear-gradient(
        90deg,
        color-mix(in srgb, var(--fg) 5%, transparent) 0%,
        color-mix(in srgb, var(--fg) 10%, transparent) 50%,
        color-mix(in srgb, var(--fg) 5%, transparent) 100%
      );
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: 8px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
    }

    .skeleton-text {
      height: 14px;
      margin: 0.5rem auto;
    }

    .skeleton-text.w-48 { width: 180px; }
    .skeleton-text.w-32 { width: 120px; }
    .skeleton-text.w-64 { width: 260px; }
  </style>
</head>
<body>
  <!-- Hero Section -->
  <div class="hero" id="hero-section">
    <!-- Loading state -->
    <div id="loading-hero">
      <div class="skeleton skeleton-avatar" style="margin: 0 auto 1.25rem;"></div>
      <div class="skeleton skeleton-text w-48"></div>
      <div class="skeleton skeleton-text w-32"></div>
      <div class="skeleton skeleton-text w-64" style="margin-top: 1rem;"></div>
    </div>

    <!-- Profile content (hidden until loaded) -->
    <div id="profile-hero" style="display:none;">
      <div class="avatar-wrap animate animate-delay-1">
        <div class="avatar" id="avatar">?</div>
      </div>
      <h1 class="display-name animate animate-delay-2" id="display-name"></h1>
      <div class="animate animate-delay-3">
        <span class="handle" id="handle-text"></span>
      </div>
      <p class="bio animate animate-delay-4" id="bio"></p>
      <div class="links animate animate-delay-5" id="links"></div>
    </div>
  </div>

  <!-- Stats Strip -->
  <div class="stats-strip" id="stats-strip" style="display:none;">
    <div class="stat animate animate-delay-4">
      <div class="stat-value" id="stat-apps">0</div>
      <div class="stat-label">Published</div>
    </div>
    <div class="stat animate animate-delay-5">
      <div class="stat-value" id="stat-since">&mdash;</div>
      <div class="stat-label">Member since</div>
    </div>
  </div>

  <!-- Content Area -->
  <div class="content">
    <div class="section-header animate animate-delay-5" id="apps-header" style="display:none;">
      <h2>Published Apps</h2>
      <div class="line"></div>
    </div>
    <div id="apps-grid" class="apps-grid"></div>
  </div>

  <!-- Footer -->
  <div class="footer animate animate-delay-6">
    Powered by <a href="https://matrix-os.com">Matrix OS</a>
  </div>

  <!-- SVG Templates (hidden) -->
  <div id="svg-templates" style="display:none;">
    <svg id="tmpl-cube" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
    <svg id="tmpl-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <svg id="tmpl-link" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
  </div>

  <script>
    function cloneSvg(id) {
      const tmpl = document.getElementById(id);
      if (!tmpl) return document.createTextNode('');
      const clone = tmpl.cloneNode(true);
      clone.removeAttribute('id');
      clone.style.display = '';
      clone.style.width = '20px';
      clone.style.height = '20px';
      return clone;
    }

    function cloneSvgSmall(id) {
      const svg = cloneSvg(id);
      svg.style.width = '14px';
      svg.style.height = '14px';
      return svg;
    }

    function escapeAndSet(el, text) {
      el.textContent = text;
    }

    function showProfile() {
      document.getElementById('loading-hero').style.display = 'none';
      document.getElementById('profile-hero').style.display = '';
    }

    function renderEmptyState(container) {
      container.textContent = '';

      const wrapper = document.createElement('div');
      wrapper.className = 'empty-state animate animate-delay-5';

      const illustration = document.createElement('div');
      illustration.className = 'empty-illustration';

      const c1 = document.createElement('div');
      c1.className = 'circle circle-1';
      const c2 = document.createElement('div');
      c2.className = 'circle circle-2';
      const c3 = document.createElement('div');
      c3.className = 'circle circle-3';
      c3.appendChild(cloneSvg('tmpl-cube'));

      illustration.appendChild(c1);
      illustration.appendChild(c2);
      illustration.appendChild(c3);

      const title = document.createElement('div');
      title.className = 'empty-title';
      title.textContent = 'No apps yet';

      const desc = document.createElement('p');
      desc.className = 'empty-desc';
      desc.textContent = 'Published apps will appear here. Build something and share it with the world.';

      const cta = document.createElement('span');
      cta.className = 'empty-cta';
      const plusIcon = cloneSvgSmall('tmpl-plus');
      cta.appendChild(plusIcon);
      cta.appendChild(document.createTextNode(' Create an app'));

      wrapper.appendChild(illustration);
      wrapper.appendChild(title);
      wrapper.appendChild(desc);
      wrapper.appendChild(cta);
      container.appendChild(wrapper);
    }

    function renderAppCard(app, index) {
      const card = document.createElement('div');
      card.className = 'app-card animate';
      card.style.animationDelay = (0.36 + index * 0.06) + 's';

      const iconWrap = document.createElement('div');
      iconWrap.className = 'app-card-icon';
      iconWrap.appendChild(cloneSvg('tmpl-cube'));

      const nameEl = document.createElement('div');
      nameEl.className = 'app-card-name';
      nameEl.textContent = app.name || '';

      const descEl = document.createElement('div');
      descEl.className = 'app-card-desc';
      descEl.textContent = app.description || '';

      const badge = document.createElement('span');
      badge.className = 'app-card-badge';
      badge.textContent = app.category || 'app';

      card.appendChild(iconWrap);
      card.appendChild(nameEl);
      card.appendChild(descEl);
      card.appendChild(badge);

      return card;
    }

    function renderLinks(linksContainer, profile) {
      if (!profile.links || profile.links.length === 0) return;

      for (const link of profile.links) {
        const a = document.createElement('a');
        a.className = 'link-pill';
        a.href = link.url || '#';
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.appendChild(cloneSvgSmall('tmpl-link'));
        a.appendChild(document.createTextNode(' ' + (link.label || link.url || 'Link')));
        linksContainer.appendChild(a);
      }
    }

    (async () => {
      let profile = null;

      try {
        const profileRes = await fetch('/api/profile');
        if (profileRes.ok) {
          profile = await profileRes.json();
        }
      } catch (e) {
        console.error('Failed to load profile:', e);
      }

      if (profile) {
        const avatarEl = document.getElementById('avatar');
        const nameEl = document.getElementById('display-name');
        const handleEl = document.getElementById('handle-text');
        const bioEl = document.getElementById('bio');
        const linksEl = document.getElementById('links');

        if (profile.displayName) {
          nameEl.textContent = profile.displayName;
        } else {
          nameEl.textContent = profile.handle || 'Anonymous';
        }

        if (profile.handle) {
          avatarEl.textContent = profile.handle.charAt(0).toUpperCase();
          handleEl.textContent = '@' + profile.handle + ':matrix-os.com';
        }

        if (profile.bio) {
          bioEl.textContent = profile.bio;
        } else {
          bioEl.textContent = 'Welcome to my Matrix OS profile.';
        }

        renderLinks(linksEl, profile);

        if (profile.createdAt) {
          var date = new Date(profile.createdAt);
          document.getElementById('stat-since').textContent = date.getFullYear();
        } else {
          document.getElementById('stat-since').textContent = new Date().getFullYear();
        }
      } else {
        document.getElementById('display-name').textContent = 'Profile';
        document.getElementById('bio').textContent = 'Welcome to my Matrix OS profile.';
        document.getElementById('stat-since').textContent = new Date().getFullYear();
      }

      showProfile();

      try {
        var handle = profile && profile.handle;
        if (!handle) {
          renderEmptyState(document.getElementById('apps-grid'));
          document.getElementById('apps-header').style.display = '';
          document.getElementById('stats-strip').style.display = '';
          return;
        }

        var appsRes = await fetch('/api/store/apps?author=@' + encodeURIComponent(handle));
        if (!appsRes.ok) {
          renderEmptyState(document.getElementById('apps-grid'));
          document.getElementById('apps-header').style.display = '';
          document.getElementById('stats-strip').style.display = '';
          return;
        }

        var data = await appsRes.json();
        var grid = document.getElementById('apps-grid');
        var apps = data.apps || [];

        document.getElementById('stat-apps').textContent = apps.length;
        document.getElementById('stats-strip').style.display = '';

        if (apps.length === 0) {
          renderEmptyState(grid);
          document.getElementById('apps-header').style.display = '';
          return;
        }

        document.getElementById('apps-header').style.display = '';

        for (var i = 0; i < apps.length; i++) {
          grid.appendChild(renderAppCard(apps[i], i));
        }
      } catch (e) {
        console.error('Failed to load apps:', e);
        renderEmptyState(document.getElementById('apps-grid'));
        document.getElementById('apps-header').style.display = '';
        document.getElementById('stats-strip').style.display = '';
      }
    })();
  </script>
</body>
</html>
