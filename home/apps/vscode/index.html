<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VS Code</title>
  <style>
    :root {
      --bg: var(--matrix-bg, #1e1e1e);
      --fg: var(--matrix-fg, #cccccc);
      --accent: var(--matrix-accent, #007aff);
      --surface: var(--matrix-card-bg, #252526);
      --border: var(--matrix-border, #3c3c3c);
      --muted: var(--matrix-muted-fg, #858585);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--fg);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f59e0b;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .status-dot.connected { background: #22c55e; animation: none; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-text { font-size: 14px; color: var(--muted); }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      max-width: 360px;
    }
    .feature {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
    }
    .feature strong { display: block; margin-bottom: 4px; }
    .viewer {
      position: absolute;
      inset: 0;
      display: none;
    }
    .viewer iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Connecting to code-server...</span>
  </div>
  <h1>VS Code</h1>
  <p class="subtitle">Full development environment in the browser</p>
  <div class="features">
    <div class="feature"><strong>IntelliSense</strong>Smart completions</div>
    <div class="feature"><strong>Terminal</strong>Integrated shell</div>
    <div class="feature"><strong>Extensions</strong>Rich ecosystem</div>
    <div class="feature"><strong>Git</strong>Version control</div>
  </div>
  <div class="viewer" id="viewer">
    <iframe id="codeFrame" src="about:blank"></iframe>
  </div>
  <script>
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const viewer = document.getElementById("viewer");
    const codeFrame = document.getElementById("codeFrame");

    const moduleUrl = "/modules/vscode/";

    async function tryConnect() {
      try {
        const res = await fetch(moduleUrl, { signal: AbortSignal.timeout(3000) });
        if (res.ok) {
          statusDot.classList.add("connected");
          statusText.textContent = "Connected";
          viewer.style.display = "block";
          codeFrame.src = moduleUrl;
        }
      } catch {
        setTimeout(tryConnect, 2000);
      }
    }
    tryConnect();
  </script>
</body>
</html>
