<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser</title>
  <style>
    :root {
      --bg: var(--matrix-bg, #f5f5f7);
      --fg: var(--matrix-fg, #1d1d1f);
      --accent: var(--matrix-accent, #007aff);
      --surface: var(--matrix-card-bg, #ffffff);
      --border: var(--matrix-border, #d2d2d7);
      --muted: var(--matrix-muted-fg, #86868b);
      --input-bg: var(--matrix-input-bg, #f5f5f7);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--fg);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .toolbar button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      width: 28px;
      height: 28px;
      cursor: pointer;
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .toolbar button:hover {
      background: color-mix(in srgb, var(--fg) 4%, transparent);
    }
    #urlBar {
      flex: 1;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0 10px;
      font-size: 13px;
      background: var(--input-bg);
      color: var(--fg);
      outline: none;
    }
    #urlBar:focus { border-color: var(--accent); }
    .content {
      flex: 1;
      position: relative;
    }
    .content iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="backBtn" title="Back">&#8592;</button>
    <button id="fwdBtn" title="Forward">&#8594;</button>
    <button id="reloadBtn" title="Reload">&#8635;</button>
    <input id="urlBar" type="text" placeholder="Enter URL" />
  </div>
  <div class="content">
    <iframe id="viewer" src="about:blank"></iframe>
  </div>
  <script>
    const urlBar = document.getElementById("urlBar");
    const viewer = document.getElementById("viewer");
    const backBtn = document.getElementById("backBtn");
    const fwdBtn = document.getElementById("fwdBtn");
    const reloadBtn = document.getElementById("reloadBtn");

    urlBar.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        let url = urlBar.value.trim();
        if (url && !url.startsWith("http")) url = "https://" + url;
        viewer.src = url;
      }
    });
    backBtn.addEventListener("click", () => history.back());
    fwdBtn.addEventListener("click", () => history.forward());
    reloadBtn.addEventListener("click", () => {
      if (viewer.src) viewer.src = viewer.src;
    });
  </script>
</body>
</html>
