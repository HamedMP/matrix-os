<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages - Matrix OS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: var(--matrix-bg, #0a0a0a);
      --fg: var(--matrix-fg, #e5e5e5);
      --accent: var(--matrix-accent, #3b82f6);
      --border: var(--matrix-border, #27272a);
      --card-bg: var(--matrix-card-bg, #18181b);
    }
    body {
      font-family: var(--matrix-font, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif);
      background: var(--bg);
      color: var(--fg);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
    }
    .new-chat-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 0.4rem;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .conversation-list {
      flex: 1;
      overflow-y: auto;
    }
    .conversation-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .conversation-item:hover {
      background: var(--card-bg);
    }
    .conv-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      flex-shrink: 0;
    }
    .conv-info {
      flex: 1;
      min-width: 0;
    }
    .conv-name {
      font-weight: 600;
      font-size: 0.9rem;
    }
    .conv-preview {
      font-size: 0.8rem;
      opacity: 0.6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .conv-time {
      font-size: 0.75rem;
      opacity: 0.5;
      flex-shrink: 0;
    }
    .chat-view {
      display: none;
      flex-direction: column;
      height: 100%;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }
    .message-bubble {
      max-width: 80%;
      padding: 0.5rem 0.75rem;
      border-radius: 1rem;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      line-height: 1.4;
    }
    .message-sent {
      margin-left: auto;
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 0.25rem;
    }
    .message-received {
      background: var(--card-bg);
      border-bottom-left-radius: 0.25rem;
    }
    .chat-input-bar {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--border);
    }
    .chat-input-bar input {
      flex: 1;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      padding: 0.5rem 1rem;
      color: var(--fg);
      font-size: 0.9rem;
      outline: none;
    }
    .send-btn {
      background: var(--accent);
      color: white;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
    }
    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      opacity: 0.6;
    }
    .empty-state h3 { margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <header>
    <h1>Messages</h1>
    <button class="new-chat-btn">New</button>
  </header>
  <div class="conversation-list">
    <div class="empty-state">
      <h3>No conversations yet</h3>
      <p>Start a conversation with another Matrix OS user.</p>
    </div>
  </div>
</body>
</html>
