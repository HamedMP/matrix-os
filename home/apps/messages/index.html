<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages - Matrix OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap');

:root {
  --bg: var(--matrix-bg, #f5f5f7);
  --fg: var(--matrix-fg, #1d1d1f);
  --accent: var(--matrix-accent, #6366f1);
  --border: var(--matrix-border, #e5e7eb);
  --card-bg: var(--matrix-card-bg, #ffffff);
  --muted: var(--matrix-muted-fg, #9ca3af);
  --input-bg: var(--matrix-input-bg, #f3f4f6);
  --font: var(--matrix-font, 'DM Sans', system-ui, -apple-system, sans-serif);

  --accent-soft: color-mix(in srgb, var(--accent) 10%, transparent);
  --accent-hover: color-mix(in srgb, var(--accent) 15%, transparent);
  --hover-bg: color-mix(in srgb, var(--fg) 4%, transparent);
  --sent-bg: var(--accent);
  --sent-fg: #ffffff;
  --received-bg: var(--card-bg);
  --received-fg: var(--fg);
  --ai-glow: color-mix(in srgb, var(--accent) 20%, transparent);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --transition: 200ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--fg);
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ===== Layout ===== */
.app {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ===== Conversation List Panel ===== */
.panel-list {
  width: 320px;
  min-width: 280px;
  max-width: 380px;
  display: flex;
  flex-direction: column;
  background: color-mix(in srgb, var(--card-bg) 80%, var(--bg));
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-right: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 2;
}

.list-header {
  padding: 20px 20px 0;
  flex-shrink: 0;
}

.list-header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.list-header h1 {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.03em;
}

.btn-new-chat {
  width: 34px;
  height: 34px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 100ms ease-out, opacity var(--transition);
}

.btn-new-chat:hover { opacity: 0.9; }
.btn-new-chat:active { transform: scale(0.92); }
.btn-new-chat:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

.search-wrapper {
  position: relative;
  margin-bottom: 12px;
}

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 15px;
  height: 15px;
  color: var(--muted);
  pointer-events: none;
}

.search-input {
  width: 100%;
  background: var(--input-bg);
  color: var(--fg);
  border: 1px solid transparent;
  border-radius: 10px;
  padding: 9px 12px 9px 36px;
  font-size: 14px;
  font-family: inherit;
  transition: border-color var(--transition), box-shadow var(--transition);
}

.search-input::placeholder { color: var(--muted); }
.search-input:hover { border-color: var(--border); }
.search-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 16%, transparent);
}

/* Conversation List */
.conversation-list {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 0 8px 8px;
}

.conversation-list::-webkit-scrollbar { width: 5px; }
.conversation-list::-webkit-scrollbar-track { background: transparent; }
.conversation-list::-webkit-scrollbar-thumb {
  background: color-mix(in srgb, var(--fg) 12%, transparent);
  border-radius: 3px;
}
.conversation-list::-webkit-scrollbar-thumb:hover {
  background: color-mix(in srgb, var(--fg) 22%, transparent);
}

.conv-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background var(--transition);
  position: relative;
}

.conv-item:hover { background: var(--hover-bg); }
.conv-item.active { background: var(--accent-soft); }
.conv-item.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 24px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}

.conv-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 16px;
  color: #fff;
  flex-shrink: 0;
  position: relative;
}

.conv-avatar.ai-avatar {
  box-shadow: 0 0 0 2px var(--card-bg), 0 0 0 3px var(--accent);
}

.online-dot {
  position: absolute;
  bottom: 1px;
  right: 1px;
  width: 10px;
  height: 10px;
  background: #22c55e;
  border-radius: 50%;
  border: 2px solid var(--card-bg);
}

.conv-body {
  flex: 1;
  min-width: 0;
}

.conv-top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 2px;
}

.conv-name {
  font-weight: 600;
  font-size: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex;
  align-items: center;
  gap: 5px;
}

.ai-badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.04em;
  background: color-mix(in srgb, var(--accent) 15%, transparent);
  color: var(--accent);
  padding: 1px 5px;
  border-radius: 4px;
  flex-shrink: 0;
}

.conv-time {
  font-size: 12px;
  color: var(--muted);
  flex-shrink: 0;
  font-weight: 500;
}

.conv-preview-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.conv-preview {
  font-size: 13px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.conv-item.unread .conv-name { color: var(--fg); }
.conv-item.unread .conv-preview { color: var(--fg); font-weight: 500; }
.conv-item.unread .conv-time { color: var(--accent); font-weight: 600; }

.unread-badge {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 30px;
  text-align: center;
  height: 100%;
}

.empty-icon {
  width: 64px;
  height: 64px;
  border-radius: 20px;
  background: var(--accent-soft);
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
}

.empty-state h3 {
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 6px;
}

.empty-state p {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.5;
  max-width: 240px;
  margin-bottom: 20px;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: opacity var(--transition), transform 100ms ease-out;
}

.btn-primary:hover { opacity: 0.9; }
.btn-primary:active { transform: scale(0.97); }

/* ===== Chat Panel ===== */
.panel-chat {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--bg);
}

.chat-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: color-mix(in srgb, var(--card-bg) 80%, var(--bg));
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  flex-shrink: 0;
}

.btn-back {
  display: none;
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--accent);
  cursor: pointer;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background var(--transition);
}

.btn-back:hover { background: var(--accent-soft); }

.chat-header-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 14px;
  color: #fff;
  flex-shrink: 0;
}

.chat-header-avatar.ai-avatar {
  box-shadow: 0 0 0 2px var(--card-bg), 0 0 0 3px var(--accent);
}

.chat-header-info {
  flex: 1;
  min-width: 0;
}

.chat-header-name {
  font-size: 15px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}

.chat-header-status {
  font-size: 12px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 4px;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #22c55e;
}

.status-dot.offline { background: var(--muted); }

/* Chat messages area */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.chat-messages::-webkit-scrollbar { width: 5px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb {
  background: color-mix(in srgb, var(--fg) 10%, transparent);
  border-radius: 3px;
}

/* Date separator */
.date-separator {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px 0;
  margin: 4px 0;
}

.date-separator span {
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  background: var(--bg);
  padding: 4px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
}

/* Message groups */
.message-group {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  max-width: 75%;
  animation: msgSlideIn 250ms cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
}

@keyframes msgSlideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.message-group.sent {
  align-self: flex-end;
  flex-direction: row-reverse;
}

.message-group.received {
  align-self: flex-start;
}

.msg-avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 11px;
  color: #fff;
  flex-shrink: 0;
  align-self: flex-end;
}

.msg-avatar.ai-avatar {
  box-shadow: 0 0 0 1.5px var(--bg), 0 0 0 2.5px var(--accent);
}

.msg-avatar-placeholder {
  width: 30px;
  flex-shrink: 0;
}

.msg-content {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.msg-sender {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 2px;
  margin-left: 4px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.msg-bubble {
  padding: 10px 14px;
  font-size: 14px;
  line-height: 1.45;
  word-wrap: break-word;
  position: relative;
  max-width: 100%;
}

.msg-bubble a {
  color: inherit;
  text-decoration: underline;
  text-underline-offset: 2px;
}

.sent .msg-bubble {
  background: var(--sent-bg);
  color: var(--sent-fg);
  border-radius: var(--radius-lg) var(--radius-lg) 4px var(--radius-lg);
}

.sent .msg-bubble a { color: var(--sent-fg); opacity: 0.9; }

.sent .msg-content .msg-bubble:first-of-type {
  border-radius: var(--radius-lg) var(--radius-lg) 4px var(--radius-lg);
}

.sent .msg-content .msg-bubble:last-of-type {
  border-radius: var(--radius-lg) 4px 4px var(--radius-lg);
}

.sent .msg-content .msg-bubble:only-of-type {
  border-radius: var(--radius-lg) var(--radius-lg) 4px var(--radius-lg);
}

.received .msg-bubble {
  background: var(--received-bg);
  color: var(--received-fg);
  border-radius: var(--radius-lg) var(--radius-lg) var(--radius-lg) 4px;
  box-shadow: var(--shadow-sm);
}

.received .msg-content .msg-bubble:first-of-type {
  border-radius: var(--radius-lg) var(--radius-lg) var(--radius-lg) 4px;
}

.received .msg-content .msg-bubble:last-of-type {
  border-radius: 4px var(--radius-lg) var(--radius-lg) var(--radius-lg);
}

.received .msg-content .msg-bubble:only-of-type {
  border-radius: var(--radius-lg) var(--radius-lg) var(--radius-lg) 4px;
}

/* AI message glow */
.ai-message .msg-bubble {
  border: 1px solid color-mix(in srgb, var(--accent) 18%, transparent);
}

.msg-time {
  font-size: 11px;
  color: var(--muted);
  margin-top: 3px;
  opacity: 0;
  transition: opacity 150ms ease;
}

.message-group:hover .msg-time { opacity: 1; }
.sent .msg-time { text-align: right; margin-right: 4px; }
.received .msg-time { margin-left: 4px; }

/* System messages */
.system-message {
  text-align: center;
  padding: 8px 16px;
  margin: 8px 0;
  animation: msgSlideIn 250ms cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
}

.system-message span {
  font-size: 12px;
  color: var(--muted);
  background: color-mix(in srgb, var(--fg) 4%, transparent);
  padding: 4px 12px;
  border-radius: 20px;
}

/* Typing indicator */
.typing-indicator {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 4px 0 8px;
  margin-left: 38px;
  animation: msgSlideIn 200ms ease both;
}

.typing-indicator.visible { display: flex; }

.typing-dots {
  display: flex;
  gap: 3px;
  background: var(--received-bg);
  padding: 10px 14px;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
}

.typing-dots span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--muted);
  animation: typingBounce 1.4s infinite ease-in-out both;
}

.typing-dots span:nth-child(1) { animation-delay: 0ms; }
.typing-dots span:nth-child(2) { animation-delay: 160ms; }
.typing-dots span:nth-child(3) { animation-delay: 320ms; }

@keyframes typingBounce {
  0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

.typing-name {
  font-size: 12px;
  color: var(--muted);
  font-style: italic;
}

/* Input bar */
.chat-input-bar {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  padding: 12px 20px 16px;
  border-top: 1px solid var(--border);
  background: color-mix(in srgb, var(--card-bg) 80%, var(--bg));
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  flex-shrink: 0;
}

.input-wrapper {
  flex: 1;
  position: relative;
}

.msg-textarea {
  width: 100%;
  background: var(--input-bg);
  color: var(--fg);
  border: 1px solid transparent;
  border-radius: var(--radius-lg);
  padding: 10px 16px;
  font-size: 14px;
  font-family: inherit;
  line-height: 1.45;
  resize: none;
  min-height: 42px;
  max-height: 120px;
  transition: border-color var(--transition), box-shadow var(--transition);
  overflow-y: auto;
}

.msg-textarea::placeholder { color: var(--muted); }
.msg-textarea:hover { border-color: var(--border); }
.msg-textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 14%, transparent);
}

.btn-send {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity var(--transition), transform 100ms ease-out;
}

.btn-send:disabled {
  opacity: 0.35;
  cursor: default;
  transform: none;
}

.btn-send:not(:disabled):hover { opacity: 0.9; }
.btn-send:not(:disabled):active { transform: scale(0.9); }

/* Chat empty state */
.chat-empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
}

.chat-empty-icon {
  width: 80px;
  height: 80px;
  border-radius: 24px;
  background: var(--accent-soft);
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
}

.chat-empty-state h2 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
}

.chat-empty-state p {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.5;
  max-width: 300px;
}

/* ===== New Chat Modal ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 100;
  align-items: center;
  justify-content: center;
  animation: fadeIn 150ms ease both;
}

.modal-overlay.visible {
  display: flex;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal {
  background: var(--card-bg);
  border-radius: var(--radius-xl);
  width: 90%;
  max-width: 420px;
  max-height: 70vh;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
  animation: modalSlideUp 250ms cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
  overflow: hidden;
}

@keyframes modalSlideUp {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 20px 0;
}

.modal-header h2 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.btn-close-modal {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: none;
  background: var(--input-bg);
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition);
}

.btn-close-modal:hover { background: var(--border); }

.modal-search {
  padding: 16px 20px;
}

.modal-search input {
  width: 100%;
  background: var(--input-bg);
  color: var(--fg);
  border: 1px solid transparent;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 14px;
  font-family: inherit;
  transition: border-color var(--transition);
}

.modal-search input::placeholder { color: var(--muted); }
.modal-search input:focus {
  outline: none;
  border-color: var(--accent);
}

.modal-user-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 12px 12px;
}

.modal-user-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background var(--transition);
}

.modal-user-item:hover { background: var(--hover-bg); }
.modal-user-item:active { background: var(--accent-soft); }

.modal-user-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 15px;
  color: #fff;
  flex-shrink: 0;
}

.modal-user-avatar.ai-avatar {
  box-shadow: 0 0 0 2px var(--card-bg), 0 0 0 3px var(--accent);
}

.modal-user-info {
  flex: 1;
  min-width: 0;
}

.modal-user-name {
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 5px;
}

.modal-user-handle {
  font-size: 12px;
  color: var(--muted);
}

.modal-empty {
  text-align: center;
  padding: 30px 20px;
  color: var(--muted);
  font-size: 14px;
}

/* ===== Responsive ===== */
@media (max-width: 640px) {
  .panel-list {
    width: 100%;
    max-width: 100%;
    position: absolute;
    inset: 0;
    z-index: 3;
    transition: transform 300ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .panel-list.hidden {
    transform: translateX(-100%);
    pointer-events: none;
  }

  .panel-chat {
    position: absolute;
    inset: 0;
    z-index: 4;
    transform: translateX(100%);
    transition: transform 300ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .panel-chat.active {
    transform: translateX(0);
  }

  .btn-back { display: flex; }

  .app { position: relative; }
}

/* ===== Scrollbar global ===== */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: color-mix(in srgb, var(--fg) 10%, transparent);
  border-radius: 3px;
}

/* ===== Focus-visible everywhere ===== */
*:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* Utility */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Left: Conversation List -->
  <div class="panel-list" id="panelList">
    <div class="list-header">
      <div class="list-header-top">
        <h1>Messages</h1>
        <button class="btn-new-chat" id="btnNewChat" aria-label="New conversation" title="New conversation">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="12" y1="8" x2="12" y2="14"/><line x1="9" y1="11" x2="15" y2="11"/></svg>
        </button>
      </div>
      <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Search conversations..." aria-label="Search conversations" />
      </div>
    </div>
    <div class="conversation-list" id="convList" role="listbox" aria-label="Conversations">
    </div>
  </div>

  <!-- Right: Chat View -->
  <div class="panel-chat" id="panelChat">
    <div class="chat-header" id="chatHeader" style="display:none">
      <button class="btn-back" id="btnBack" aria-label="Back to conversations">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="chat-header-avatar" id="chatAvatar"></div>
      <div class="chat-header-info">
        <div class="chat-header-name" id="chatName"></div>
        <div class="chat-header-status" id="chatStatus"><span class="status-dot"></span> Online</div>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages" style="display:none" aria-live="polite" role="log"></div>

    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-dots"><span></span><span></span><span></span></div>
      <span class="typing-name" id="typingName">typing...</span>
    </div>

    <div class="chat-input-bar" id="chatInputBar" style="display:none">
      <div class="input-wrapper">
        <textarea class="msg-textarea" id="msgInput" rows="1" placeholder="Type a message..." aria-label="Message input"></textarea>
      </div>
      <button class="btn-send" id="btnSend" disabled aria-label="Send message">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>

    <div class="chat-empty-state" id="chatEmptyState">
      <div class="chat-empty-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      </div>
      <h2>Your messages</h2>
      <p>Select a conversation or start a new one to begin chatting.</p>
    </div>
  </div>
</div>

<!-- New Chat Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal" role="dialog" aria-label="New conversation" aria-modal="true">
    <div class="modal-header">
      <h2>New conversation</h2>
      <button class="btn-close-modal" id="btnCloseModal" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-search">
      <input type="text" id="modalSearchInput" placeholder="Search by name or handle..." aria-label="Search users" />
    </div>
    <div class="modal-user-list" id="modalUserList" role="listbox" aria-label="Users">
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  var STORAGE_KEY = 'matrixos_messages_conversations';
  var BRIDGE_APP = 'messages';
  var BRIDGE_KEY = 'conversations';
  var MY_HANDLE = '@me';

  var AVATAR_COLORS = [
    '#6366f1', '#8b5cf6', '#a855f7', '#d946ef', '#ec4899',
    '#f43f5e', '#ef4444', '#f97316', '#eab308', '#22c55e',
    '#14b8a6', '#06b6d4', '#3b82f6', '#2563eb', '#7c3aed'
  ];

  var state = {
    conversations: [],
    activeConvId: null,
    isMobile: window.innerWidth <= 640
  };

  function $(s) { return document.querySelector(s); }

  var panelList = $('#panelList');
  var panelChat = $('#panelChat');
  var convListEl = $('#convList');
  var searchInput = $('#searchInput');
  var chatHeader = $('#chatHeader');
  var chatMessages = $('#chatMessages');
  var chatInputBar = $('#chatInputBar');
  var chatEmptyState = $('#chatEmptyState');
  var chatAvatar = $('#chatAvatar');
  var chatName = $('#chatName');
  var chatStatus = $('#chatStatus');
  var msgInput = $('#msgInput');
  var btnSend = $('#btnSend');
  var btnBack = $('#btnBack');
  var btnNewChat = $('#btnNewChat');
  var modalOverlay = $('#modalOverlay');
  var modalUserList = $('#modalUserList');
  var modalSearchInput = $('#modalSearchInput');
  var btnCloseModal = $('#btnCloseModal');
  var typingIndicator = $('#typingIndicator');
  var typingNameEl = $('#typingName');

  function uid() {
    return 'msg_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  function convUid() {
    return 'conv_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  function hashStr(str) {
    var h = 0;
    for (var i = 0; i < str.length; i++) {
      h = ((h << 5) - h + str.charCodeAt(i)) | 0;
    }
    return Math.abs(h);
  }

  function avatarColor(name) {
    return AVATAR_COLORS[hashStr(name || '') % AVATAR_COLORS.length];
  }

  function avatarInitial(name) {
    if (!name) return '?';
    var clean = name.replace(/^@/, '').replace(/_ai$/, '');
    return clean.charAt(0).toUpperCase();
  }

  function isAI(handle) {
    return handle && (handle.endsWith('_ai') || handle.endsWith('_ai:matrix-os.com'));
  }

  function displayName(conv) {
    return conv.name || (conv.participants ? conv.participants.find(function(p) { return p !== MY_HANDLE; }) : '') || 'Unknown';
  }

  function formatTime(ts) {
    if (!ts) return '';
    var d = new Date(ts);
    var now = new Date();
    var diff = now - d;
    var mins = Math.floor(diff / 60000);
    var hours = Math.floor(diff / 3600000);
    var days = Math.floor(diff / 86400000);
    if (mins < 1) return 'now';
    if (mins < 60) return mins + 'm';
    if (hours < 24) return hours + 'h';
    if (days < 7) {
      return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
    }
    return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()] + ' ' + d.getDate();
  }

  function formatMessageTime(ts) {
    if (!ts) return '';
    return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function formatDateSeparator(ts) {
    var d = new Date(ts);
    var now = new Date();
    var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    var msgDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    var diff = today - msgDay;
    if (diff === 0) return 'Today';
    if (diff === 86400000) return 'Yesterday';
    return ['January','February','March','April','May','June','July','August','September','October','November','December'][d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  }

  function escapeHtml(text) {
    var el = document.createElement('div');
    el.textContent = text;
    return el.innerHTML;
  }

  function buildBubbleContent(bubble, text) {
    var urlRe = /(https?:\/\/[^\s]+)/g;
    var lines = String(text).split('\n');
    lines.forEach(function(line, li) {
      var parts = line.split(urlRe);
      parts.forEach(function(part) {
        urlRe.lastIndex = 0;
        if (urlRe.test(part)) {
          var a = document.createElement('a');
          a.href = part; a.target = '_blank'; a.rel = 'noopener noreferrer';
          a.textContent = part; bubble.appendChild(a);
        } else if (part) {
          bubble.appendChild(document.createTextNode(part));
        }
      });
      if (li < lines.length - 1) bubble.appendChild(document.createElement('br'));
    });
  }

  // -- DOM builders (safe, no innerHTML with user data) --

  function createEl(tag, className, attrs) {
    var el = document.createElement(tag);
    if (className) el.className = className;
    if (attrs) {
      Object.keys(attrs).forEach(function(k) { el.setAttribute(k, attrs[k]); });
    }
    return el;
  }

  function textEl(tag, className, text) {
    var el = createEl(tag, className);
    el.textContent = text;
    return el;
  }

  // -- Data Persistence --

  function loadConversations() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        if (Array.isArray(parsed) && parsed.every(function(c) {
          return c && typeof c.id === 'string' && Array.isArray(c.participants) && Array.isArray(c.messages);
        })) {
          state.conversations = parsed;
          return;
        }
      }
    } catch (e) { /* ignore */ }
    seedDemoData();
  }

  function saveConversations() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.conversations));
    } catch (e) {
      state.conversations.forEach(function(c) {
        if (c.messages.length > 100) c.messages = c.messages.slice(-100);
      });
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.conversations)); } catch(e2) {}
    }
    saveToBridge();
  }

  function saveToBridge() {
    try {
      fetch('/api/bridge/data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'write', app: BRIDGE_APP, key: BRIDGE_KEY, value: JSON.stringify({ conversations: state.conversations }) })
      }).catch(function() {});
    } catch (e) { /* bridge not available */ }
  }

  function mergeConversations(incoming) {
    if (!Array.isArray(incoming)) return;
    incoming.forEach(function(bc) {
      var existing = state.conversations.find(function(c) { return c.id === bc.id; });
      if (!existing) { state.conversations.push(bc); return; }
      if (!Array.isArray(bc.messages)) return;
      bc.messages.forEach(function(msg) {
        if (!existing.messages.find(function(m) { return m.id === msg.id; })) {
          existing.messages.push(msg);
        }
      });
      existing.messages.sort(function(a, b) { return new Date(a.timestamp) - new Date(b.timestamp); });
    });
    renderConversationList();
  }

  function loadFromBridge() {
    fetch('/api/bridge/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'read', app: BRIDGE_APP, key: BRIDGE_KEY })
    }).then(function(res) { return res.ok ? res.json() : null; })
      .then(function(data) {
        if (data && data.value) {
          try {
            var parsed = JSON.parse(data.value);
            if (parsed && Array.isArray(parsed.conversations)) mergeConversations(parsed.conversations);
          } catch(e) {}
        }
      })
      .catch(function() {});
  }

  // -- Demo Data --

  function seedDemoData() {
    var now = new Date();
    function ago(mins) { return new Date(now - mins * 60000).toISOString(); }

    state.conversations = [
      {
        id: convUid(),
        participants: [MY_HANDLE, '@matrixos'],
        name: 'Matrix OS',
        lastMessage: 'Try starting a new conversation using the button in the top right.',
        lastMessageAt: ago(5),
        unreadCount: 1,
        isAI: false,
        isSystem: true,
        online: true,
        messages: [
          { id: uid(), sender: '@matrixos', content: 'Welcome to Matrix OS Messages!', timestamp: ago(30), type: 'text' },
          { id: uid(), sender: '@matrixos', content: 'You can message any user on the platform. Your conversations are end-to-end encrypted via the Matrix protocol.', timestamp: ago(29), type: 'text' },
          { id: uid(), sender: '@matrixos', content: 'Try starting a new conversation using the button in the top right.', timestamp: ago(5), type: 'text' }
        ]
      },
      {
        id: convUid(),
        participants: [MY_HANDLE, '@alice_ai'],
        name: 'Alice',
        lastMessage: 'Let me know if you need help with anything else!',
        lastMessageAt: ago(45),
        unreadCount: 0,
        isAI: true,
        online: true,
        messages: [
          { id: uid(), sender: MY_HANDLE, content: 'Hey Alice, can you help me organize my tasks for today?', timestamp: ago(120), type: 'text' },
          { id: uid(), sender: '@alice_ai', content: 'Of course! I can help you with that. What tasks do you have on your plate today?', timestamp: ago(118), type: 'text' },
          { id: uid(), sender: MY_HANDLE, content: 'I need to finish the project proposal, review the design specs, and prepare for the team meeting.', timestamp: ago(115), type: 'text' },
          { id: uid(), sender: '@alice_ai', content: 'Great list! Here is a suggested priority order:\n\n1. Review design specs (30 min) -- quick win to start the day\n2. Finish project proposal (2 hrs) -- deep focus block\n3. Prepare for team meeting (45 min) -- use the proposal as prep\n\nWant me to set up time blocks in your calendar?', timestamp: ago(112), type: 'text' },
          { id: uid(), sender: MY_HANDLE, content: 'That sounds perfect, thanks!', timestamp: ago(50), type: 'text' },
          { id: uid(), sender: '@alice_ai', content: 'Let me know if you need help with anything else!', timestamp: ago(45), type: 'text' }
        ]
      },
      {
        id: convUid(),
        participants: [MY_HANDLE, '@sam'],
        name: 'Sam',
        lastMessage: 'See you at the meeting!',
        lastMessageAt: ago(180),
        unreadCount: 0,
        isAI: false,
        online: false,
        messages: [
          { id: uid(), sender: '@sam', content: 'Hey, are you joining the design review at 3pm?', timestamp: ago(200), type: 'text' },
          { id: uid(), sender: MY_HANDLE, content: 'Yes, I will be there. Do I need to prepare anything?', timestamp: ago(195), type: 'text' },
          { id: uid(), sender: '@sam', content: 'Just bring your feedback on the new layout. Nothing major.', timestamp: ago(190), type: 'text' },
          { id: uid(), sender: MY_HANDLE, content: 'Sounds good.', timestamp: ago(185), type: 'text' },
          { id: uid(), sender: '@sam', content: 'See you at the meeting!', timestamp: ago(180), type: 'text' }
        ]
      }
    ];

    saveConversations();
  }

  // -- Available Users --

  var knownUsers = [
    { handle: '@matrixos', name: 'Matrix OS', isAI: false },
    { handle: '@alice_ai', name: 'Alice', isAI: true },
    { handle: '@bob_ai', name: 'Bob', isAI: true },
    { handle: '@sam', name: 'Sam', isAI: false },
    { handle: '@elena', name: 'Elena', isAI: false },
    { handle: '@kai', name: 'Kai', isAI: false },
    { handle: '@researcher_ai', name: 'Researcher', isAI: true }
  ];

  function fetchUsers() {
    fetch('/api/social/users')
      .then(function(res) { return res.ok ? res.json() : []; })
      .then(function(users) {
        if (Array.isArray(users)) {
          users.forEach(function(u) {
            var h = u.handle || ('@' + u.name);
            if (!knownUsers.find(function(k) { return k.handle === h; })) {
              knownUsers.push({ handle: h, name: u.name || h, isAI: isAI(h) });
            }
          });
        }
      })
      .catch(function() {});
  }

  // -- Render: Conversation List --

  function renderConversationList(filter) {
    var search = (filter || '').toLowerCase().trim();
    var convs = state.conversations;

    if (search) {
      convs = convs.filter(function(c) {
        var name = displayName(c).toLowerCase();
        var handle = ((c.participants || []).find(function(p) { return p !== MY_HANDLE; }) || '').toLowerCase();
        return name.indexOf(search) !== -1 || handle.indexOf(search) !== -1;
      });
    }

    convs = convs.slice().sort(function(a, b) {
      return new Date(b.lastMessageAt) - new Date(a.lastMessageAt);
    });

    convListEl.textContent = '';

    if (convs.length === 0) {
      var empty = createEl('div', 'empty-state');

      var iconWrap = createEl('div', 'empty-icon');
      iconWrap.appendChild(createSvgIcon('chat-bubble', 28));
      empty.appendChild(iconWrap);

      empty.appendChild(textEl('h3', null, search ? 'No matches found' : 'No conversations yet'));
      empty.appendChild(textEl('p', null, search ? 'Try a different search term.' : 'Start a conversation with someone on the platform.'));

      if (!search) {
        var btn = createEl('button', 'btn-primary');
        btn.textContent = 'New conversation';
        btn.addEventListener('click', function() { btnNewChat.click(); });
        empty.appendChild(btn);
      }

      convListEl.appendChild(empty);
      return;
    }

    convs.forEach(function(conv) {
      var el = createEl('div', 'conv-item' + (conv.id === state.activeConvId ? ' active' : '') + (conv.unreadCount > 0 ? ' unread' : ''));
      el.setAttribute('role', 'option');
      el.setAttribute('tabindex', '0');
      el.setAttribute('aria-selected', conv.id === state.activeConvId ? 'true' : 'false');

      var other = (conv.participants || []).find(function(p) { return p !== MY_HANDLE; }) || '';
      var name = displayName(conv);
      var color = avatarColor(other);
      var initial = avatarInitial(name);
      var aiConv = conv.isAI || isAI(other);
      var online = conv.online !== false;

      var avatarEl = createEl('div', 'conv-avatar' + (aiConv ? ' ai-avatar' : ''));
      avatarEl.style.background = color;
      avatarEl.textContent = initial;
      if (online) {
        avatarEl.appendChild(createEl('div', 'online-dot'));
      }
      el.appendChild(avatarEl);

      var body = createEl('div', 'conv-body');

      var topRow = createEl('div', 'conv-top-row');
      var nameSpan = createEl('span', 'conv-name');
      nameSpan.appendChild(document.createTextNode(name));
      if (aiConv) {
        var badge = createEl('span', 'ai-badge');
        badge.textContent = 'AI';
        nameSpan.appendChild(badge);
      }
      topRow.appendChild(nameSpan);

      var timeSpan = createEl('span', 'conv-time');
      timeSpan.textContent = formatTime(conv.lastMessageAt);
      topRow.appendChild(timeSpan);
      body.appendChild(topRow);

      var previewRow = createEl('div', 'conv-preview-row');
      var preview = createEl('span', 'conv-preview');
      preview.textContent = conv.lastMessage || '';
      previewRow.appendChild(preview);

      if (conv.unreadCount > 0) {
        var unreadBadge = createEl('span', 'unread-badge');
        unreadBadge.textContent = conv.unreadCount > 9 ? '9+' : String(conv.unreadCount);
        previewRow.appendChild(unreadBadge);
      }

      body.appendChild(previewRow);
      el.appendChild(body);

      el.addEventListener('click', function() { openConversation(conv.id); });
      el.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openConversation(conv.id); }
      });

      convListEl.appendChild(el);
    });
  }

  // -- SVG icon helper --

  function createSvgIcon(type, size) {
    var ns = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('width', String(size || 24));
    svg.setAttribute('height', String(size || 24));
    svg.setAttribute('viewBox', '0 0 24 24');
    svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke', 'currentColor');
    svg.setAttribute('stroke-width', '1.5');
    svg.setAttribute('stroke-linecap', 'round');
    svg.setAttribute('stroke-linejoin', 'round');

    if (type === 'chat-bubble') {
      var path = document.createElementNS(ns, 'path');
      path.setAttribute('d', 'M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z');
      svg.appendChild(path);
    }
    return svg;
  }

  // -- Render: Chat View --

  function renderChatView(conv) {
    if (!conv) return;

    var other = (conv.participants || []).find(function(p) { return p !== MY_HANDLE; }) || '';
    var name = displayName(conv);
    var color = avatarColor(other);
    var initial = avatarInitial(name);
    var aiConv = conv.isAI || isAI(other);
    var online = conv.online !== false;

    chatAvatar.style.background = color;
    chatAvatar.textContent = initial;
    chatAvatar.className = 'chat-header-avatar' + (aiConv ? ' ai-avatar' : '');

    chatName.textContent = '';
    chatName.appendChild(document.createTextNode(name));
    if (aiConv) {
      var badge = createEl('span', 'ai-badge');
      badge.textContent = 'AI';
      chatName.appendChild(badge);
    }

    chatStatus.textContent = '';
    var dot = createEl('span', 'status-dot' + (online ? '' : ' offline'));
    chatStatus.appendChild(dot);
    chatStatus.appendChild(document.createTextNode(' ' + (online ? 'Online' : 'Offline')));

    chatMessages.textContent = '';

    var lastDate = null;
    var lastSender = null;
    var lastTime = null;
    var currentGroup = null;

    (conv.messages || []).forEach(function(msg) {
      var msgDate = formatDateSeparator(msg.timestamp);
      if (msgDate !== lastDate) {
        lastDate = msgDate;
        lastSender = null;
        var sep = createEl('div', 'date-separator');
        sep.appendChild(textEl('span', null, msgDate));
        chatMessages.appendChild(sep);
      }

      if (msg.type === 'system') {
        lastSender = null;
        var sys = createEl('div', 'system-message');
        sys.appendChild(textEl('span', null, msg.content));
        chatMessages.appendChild(sys);
        return;
      }

      var isSent = msg.sender === MY_HANDLE;
      var timeDiff = lastTime ? (new Date(msg.timestamp) - new Date(lastTime)) : Infinity;
      var sameGroup = msg.sender === lastSender && timeDiff < 300000;

      if (!sameGroup) {
        currentGroup = createEl('div', 'message-group ' + (isSent ? 'sent' : 'received') + (aiConv && !isSent ? ' ai-message' : ''));

        if (!isSent) {
          var senderHandle = msg.sender;
          var senderName = conv.name || senderHandle;
          var sColor = avatarColor(senderHandle);
          var sInitial = avatarInitial(senderName);
          var sIsAI = isAI(senderHandle);

          var av = createEl('div', 'msg-avatar' + (sIsAI ? ' ai-avatar' : ''));
          av.style.background = sColor;
          av.textContent = sInitial;
          currentGroup.appendChild(av);
        }

        var content = createEl('div', 'msg-content');

        if (!isSent) {
          var senderEl = createEl('div', 'msg-sender');
          senderEl.appendChild(document.createTextNode(conv.name || msg.sender));
          if (isAI(msg.sender)) {
            var aiBadge = createEl('span', 'ai-badge');
            aiBadge.textContent = 'AI';
            senderEl.appendChild(aiBadge);
          }
          content.appendChild(senderEl);
        }

        currentGroup.appendChild(content);
        chatMessages.appendChild(currentGroup);
      }

      var contentEl = currentGroup.querySelector('.msg-content');

      var bubble = createEl('div', 'msg-bubble');
      // Build bubble content safely: escape text, then apply linkification
      buildBubbleContent(bubble, msg.content);
      contentEl.appendChild(bubble);

      var timeEl = createEl('div', 'msg-time');
      timeEl.textContent = formatMessageTime(msg.timestamp);
      contentEl.appendChild(timeEl);

      lastSender = msg.sender;
      lastTime = msg.timestamp;
    });

    requestAnimationFrame(function() {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    });
  }

  // -- Open Conversation --

  function openConversation(convId) {
    state.activeConvId = convId;
    var conv = state.conversations.find(function(c) { return c.id === convId; });
    if (!conv) return;

    if (conv.unreadCount > 0) {
      conv.unreadCount = 0;
      saveConversations();
    }

    renderConversationList(searchInput.value);
    renderChatView(conv);

    chatHeader.style.display = '';
    chatMessages.style.display = '';
    chatInputBar.style.display = '';
    chatEmptyState.style.display = 'none';

    if (state.isMobile) {
      panelList.classList.add('hidden');
      panelChat.classList.add('active');
    }

    setTimeout(function() { msgInput.focus(); }, 100);
  }

  function closeChat() {
    state.activeConvId = null;
    chatHeader.style.display = 'none';
    chatMessages.style.display = 'none';
    chatInputBar.style.display = 'none';
    chatEmptyState.style.display = '';

    if (state.isMobile) {
      panelList.classList.remove('hidden');
      panelChat.classList.remove('active');
    }

    renderConversationList(searchInput.value);
  }

  // -- Send Message --

  function sendMessage() {
    var text = msgInput.value.trim();
    if (!text || !state.activeConvId) return;

    var conv = state.conversations.find(function(c) { return c.id === state.activeConvId; });
    if (!conv) return;

    var msg = {
      id: uid(),
      sender: MY_HANDLE,
      content: text,
      timestamp: new Date().toISOString(),
      type: 'text'
    };

    conv.messages.push(msg);
    conv.lastMessage = text;
    conv.lastMessageAt = msg.timestamp;

    msgInput.value = '';
    msgInput.style.height = 'auto';
    btnSend.disabled = true;

    saveConversations();
    renderChatView(conv);
    renderConversationList(searchInput.value);

    var other = (conv.participants || []).find(function(p) { return p !== MY_HANDLE; });
    if (conv.isAI || isAI(other)) {
      simulateAIReply(conv);
    }
  }

  var aiReplyTimers = {};
  function simulateAIReply(conv) {
    if (aiReplyTimers[conv.id]) clearTimeout(aiReplyTimers[conv.id]);
    var other = (conv.participants || []).find(function(p) { return p !== MY_HANDLE; });
    var name = conv.name || other;

    typingIndicator.classList.add('visible');
    typingNameEl.textContent = name + ' is typing...';

    var delay = 1000 + Math.random() * 2000;

    aiReplyTimers[conv.id] = setTimeout(function() {
      delete aiReplyTimers[conv.id];
      typingIndicator.classList.remove('visible');

      var replies = [
        'That is a great question! Let me think about it.',
        'I can help with that. Here is what I suggest...',
        'Interesting! Tell me more about what you have in mind.',
        'Got it. I will work on that right away.',
        'Sure thing! Is there anything specific you would like me to focus on?',
        'I have been thinking about this. Here are some ideas.',
        'That makes sense. Let me know if you need anything else.',
        'Happy to help! What would you like to start with?'
      ];

      var reply = {
        id: uid(),
        sender: other,
        content: replies[Math.floor(Math.random() * replies.length)],
        timestamp: new Date().toISOString(),
        type: 'text'
      };

      conv.messages.push(reply);
      conv.lastMessage = reply.content;
      conv.lastMessageAt = reply.timestamp;

      saveConversations();

      if (state.activeConvId === conv.id) {
        renderChatView(conv);
      }
      renderConversationList(searchInput.value);
    }, delay);
  }

  // -- Auto-resize textarea --

  function autoResize() {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
    btnSend.disabled = !msgInput.value.trim();
  }

  // -- New Chat Modal --

  function openModal() {
    modalOverlay.classList.add('visible');
    modalSearchInput.value = '';
    renderModalUsers('');
    setTimeout(function() { modalSearchInput.focus(); }, 100);
  }

  function closeModal() {
    modalOverlay.classList.remove('visible');
  }

  function renderModalUsers(filter) {
    var search = (filter || '').toLowerCase().trim();
    var users = knownUsers.filter(function(u) {
      if (!search) return true;
      return u.name.toLowerCase().indexOf(search) !== -1 || u.handle.toLowerCase().indexOf(search) !== -1;
    });

    modalUserList.textContent = '';

    if (users.length === 0) {
      modalUserList.appendChild(textEl('div', 'modal-empty', 'No users found'));
      return;
    }

    users.forEach(function(user) {
      var el = createEl('div', 'modal-user-item');
      el.setAttribute('role', 'option');
      el.setAttribute('tabindex', '0');

      var color = avatarColor(user.handle);
      var initial = avatarInitial(user.name);
      var ai = user.isAI || isAI(user.handle);

      var avEl = createEl('div', 'modal-user-avatar' + (ai ? ' ai-avatar' : ''));
      avEl.style.background = color;
      avEl.textContent = initial;
      el.appendChild(avEl);

      var info = createEl('div', 'modal-user-info');
      var nameEl = createEl('div', 'modal-user-name');
      nameEl.appendChild(document.createTextNode(user.name));
      if (ai) {
        var aiBadge = createEl('span', 'ai-badge');
        aiBadge.textContent = 'AI';
        nameEl.appendChild(aiBadge);
      }
      info.appendChild(nameEl);
      info.appendChild(textEl('div', 'modal-user-handle', user.handle));
      el.appendChild(info);

      el.addEventListener('click', function() { startConversation(user); });
      el.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); startConversation(user); }
      });

      modalUserList.appendChild(el);
    });
  }

  function startConversation(user) {
    closeModal();

    var conv = state.conversations.find(function(c) {
      return c.participants.indexOf(user.handle) !== -1 && c.participants.indexOf(MY_HANDLE) !== -1;
    });

    if (!conv) {
      conv = {
        id: convUid(),
        participants: [MY_HANDLE, user.handle],
        name: user.name,
        lastMessage: '',
        lastMessageAt: new Date().toISOString(),
        unreadCount: 0,
        isAI: user.isAI || isAI(user.handle),
        online: true,
        messages: [
          { id: uid(), sender: 'system', content: 'Conversation started', timestamp: new Date().toISOString(), type: 'system' }
        ]
      };
      state.conversations.unshift(conv);
      saveConversations();
    }

    renderConversationList(searchInput.value);
    openConversation(conv.id);
  }

  // -- Event Listeners --

  searchInput.addEventListener('input', function() {
    renderConversationList(searchInput.value);
  });

  msgInput.addEventListener('input', autoResize);

  msgInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  btnSend.addEventListener('click', sendMessage);
  btnBack.addEventListener('click', closeChat);
  btnNewChat.addEventListener('click', openModal);
  btnCloseModal.addEventListener('click', closeModal);

  modalOverlay.addEventListener('click', function(e) {
    if (e.target === modalOverlay) closeModal();
  });

  modalSearchInput.addEventListener('input', function() {
    renderModalUsers(modalSearchInput.value);
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      if (modalOverlay.classList.contains('visible')) {
        closeModal();
      } else if (state.activeConvId) {
        closeChat();
      }
    }
  });

  window.addEventListener('resize', function() {
    var wasMobile = state.isMobile;
    state.isMobile = window.innerWidth <= 640;

    if (wasMobile && !state.isMobile) {
      panelList.classList.remove('hidden');
      panelChat.classList.remove('active');
      if (state.activeConvId) {
        chatHeader.style.display = '';
        chatMessages.style.display = '';
        chatInputBar.style.display = '';
        chatEmptyState.style.display = 'none';
      }
    } else if (!wasMobile && state.isMobile && state.activeConvId) {
      panelList.classList.add('hidden');
      panelChat.classList.add('active');
    }
  });

  // -- Init --

  function init() {
    loadConversations();
    renderConversationList();
    fetchUsers();
    loadFromBridge();
  }

  init();
})();
</script>
</body>
</html>
