    "hook": {
      "on-activate": "  if [ ! -d node_modules ]; then\n    echo \"Installing dependencies...\"\n    pnpm install\n  fi\n\n  if [ ! -f .env.docker ]; then\n    cp .env.docker.example .env.docker\n    echo \"\"\n    echo \"Created .env.docker -- add your ANTHROPIC_API_KEY:\"\n    echo \"  \\$EDITOR .env.docker\"\n    echo \"\"\n  fi\n\n  echo \"\"\n  echo \"Matrix OS dev environment ready\"\n  echo \"  bun run docker    -- start dev (Docker)\"\n  echo \"  bun run dev       -- start dev (local)\"\n  echo \"  bun run test      -- run tests\"\n  echo \"\"\n"
    },
