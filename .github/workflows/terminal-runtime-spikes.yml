name: Terminal Runtime Spikes

on:
  pull_request:
    types: [labeled, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr:
        description: Pull request number with a deployed preview VPS
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: terminal-runtime-spikes-${{ github.event.pull_request.number || inputs.pr }}
  cancel-in-progress: true

jobs:
  prove:
    name: Prove S1 and S2
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
       contains(github.event.pull_request.labels.*.name, 'preview-vps'))
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      GH_TOKEN: ${{ github.token }}
      PLATFORM_PUBLIC_URL: ${{ vars.PLATFORM_PUBLIC_URL || 'https://app.matrix-os.com' }}
      PLATFORM_SECRET: ${{ secrets.PLATFORM_SECRET }}
    steps:
      - name: Resolve same-repository PR head
        id: resolve
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr }}
        run: |
          set -euo pipefail
          if ! printf '%s' "$PR_NUMBER" | grep -Eq '^[0-9]+$'; then
            echo "Invalid PR number." >&2
            exit 1
          fi
          pr_json="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}")"
          head_repo="$(jq -r '.head.repo.full_name' <<<"$pr_json")"
          head_sha="$(jq -r '.head.sha' <<<"$pr_json")"
          if [ "$head_repo" != "$GITHUB_REPOSITORY" ] || ! printf '%s' "$head_sha" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Only same-repository PR heads are accepted." >&2
            exit 1
          fi
          if ! jq -e '.labels | any(.name == "preview-vps")' <<<"$pr_json" >/dev/null; then
            echo "The PR must have a deployed preview-vps label." >&2
            exit 1
          fi
          {
            echo "pr=$PR_NUMBER"
            echo "head_sha=$head_sha"
            echo "short_sha=${head_sha:0:7}"
            echo "handle=pr-$PR_NUMBER"
          } >>"$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve.outputs.head_sha }}

      - name: Resolve matching deployed preview
        id: preview
        env:
          HANDLE: ${{ steps.resolve.outputs.handle }}
          SHORT_SHA: ${{ steps.resolve.outputs.short_sha }}
        run: |
          set -euo pipefail
          if [ -z "${PLATFORM_SECRET:-}" ]; then
            echo "Required preview operator secrets are unavailable." >&2
            exit 1
          fi
          deadline=$((SECONDS + 1500))
          public_ipv4=""
          while [ "$SECONDS" -lt "$deadline" ]; do
            fleet="$(curl --fail --silent --show-error --max-time 30 \
              -H "authorization: Bearer ${PLATFORM_SECRET}" \
              "${PLATFORM_PUBLIC_URL%/}/vps/fleet")"
            machine="$(jq -ce --arg handle "$HANDLE" '
              [.machines[] | select(.handle == $handle and .runtimeSlot == $handle and .status == "running")]
              | if length == 1 then .[0] else {} end
            ' <<<"$fleet")"
            runtime_version="$(jq -r '.runtimeVersion // ""' <<<"$machine")"
            candidate_ipv4="$(jq -r '.publicIPv4 // ""' <<<"$machine")"
            if [[ "$runtime_version" == *"-${SHORT_SHA}" ]] && printf '%s' "$candidate_ipv4" | grep -Eq '^([0-9]{1,3}\.){3}[0-9]{1,3}$'; then
              public_ipv4="$candidate_ipv4"
              break
            fi
            echo "Waiting for exact-head preview deployment."
            sleep 15
          done
          if [ -z "$public_ipv4" ]; then
            echo "Exact-head preview did not become ready before the deadline." >&2
            exit 1
          fi
          if ! node -e '
            const parts = process.argv[1].split(".").map(Number);
            const valid = parts.length === 4 && parts.every((part) => Number.isInteger(part) && part >= 0 && part <= 255);
            const blocked = !valid || parts[0] === 0 || parts[0] === 10 || parts[0] === 127 || parts[0] >= 224 ||
              (parts[0] === 169 && parts[1] === 254) || (parts[0] === 172 && parts[1] >= 16 && parts[1] <= 31) ||
              (parts[0] === 192 && parts[1] === 168);
            process.exit(blocked ? 1 : 0);
          ' "$public_ipv4"; then
            echo "Preview address is not public." >&2
            exit 1
          fi
          echo "::add-mask::$public_ipv4"
          echo "public_ipv4=$public_ipv4" >>"$GITHUB_OUTPUT"

      - name: Run bounded spike through authenticated gateway
        id: remote
        env:
          PUBLIC_IPV4: ${{ steps.preview.outputs.public_ipv4 }}
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
          HANDLE: ${{ steps.resolve.outputs.handle }}
        run: |
          set -euo pipefail
          gateway_token="$(node --input-type=module -e '
            import { createHmac } from "node:crypto";
            process.stdout.write(createHmac("sha256", process.argv[2]).update(process.argv[1]).digest("hex"));
          ' "$HANDLE" "$PLATFORM_SECRET")"
          echo "::add-mask::$gateway_token"
          run_body="$(jq -cn --arg sha "$HEAD_SHA" '{
            command: [
              "/usr/bin/sudo",
              "/opt/matrix/app/scripts/spikes/terminal-runtime/run-remote.sh",
              $sha
            ],
            timeoutMs: 1800000
          }')"
          run_response="$RUNNER_TEMP/terminal-runtime-spike-run.json"
          # Customer VPS nginx uses the same per-host self-signed certificate
          # accepted by the platform's CUSTOMER_VPS_TLS_VERIFY=false transport.
          # Only this disposable preview's derived gateway token crosses it;
          # PLATFORM_SECRET never leaves the runner.
          http_code="$(curl --silent --show-error --max-time 1810 --connect-timeout 15 \
            --insecure \
            --resolve "app.matrix-os.com:443:${PUBLIC_IPV4}" \
            -o "$run_response" -w '%{http_code}' \
            -X POST 'https://app.matrix-os.com/api/terminal/run' \
            -H "authorization: Bearer ${gateway_token}" \
            -H 'content-type: application/json' \
            --data-binary "$run_body")"
          if [ "$http_code" != 200 ]; then
            echo "Authenticated spike execution failed." >&2
            exit 1
          fi
          remote_status="$(jq -er '
            if (type == "object" and (.exitCode | type == "number") and
                (.timedOut == false) and (.truncated | type == "boolean"))
            then .exitCode else error("invalid response") end
          ' "$run_response")"
          jq -r '.stdout, .stderr' "$run_response" |
            grep -E '^(s1|s2):[A-Za-z]+=(pass|fail)$|^S[12]=(pass|fail)( S[12]=(pass|fail))?$|^spike_[a-z_]+$' || true
          echo "remote_status=$remote_status" >>"$GITHUB_OUTPUT"

      - name: Retrieve bounded evidence through authenticated gateway
        id: retrieve
        env:
          PUBLIC_IPV4: ${{ steps.preview.outputs.public_ipv4 }}
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
          SHORT_SHA: ${{ steps.resolve.outputs.short_sha }}
          HANDLE: ${{ steps.resolve.outputs.handle }}
        run: |
          set -euo pipefail
          gateway_token="$(node --input-type=module -e '
            import { createHmac } from "node:crypto";
            process.stdout.write(createHmac("sha256", process.argv[2]).update(process.argv[1]).digest("hex"));
          ' "$HANDLE" "$PLATFORM_SECRET")"
          echo "::add-mask::$gateway_token"
          pack_body="$(jq -cn --arg sha "$HEAD_SHA" '{
            command: [
              "/usr/bin/sudo",
              "/opt/matrix/app/scripts/spikes/terminal-runtime/pack-evidence.sh",
              $sha
            ],
            timeoutMs: 30000
          }')"
          pack_response="$RUNNER_TEMP/terminal-runtime-spike-pack.json"
          http_code="$(curl --silent --show-error --max-time 45 --connect-timeout 15 \
            --insecure \
            --resolve "app.matrix-os.com:443:${PUBLIC_IPV4}" \
            -o "$pack_response" -w '%{http_code}' \
            -X POST 'https://app.matrix-os.com/api/terminal/run' \
            -H "authorization: Bearer ${gateway_token}" \
            -H 'content-type: application/json' \
            --data-binary "$pack_body")"
          if [ "$http_code" != 200 ] || ! jq -e '
            type == "object" and .exitCode == 0 and .timedOut == false and
            .truncated == false and .signal == null and
            (.stdout | type == "string" and length > 0 and length <= 700000)
          ' "$pack_response" >/dev/null; then
            echo "Bounded evidence retrieval failed." >&2
            exit 1
          fi
          archive="$RUNNER_TEMP/matrix-terminal-spike-evidence-${SHORT_SHA}.tar.gz"
          evidence_parent="$RUNNER_TEMP/terminal-runtime-spike-evidence"
          install -d -m 0700 "$evidence_parent"
          jq -r '.stdout' "$pack_response" | base64 --decode >"$archive"
          tar --extract --gzip --file "$archive" --directory "$evidence_parent"
          evidence="$evidence_parent/matrix-terminal-spike-evidence-${SHORT_SHA}"
          echo "evidence=$evidence" >>"$GITHUB_OUTPUT"

      - name: Validate privacy and all mandatory evidence
        id: validate
        env:
          EVIDENCE: ${{ steps.retrieve.outputs.evidence }}
          REMOTE_STATUS: ${{ steps.remote.outputs.remote_status }}
        run: |
          set -euo pipefail
          result="$(node scripts/spikes/terminal-runtime/verify-evidence.mjs "$EVIDENCE")"
          if [ "$REMOTE_STATUS" != "0" ]; then
            echo "Remote spike did not complete successfully." >&2
            exit 1
          fi
          digest="$(jq -r '.summarySha256' <<<"$result")"
          if ! printf '%s' "$digest" | grep -Eq '^[0-9a-f]{64}$'; then
            echo "Invalid evidence digest." >&2
            exit 1
          fi
          echo "summary_sha256=$digest" >>"$GITHUB_OUTPUT"

      - name: Upload validated evidence
        uses: actions/upload-artifact@v7
        with:
          name: terminal-runtime-spikes-pr-${{ steps.resolve.outputs.pr }}-${{ steps.resolve.outputs.short_sha }}
          path: ${{ steps.retrieve.outputs.evidence }}
          if-no-files-found: error
          retention-days: 14

      - name: Comment passing evidence
        env:
          PR_NUMBER: ${{ steps.resolve.outputs.pr }}
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
          SUMMARY_SHA256: ${{ steps.validate.outputs.summary_sha256 }}
        run: |
          set -euo pipefail
          body="**Terminal runtime spikes passed**

          - Commit: \`${HEAD_SHA}\`
          - Gate S1: pass
          - Gate S2: pass
          - Evidence SHA-256: \`${SUMMARY_SHA256}\`
          - Workflow: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          The artifact is bounded and privacy-validated; it contains no terminal contents, credentials, host IPs, owner paths, or display names."
          gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" -f body="$body" >/dev/null
