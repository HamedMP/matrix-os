name: Desktop Release Foundation

on:
  workflow_call:
    inputs:
      channel:
        required: true
        type: string

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            package-script: build:mac
          - os: windows-2025
            package-script: build:win
          - os: ubuntu-24.04
            package-script: build:linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir apps/desktop run ${{ matrix.package-script }}
        env:
          DESKTOP_RELEASE_CHANNEL: ${{ inputs.channel }}
          CSC_LINK: ${{ secrets.DESKTOP_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.DESKTOP_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.DESKTOP_APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.DESKTOP_APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.DESKTOP_APPLE_TEAM_ID }}
          WIN_CSC_LINK: ${{ secrets.DESKTOP_WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.DESKTOP_WIN_CSC_KEY_PASSWORD }}
      - run: node scripts/release/desktop/write-manifest.mjs apps/desktop/dist "$DESKTOP_RELEASE_CHANNEL"
        env:
          DESKTOP_RELEASE_CHANNEL: ${{ inputs.channel }}
      - uses: actions/upload-artifact@v4
        with:
          name: matrix-desktop-${{ matrix.os }}-${{ inputs.channel }}
          path: |
            apps/desktop/dist/**
