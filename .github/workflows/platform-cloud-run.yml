name: Platform Cloud Run

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/platform-cloud-run.yml"
      - "packages/platform/**"
      - "packages/observability/**"
      - "packages/clerk-sync/**"
      - "shell/**"
      - "distro/customer-vps/**"
      - "scripts/start-platform-cloud-run.sh"
      - "Dockerfile.platform"
      - "cloudbuild.platform.yaml"
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment to deploy
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      promote:
        description: Promote the deployed revision to 100% traffic
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: platform-cloud-run-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy platform
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      ARTIFACT_REPOSITORY: ${{ vars.ARTIFACT_REPOSITORY }}
      CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
      CLOUD_RUN_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT }}
      PLATFORM_PUBLIC_URL: ${{ vars.PLATFORM_PUBLIC_URL }}
      MATRIX_API_ORIGIN: ${{ vars.MATRIX_API_ORIGIN }}
      MATRIX_APP_URL: ${{ vars.MATRIX_APP_URL }}
      MATRIX_APP_DOMAIN_HOSTS: ${{ vars.MATRIX_APP_DOMAIN_HOSTS }}
      MATRIX_CODE_DOMAIN_HOSTS: ${{ vars.MATRIX_CODE_DOMAIN_HOSTS }}
      CUSTOMER_VPS_IMAGE_VERSION: ${{ vars.CUSTOMER_VPS_IMAGE_VERSION }}
      POSTHOG_PUBLIC_HOST: ${{ vars.NEXT_PUBLIC_POSTHOG_HOST || 'https://eu.posthog.com' }}
      POSTHOG_PUBLIC_API_HOST: ${{ vars.NEXT_PUBLIC_POSTHOG_API_HOST || '/relay' }}
      DEPLOY_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate deployment configuration
        run: |
          set -euo pipefail
          missing=()
          for name in \
            GCP_PROJECT_ID \
            GCP_REGION \
            ARTIFACT_REPOSITORY \
            CLOUD_RUN_SERVICE \
            CLOUD_RUN_SERVICE_ACCOUNT \
            PLATFORM_PUBLIC_URL \
            MATRIX_API_ORIGIN \
            MATRIX_APP_URL \
            MATRIX_APP_DOMAIN_HOSTS \
            MATRIX_CODE_DOMAIN_HOSTS \
            CUSTOMER_VPS_IMAGE_VERSION; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub environment variable(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        # google-github-actions v4 tags are not published yet; v3 is the latest
        # major tag currently resolvable by GitHub Actions.
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        # Keep this aligned with auth@v3 until google-github-actions publishes v4.
        uses: google-github-actions/setup-gcloud@v3

      - name: Verify edge router secret
        run: |
          set -euo pipefail
          gcloud secrets describe edge-router-secret \
            --project "$GCP_PROJECT_ID" >/dev/null
          accessor_member="$(
            gcloud secrets get-iam-policy edge-router-secret \
              --project "$GCP_PROJECT_ID" \
              --flatten='bindings[].members' \
              --filter="bindings.role:roles/secretmanager.secretAccessor AND bindings.members:serviceAccount:${CLOUD_RUN_SERVICE_ACCOUNT}" \
              --format='value(bindings.members)' \
              | head -1
          )"
          if [ "$accessor_member" != "serviceAccount:${CLOUD_RUN_SERVICE_ACCOUNT}" ]; then
            echo "edge-router-secret must grant roles/secretmanager.secretAccessor to ${CLOUD_RUN_SERVICE_ACCOUNT}" >&2
            exit 1
          fi

      - name: Verify Stripe billing price secrets
        run: |
          set -euo pipefail
          required_price_secrets=(
            STRIPE_PRICE_MATRIX_STARTER_MONTHLY=stripe-price-matrix-starter-monthly
            STRIPE_PRICE_MATRIX_STARTER_ANNUAL=stripe-price-matrix-starter-annual
            STRIPE_PRICE_MATRIX_BUILDER_MONTHLY=stripe-price-matrix-builder-monthly
            STRIPE_PRICE_MATRIX_BUILDER_ANNUAL=stripe-price-matrix-builder-annual
            STRIPE_PRICE_MATRIX_MAX_MONTHLY=stripe-price-matrix-max-monthly
            STRIPE_PRICE_MATRIX_MAX_ANNUAL=stripe-price-matrix-max-annual
            STRIPE_PRICE_EXTRA_RUNTIME_MONTHLY=stripe-price-extra-runtime-monthly
            STRIPE_PRICE_EXTRA_RUNTIME_ANNUAL=stripe-price-extra-runtime-annual
          )

          for entry in "${required_price_secrets[@]}"; do
            env_name="${entry%%=*}"
            secret_name="${entry#*=}"
            gcloud secrets describe "$secret_name" \
              --project "$GCP_PROJECT_ID" >/dev/null
            price_secret_tmpfile="$(mktemp)"
            if ! gcloud secrets versions access latest --secret "$secret_name" \
              --project "$GCP_PROJECT_ID" >"$price_secret_tmpfile"; then
              rm -f "$price_secret_tmpfile"
              echo "$secret_name must have an accessible latest version for $env_name." >&2
              exit 1
            fi
            if [ ! -s "$price_secret_tmpfile" ]; then
              rm -f "$price_secret_tmpfile"
              echo "$secret_name must not be empty for $env_name." >&2
              exit 1
            fi
            rm -f "$price_secret_tmpfile"
            accessor_member="$(
              gcloud secrets get-iam-policy "$secret_name" \
                --project "$GCP_PROJECT_ID" \
                --flatten='bindings[].members' \
                --filter="bindings.role:roles/secretmanager.secretAccessor AND bindings.members:serviceAccount:${CLOUD_RUN_SERVICE_ACCOUNT}" \
                --format='value(bindings.members)' \
                | head -1
            )"
            if [ "$accessor_member" != "serviceAccount:${CLOUD_RUN_SERVICE_ACCOUNT}" ]; then
              echo "$secret_name must grant roles/secretmanager.secretAccessor to ${CLOUD_RUN_SERVICE_ACCOUNT}" >&2
              exit 1
            fi
          done

      - name: Verify Pipedream integration secrets
        run: |
          set -euo pipefail
          required_pipedream_secrets=(
            PIPEDREAM_CLIENT_ID=pipedream-client-id
            PIPEDREAM_CLIENT_SECRET=pipedream-client-secret
            PIPEDREAM_PROJECT_ID=pipedream-project-id
            PIPEDREAM_ENVIRONMENT=pipedream-environment
          )

          for entry in "${required_pipedream_secrets[@]}"; do
            env_name="${entry%%=*}"
            secret_name="${entry#*=}"
            gcloud secrets describe "$secret_name" \
              --project "$GCP_PROJECT_ID" >/dev/null
            pipedream_secret_tmpfile="$(mktemp)"
            if ! gcloud secrets versions access latest --secret "$secret_name" \
              --project "$GCP_PROJECT_ID" >"$pipedream_secret_tmpfile"; then
              rm -f "$pipedream_secret_tmpfile"
              echo "$secret_name must have an accessible latest version for $env_name." >&2
              exit 1
            fi
            if [ ! -s "$pipedream_secret_tmpfile" ]; then
              rm -f "$pipedream_secret_tmpfile"
              echo "$secret_name must not be empty for $env_name." >&2
              exit 1
            fi
            rm -f "$pipedream_secret_tmpfile"
            accessor_member="$(
              gcloud secrets get-iam-policy "$secret_name" \
                --project "$GCP_PROJECT_ID" \
                --flatten='bindings[].members' \
                --filter="bindings.role:roles/secretmanager.secretAccessor AND bindings.members:serviceAccount:${CLOUD_RUN_SERVICE_ACCOUNT}" \
                --format='value(bindings.members)' \
                | head -1
            )"
            if [ "$accessor_member" != "serviceAccount:${CLOUD_RUN_SERVICE_ACCOUNT}" ]; then
              echo "$secret_name must grant roles/secretmanager.secretAccessor to ${CLOUD_RUN_SERVICE_ACCOUNT}" >&2
              exit 1
            fi
          done

      - name: Build platform image
        run: |
          set -euo pipefail
          image="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPOSITORY}/matrix-platform:${GITHUB_SHA::12}"
          cache_image="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPOSITORY}/matrix-platform:buildcache"
          echo "IMAGE=$image" >> "$GITHUB_ENV"
          echo "CACHE_IMAGE=$cache_image" >> "$GITHUB_ENV"
          next_public_clerk_publishable_key="$(gcloud secrets versions access latest --secret next-public-clerk-publishable-key --project "$GCP_PROJECT_ID" 2>/dev/null || true)"
          next_public_posthog_key="$(gcloud secrets versions access latest --secret next-public-posthog-key --project "$GCP_PROJECT_ID" 2>/dev/null || true)"
          next_public_posthog_project_token="$(gcloud secrets versions access latest --secret next-public-posthog-project-token --project "$GCP_PROJECT_ID" 2>/dev/null || true)"
          if [ -z "$next_public_clerk_publishable_key" ]; then
            echo "next-public-clerk-publishable-key is required to build the auth-shell billing surface." >&2
            exit 1
          fi
          build_id=$(gcloud builds submit . \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --config cloudbuild.platform.yaml \
            --substitutions "_IMAGE=$image,_CACHE_IMAGE=$cache_image,_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$next_public_clerk_publishable_key,_NEXT_PUBLIC_POSTHOG_KEY=$next_public_posthog_key,_NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN=$next_public_posthog_project_token,_NEXT_PUBLIC_POSTHOG_HOST=$POSTHOG_PUBLIC_HOST,_NEXT_PUBLIC_POSTHOG_API_HOST=$POSTHOG_PUBLIC_API_HOST,_NEXT_PUBLIC_MATRIX_APP_URL=$MATRIX_APP_URL" \
            --async \
            --format 'value(metadata.build.id)' \
            --timeout=1200s)
          if [ -z "$build_id" ]; then
            build_id=$(gcloud builds list \
              --project "$GCP_PROJECT_ID" \
              --region "$GCP_REGION" \
              --filter "images:$image" \
              --sort-by '~createTime' \
              --limit 1 \
              --format 'value(id)')
          fi
          if [ -z "$build_id" ]; then
            echo "Could not resolve Cloud Build id for $image" >&2
            exit 1
          fi

          {
            echo "### Platform Cloud Run build"
            echo "- source_sha: \`${GITHUB_SHA}\`"
            echo "- lane: \`platform\`"
            echo "- image: \`${image}\`"
            echo "- build_id: \`${build_id}\`"
            echo "- cache_image: \`${cache_image}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          for attempt in $(seq 1 240); do
            status=$(gcloud builds describe "$build_id" \
              --project "$GCP_PROJECT_ID" \
              --region "$GCP_REGION" \
              --format 'value(status)')
            case "$status" in
              SUCCESS)
                exit 0
                ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED)
                echo "Cloud Build $build_id ended with status $status" >&2
                exit 1
                ;;
            esac
            sleep 5
          done

          echo "Timed out waiting for Cloud Build $build_id" >&2
          exit 1

      - name: Deploy tagged revision
        run: |
          set -euo pipefail
          if ! command -v jq >/dev/null 2>&1; then
            echo "jq is required to parse Cloud Run JSON output." >&2
            exit 1
          fi
          service_exists=0
          if gcloud run services describe "$CLOUD_RUN_SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" >/dev/null 2>&1; then
            service_exists=1
          fi

          traffic_flags=(--tag candidate)
          if [ "$service_exists" = "1" ]; then
            traffic_flags+=(--no-traffic)
          fi

          min_instances=0
          if [ "$DEPLOY_ENVIRONMENT" = "production" ]; then
            min_instances=1
          fi

          # TODO(#410): flip CUSTOMER_VPS_TLS_VERIFY back to true once customer VPS origins present trusted certs.
          if ! deploy_json=$(gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --image "$IMAGE" \
            --service-account "$CLOUD_RUN_SERVICE_ACCOUNT" \
            --platform managed \
            --port 8080 \
            --cpu 1 \
            --memory 1Gi \
            --concurrency 30 \
            --timeout 300 \
            --min-instances "$min_instances" \
            --max-instances 10 \
            --ingress all \
            --allow-unauthenticated \
            "${traffic_flags[@]}" \
            --set-env-vars "PLATFORM_RUNTIME_MODE=cloud_run,PLATFORM_PORT=8080,PLATFORM_PUBLIC_URL=${PLATFORM_PUBLIC_URL},MATRIX_API_ORIGIN=${MATRIX_API_ORIGIN},CUSTOMER_VPS_ENABLED=true,CUSTOMER_VPS_TLS_VERIFY=false,CUSTOMER_VPS_IMAGE_VERSION=${CUSTOMER_VPS_IMAGE_VERSION},CUSTOMER_VPS_CLOUD_INIT_PATH=distro/customer-vps/cloud-init.yaml,MATRIX_LEGACY_CONTAINER_ROUTING_ENABLED=false,AUTH_SHELL_HOST=127.0.0.1,AUTH_SHELL_PORT=3200,MATRIX_APP_DOMAIN_HOSTS=${MATRIX_APP_DOMAIN_HOSTS},MATRIX_CODE_DOMAIN_HOSTS=${MATRIX_CODE_DOMAIN_HOSTS},NEXT_PUBLIC_MATRIX_APP_URL=${MATRIX_APP_URL},MATRIX_BILLING_PROVIDER=stripe,POSTHOG_HOST=https://eu.i.posthog.com,POSTHOG_API_HOST=https://eu.i.posthog.com,NEXT_PUBLIC_POSTHOG_HOST=${POSTHOG_PUBLIC_HOST},NEXT_PUBLIC_POSTHOG_API_HOST=${POSTHOG_PUBLIC_API_HOST},R2_PREFIX_ROOT=matrixos-sync" \
            --set-secrets "PLATFORM_DATABASE_URL=platform-database-url:latest,PLATFORM_SECRET=platform-secret:latest,PLATFORM_JWT_SECRET=platform-jwt-secret:latest,EDGE_ROUTER_SECRET=edge-router-secret:latest,CLERK_SECRET_KEY=clerk-secret-key:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest,STRIPE_PRICE_MATRIX_STARTER_MONTHLY=stripe-price-matrix-starter-monthly:latest,STRIPE_PRICE_MATRIX_STARTER_ANNUAL=stripe-price-matrix-starter-annual:latest,STRIPE_PRICE_MATRIX_BUILDER_MONTHLY=stripe-price-matrix-builder-monthly:latest,STRIPE_PRICE_MATRIX_BUILDER_ANNUAL=stripe-price-matrix-builder-annual:latest,STRIPE_PRICE_MATRIX_MAX_MONTHLY=stripe-price-matrix-max-monthly:latest,STRIPE_PRICE_MATRIX_MAX_ANNUAL=stripe-price-matrix-max-annual:latest,STRIPE_PRICE_EXTRA_RUNTIME_MONTHLY=stripe-price-extra-runtime-monthly:latest,STRIPE_PRICE_EXTRA_RUNTIME_ANNUAL=stripe-price-extra-runtime-annual:latest,PIPEDREAM_CLIENT_ID=pipedream-client-id:latest,PIPEDREAM_CLIENT_SECRET=pipedream-client-secret:latest,PIPEDREAM_PROJECT_ID=pipedream-project-id:latest,PIPEDREAM_ENVIRONMENT=pipedream-environment:latest,R2_ACCOUNT_ID=r2-account-id:latest,R2_BUCKET=r2-bucket:latest,R2_ACCESS_KEY_ID=r2-access-key-id:latest,R2_SECRET_ACCESS_KEY=r2-secret-access-key:latest,R2_BUNDLES_ACCOUNT_ID=r2-bundles-account-id:latest,R2_BUNDLES_BUCKET=r2-bundles-bucket:latest,R2_BUNDLES_ENDPOINT=r2-bundles-endpoint:latest,R2_BUNDLES_ACCESS_KEY_ID=r2-bundles-access-key-id:latest,R2_BUNDLES_SECRET_ACCESS_KEY=r2-bundles-secret-access-key:latest,HETZNER_API_TOKEN=hetzner-api-token:latest,POSTHOG_TOKEN=posthog-token:latest,POSTHOG_PROJECT_TOKEN=posthog-project-token:latest,NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=next-public-clerk-publishable-key:latest,NEXT_PUBLIC_POSTHOG_KEY=next-public-posthog-key:latest,NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN=next-public-posthog-project-token:latest" \
            --format=json); then
            exit 1
          fi
          candidate_url=$(printf '%s\n' "$deploy_json" | jq -r '.status.traffic[]? | select(.tag == "candidate") | .url // empty' | head -1)
          candidate_revision=$(printf '%s\n' "$deploy_json" | jq -r '.status.traffic[]? | select(.tag == "candidate") | .revisionName // empty' | head -1)
          if [ -z "$candidate_url" ] || [ -z "$candidate_revision" ]; then
            service_json=$(gcloud run services describe "$CLOUD_RUN_SERVICE" \
              --project "$GCP_PROJECT_ID" \
              --region "$GCP_REGION" \
              --format=json)
            candidate_url=$(printf '%s\n' "$service_json" | jq -r '.status.traffic[]? | select(.tag == "candidate") | .url // empty' | head -1)
            candidate_revision=$(printf '%s\n' "$service_json" | jq -r '.status.traffic[]? | select(.tag == "candidate") | .revisionName // empty' | head -1)
          fi
          if [ -z "$candidate_url" ] || [ -z "$candidate_revision" ]; then
            echo "Could not resolve deployed candidate URL/revision; refusing to continue." >&2
            exit 1
          fi
          echo "Resolved candidate revision $candidate_revision at $candidate_url"
          echo "CANDIDATE_URL=$candidate_url" >> "$GITHUB_ENV"
          echo "CANDIDATE_REVISION=$candidate_revision" >> "$GITHUB_ENV"

      - name: Smoke candidate revision
        run: |
          set -euo pipefail
          if ! command -v jq >/dev/null 2>&1; then
            echo "jq is required to parse host bundle smoke JSON output." >&2
            exit 1
          fi
          if [ -z "${CANDIDATE_URL:-}" ]; then
            echo "No tagged candidate Cloud Run URL found; refusing to smoke the live service URL." >&2
            exit 1
          fi
          curl --fail --silent --show-error --max-time 10 "$CANDIDATE_URL/health" >/dev/null
          # /sign-in is only served as the pre-VPS auth shell on app-domain hosts.
          # The raw candidate tag URL is not an app-domain host, so simulate the
          # edge router with x-forwarded-host + x-matrix-edge-secret instead of
          # broadening MATRIX_APP_DOMAIN_HOSTS to Cloud Run tag URLs.
          edge_router_secret="$(gcloud secrets versions access latest \
            --secret edge-router-secret \
            --project "$GCP_PROJECT_ID" | tr -d '\r\n')"
          if [ -z "$edge_router_secret" ]; then
            echo "Could not read edge-router-secret for the app-domain smoke request." >&2
            exit 1
          fi
          echo "::add-mask::$edge_router_secret"
          app_domain_host="$(printf '%s' "${MATRIX_APP_DOMAIN_HOSTS%%,*}" | tr -d '[:space:]')"
          if [ -z "$app_domain_host" ]; then
            echo "MATRIX_APP_DOMAIN_HOSTS did not yield an app-domain host for the smoke request." >&2
            exit 1
          fi
          auth_shell_html="$(curl --fail --silent --show-error --max-time 10 \
            --header "x-forwarded-host: ${app_domain_host}" \
            --header "x-matrix-edge-secret: ${edge_router_secret}" \
            "$CANDIDATE_URL/sign-in")"
          if ! printf '%s\n' "$auth_shell_html" | grep -Fq 'data-matrix-auth-shell="true"'; then
            echo "Candidate pre-VPS auth shell did not serve the Next sign-in surface." >&2
            exit 1
          fi
          billing_shell_html="$(curl --fail --silent --show-error --max-time 10 \
            --header "x-forwarded-host: ${app_domain_host}" \
            --header "x-matrix-edge-secret: ${edge_router_secret}" \
            "$CANDIDATE_URL/?billing=setup")"
          # Spec 092 Phase C: the journey-driven BootSequence replaces the billing
          # gate on the web path, so accept either marker (the old billing gate or
          # the new boot sequence) — both prove the shell gate rendered, not the
          # platform fallback auth page.
          if ! printf '%s\n' "$billing_shell_html" | grep -Eq 'data-matrix-(billing-gate|boot-sequence)="true"'; then
            echo "Candidate pre-VPS billing shell did not serve the billing gate or boot sequence." >&2
            exit 1
          fi
          if printf '%s\n' "$billing_shell_html" | grep -Fq 'data-matrix-platform-fallback-auth="true"'; then
            echo "Candidate pre-VPS billing shell served the platform fallback auth page." >&2
            exit 1
          fi
          manifest="$(curl --fail --silent --show-error --max-time 10 "$CANDIDATE_URL/system-bundles/channels/dev.json")"
          bundle_url="$(printf '%s\n' "$manifest" | jq -r '.url // empty')"
          if [ -z "$bundle_url" ]; then
            echo "Candidate host bundle channel smoke did not return a signed bundle URL." >&2
            exit 1
          fi
          sync_bucket="$(gcloud secrets versions access latest --secret=r2-bucket)"
          bundle_bucket="$(gcloud secrets versions access latest --secret=r2-bundles-bucket)"
          if [ -z "$sync_bucket" ] || [ -z "$bundle_bucket" ]; then
            echo "Candidate host bundle smoke could not read required bucket secret names." >&2
            exit 1
          fi
          if [ "$bundle_bucket" = "$sync_bucket" ]; then
            echo "Dedicated host bundle bucket secret matches the sync bucket secret; refusing to promote." >&2
            exit 1
          fi
          if printf '%s\n' "$bundle_url" | grep -Fq -- "$sync_bucket"; then
            echo "Candidate host bundle signer returned the configured sync bucket; refusing to promote." >&2
            exit 1
          fi
          if printf '%s\n' "$bundle_url" | grep -Fq 'r2.cloudflarestorage.com' && ! printf '%s\n' "$bundle_url" | grep -Fq -- "$bundle_bucket"; then
            echo "Candidate host bundle signer returned a native R2 URL outside the bundle bucket; refusing to promote." >&2
            exit 1
          fi
          curl --fail --silent --show-error --max-time 20 --range 0-0 "$bundle_url" >/dev/null

      - name: Promote revision
        if: ${{ github.event_name == 'push' || inputs.promote }}
        run: |
          set -euo pipefail
          if [ -z "${CANDIDATE_REVISION:-}" ]; then
            echo "No candidate revision found" >&2
            exit 1
          fi
          gcloud run services update-traffic "$CLOUD_RUN_SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --to-revisions "$CANDIDATE_REVISION=100"

      - name: Verify promoted revision traffic
        if: ${{ github.event_name == 'push' || inputs.promote }}
        run: |
          set -euo pipefail
          service_json="$(gcloud run services describe "$CLOUD_RUN_SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format=json)"
          candidate_percent="$(printf '%s\n' "$service_json" | jq -r '(.status.traffic[]? | select(.revisionName == env.CANDIDATE_REVISION) | .percent) // empty' | head -1)"
          if [ "$candidate_percent" != "100" ]; then
            echo "Candidate revision ${CANDIDATE_REVISION} does not have 100% traffic." >&2
            exit 1
          fi
          stale_revision="$(printf '%s\n' "$service_json" | jq -r '(.status.traffic[]? | select(.revisionName != env.CANDIDATE_REVISION and (.percent // 0) > 0) | "\(.revisionName)=\(.percent)") // empty' | head -1)"
          if [ -n "$stale_revision" ]; then
            echo "Stale Cloud Run revision is still receiving traffic: $stale_revision" >&2
            exit 1
          fi
