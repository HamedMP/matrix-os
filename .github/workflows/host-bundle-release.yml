# Host Bundle Release
#
# Builds, publishes, and registers the Matrix OS host bundle.
# Main publishes the dev channel. Tags publish immutable release versions.
#
# Version format: v{YYYY.MM.DD}-{run_number} (date-based, monotonically increasing)
#
# Flow:
#   1. test — typecheck + unit tests
#   2. build — compile gateway, shell, kernel into host bundle tarball
#   3. publish — upload immutable R2 artifacts and register metadata in platform DB
#   4. (optional) auto-deploy if severity is "security"

name: Host Bundle Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel to promote"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - canary
          - beta
          - stable
      severity:
        description: "Update severity (normal, security)"
        required: false
        default: "normal"
        type: choice
        options:
          - normal
          - security
      changelog:
        description: "Changelog entry (one-line summary of what changed)"
        required: false
        default: ""
        type: string
      skip_dev_bundle:
        description: "Skip dev host-bundle build/publish for metadata-only stack layers"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: host-bundle-release
  cancel-in-progress: false

jobs:
  dev-bundle-gate:
    name: Dev bundle gate
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decision.outputs.should_build }}
      reason: ${{ steps.decision.outputs.reason }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Decide whether to build
        id: decision
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before || '' }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          SKIP_DEV_BUNDLE_INPUT: ${{ github.event.inputs.skip_dev_bundle || 'false' }}
        run: |
          set -euo pipefail

          changed_files=""
          zero_sha="0000000000000000000000000000000000000000"
          if [ "$GITHUB_EVENT_NAME" = "push" ] && [ "$GITHUB_REF_TYPE" = "branch" ]; then
            if [ -n "${GITHUB_EVENT_BEFORE:-}" ] && [ "$GITHUB_EVENT_BEFORE" != "$zero_sha" ] && git cat-file -e "${GITHUB_EVENT_BEFORE}^{commit}" 2>/dev/null; then
              changed_files="$(git diff --name-only "$GITHUB_EVENT_BEFORE" "$GITHUB_SHA")"
            else
              changed_files="$(git show --pretty= --name-only "$GITHUB_SHA")"
            fi
          fi

          CHANGED_FILES="$changed_files" scripts/ci/dev-bundle-gate.sh

  test:
    name: Test
    needs: dev-bundle-gate
    if: needs.dev-bundle-gate.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: oven-sh/setup-bun@v2

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: bun run typecheck
        continue-on-error: true

      - name: Unit tests
        run: bun run test
        continue-on-error: true

  build:
    name: Build host bundle
    needs: [dev-bundle-gate, test]
    if: needs.dev-bundle-gate.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY || vars.NEXT_PUBLIC_POSTHOG_KEY }}
      NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ secrets.NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN || vars.NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN }}
      NEXT_PUBLIC_POSTHOG_HOST: ${{ vars.NEXT_PUBLIC_POSTHOG_HOST || 'https://eu.i.posthog.com' }}
      NEXT_PUBLIC_POSTHOG_API_HOST: ${{ vars.NEXT_PUBLIC_POSTHOG_API_HOST || 'https://eu.i.posthog.com' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      channel: ${{ steps.channel.outputs.channel }}
      bundle_path: ${{ steps.build.outputs.bundle_path }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: oven-sh/setup-bun@v2

      - name: Generate version
        id: version
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="v$(date -u +%Y.%m.%d)-${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Generated version: $VERSION"

      - name: Resolve release channel
        id: channel
        run: |
          set -euo pipefail
          CHANNEL="${{ inputs.channel || '' }}"
          if [ -z "$CHANNEL" ]; then
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              CHANNEL="canary"
            else
              CHANNEL="dev"
            fi
          fi
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "Resolved channel: $CHANNEL"

      - name: Build host bundle
        id: build
        env:
          HOST_BUNDLE_VERSION: ${{ steps.version.outputs.version }}
          HOST_BUNDLE_CHANNEL: ${{ steps.channel.outputs.channel }}
          MATRIX_BUILD_SHA: ${{ github.sha }}
          MATRIX_BUILD_REF: ${{ github.ref_name }}
          MATRIX_BUILD_DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          set -euo pipefail
          ./scripts/build-host-bundle.sh
          echo "bundle_path=dist/host-bundle/matrix-host-bundle.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: host-bundle
          path: dist/host-bundle/
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish to R2
    needs: [dev-bundle-gate, build]
    if: needs.dev-bundle-gate.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ vars.R2_BUCKET || 'matrixos-sync' }}
      PLATFORM_PUBLIC_URL: ${{ vars.PLATFORM_PUBLIC_URL || 'https://app.matrix-os.com' }}
      PLATFORM_SECRET: ${{ secrets.PLATFORM_SECRET }}
    steps:
      - uses: actions/checkout@v6

      - name: Download bundle artifact
        uses: actions/download-artifact@v8
        with:
          name: host-bundle
          path: dist/host-bundle/

      - name: Install AWS CLI
        run: |
          set -euo pipefail
          if ! command -v aws &>/dev/null; then
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp
            sudo /tmp/aws/install
          fi

      - name: Resolve severity and changelog
        id: meta
        run: |
          set -euo pipefail
          # Default to "normal" for push-triggered runs
          SEVERITY="${{ inputs.severity || 'normal' }}"
          CHANGELOG="${{ inputs.changelog || '' }}"
          echo "severity=$SEVERITY" >> "$GITHUB_OUTPUT"
          echo "changelog=$CHANGELOG" >> "$GITHUB_OUTPUT"

      - name: Publish release
        env:
          HOST_BUNDLE_DIST_DIR: dist/host-bundle
          HOST_BUNDLE_CHANNEL: ${{ needs.build.outputs.channel }}
          PUBLISH_VERSION: ${{ needs.build.outputs.version }}
          PUBLISH_SEVERITY: ${{ steps.meta.outputs.severity }}
          PUBLISH_CHANGELOG: ${{ steps.meta.outputs.changelog }}
        run: |
          set -euo pipefail
          ARGS=("$PUBLISH_VERSION")
          if [ -n "$PUBLISH_SEVERITY" ] && [ "$PUBLISH_SEVERITY" != "normal" ]; then
            ARGS+=("--severity" "$PUBLISH_SEVERITY")
          fi
          if [ -n "$PUBLISH_CHANGELOG" ]; then
            ARGS+=("--changelog" "$PUBLISH_CHANGELOG")
          fi

          ./scripts/publish-release.sh "${ARGS[@]}"

      - name: Auto-deploy on security severity
        if: ${{ inputs.severity == 'security' }}
        env:
          PLATFORM_PUBLIC_URL: ${{ vars.PLATFORM_PUBLIC_URL || 'https://app.matrix-os.com' }}
          PLATFORM_SECRET: ${{ secrets.PLATFORM_SECRET }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.build.outputs.version }}"
          if [ -z "${PLATFORM_SECRET:-}" ]; then
            echo "PLATFORM_SECRET not configured — skipping auto-deploy" >&2
            exit 0
          fi
          echo "Security severity — waiting 60s for sync agents to discover manifest..."
          sleep 60
          echo "Triggering deploy for $VERSION..."
          curl --fail --silent --show-error --max-time 30 \
            -X POST "${PLATFORM_PUBLIC_URL%/}/vps/deploy" \
            -H "Authorization: Bearer ${PLATFORM_SECRET}" \
            -H "Content-Type: application/json" \
            -d "{\"version\":\"$VERSION\"}"
          echo "Deploy triggered successfully."
