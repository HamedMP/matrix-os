# Host Bundle Release
#
# Builds, publishes, and registers the Matrix OS host bundle.
# Main publishes the dev channel. Tags publish immutable release versions.
#
# Version format: v{YYYY.MM.DD}-{run_number} (date-based, monotonically increasing)
#
# Flow:
#   1. ci-gate — wait for same-SHA CI and verify all CI jobs succeeded
#   2. build — compile gateway, shell, kernel into host bundle tarball
#   3. publish — upload immutable R2 artifacts and register metadata in platform DB
#   4. deploy — main/dev publishes trigger exact-version VPS deployment by default

name: Host Bundle Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel to promote"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - canary
          - beta
          - stable
      severity:
        description: "Update severity (normal, security)"
        required: false
        default: "normal"
        type: choice
        options:
          - normal
          - security
      changelog:
        description: "Changelog entry (one-line summary of what changed)"
        required: false
        default: ""
        type: string
      skip_dev_bundle:
        description: "Skip dev host-bundle build/publish for explicit manual maintenance runs"
        required: false
        default: false
        type: boolean
      deploy_after_publish:
        description: "Deploy the published exact version to existing VPSes after registration"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  actions: read

concurrency:
  group: host-bundle-release-${{ github.event_name == 'workflow_dispatch' && inputs.channel || github.ref_type == 'tag' && github.ref_name || 'dev' }}
  cancel-in-progress: ${{ github.ref_type != 'tag' && (github.event_name != 'workflow_dispatch' || inputs.channel == 'dev' || inputs.channel == '') }}

jobs:
  dev-bundle-gate:
    name: Dev bundle gate
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decision.outputs.should_build }}
      reason: ${{ steps.decision.outputs.reason }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Decide whether to build
        id: decision
        env:
          SKIP_DEV_BUNDLE_INPUT: ${{ github.event.inputs.skip_dev_bundle || 'false' }}
        run: |
          set -euo pipefail
          scripts/ci/dev-bundle-gate.sh

  ci-gate:
    name: Same-SHA CI gate
    needs: dev-bundle-gate
    if: needs.dev-bundle-gate.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Wait for CI on this commit
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.sha }}
          CI_WORKFLOW_FILE: ci.yml
        run: |
          set -euo pipefail

          deadline=$((SECONDS + 30 * 60))
          while true; do
            if ! runs="$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow "$CI_WORKFLOW_FILE" \
              --commit "$TARGET_SHA" \
              --limit 20 \
              --json databaseId,status,conclusion,url,headSha,workflowName)"; then
              if [ "$SECONDS" -ge "$deadline" ]; then
                echo "Timed out waiting for CI to pass on $TARGET_SHA after repeated GitHub API failures" >&2
                exit 1
              fi
              echo "Could not read CI workflow status for $TARGET_SHA; retrying..."
              sleep 20
              continue
            fi

            success_id="$(printf '%s' "$runs" | jq -r 'map(select(.status == "completed" and .conclusion == "success")) | .[0].databaseId // ""')"
            success_url="$(printf '%s' "$runs" | jq -r 'map(select(.status == "completed" and .conclusion == "success")) | .[0].url // ""')"
            if [ -n "$success_id" ]; then
              if ! run_jobs="$(gh run view "$success_id" \
                --repo "$GITHUB_REPOSITORY" \
                --json jobs)"; then
                if [ "$SECONDS" -ge "$deadline" ]; then
                  echo "Timed out verifying CI jobs for $TARGET_SHA after repeated GitHub API failures" >&2
                  exit 1
                fi
                echo "Could not read CI jobs for $TARGET_SHA; retrying..."
                sleep 20
                continue
              fi

              failed_job="$(printf '%s' "$run_jobs" | jq -r '.jobs | map(select(.conclusion != "success" and .conclusion != "skipped")) | .[0] | if . then "\(.name) (\(.conclusion // "unknown"))" else "" end')"
              if [ -n "$failed_job" ]; then
                echo "CI workflow run passed but a job was not successful for $TARGET_SHA: $failed_job" >&2
                printf '%s\n' "$run_jobs" >&2
                exit 1
              fi

              echo "CI passed for $TARGET_SHA: $success_url"
              exit 0
            fi

            pending_count="$(printf '%s' "$runs" | jq 'map(select(.status != "completed")) | length')"
            failed_url="$(printf '%s' "$runs" | jq -r 'map(select(.status == "completed" and .conclusion != "success")) | .[0].url // ""')"
            if [ "$pending_count" -eq 0 ] && [ -n "$failed_url" ]; then
              echo "All same-SHA CI runs are completed but none succeeded for $TARGET_SHA: $failed_url" >&2
              printf '%s\n' "$runs" >&2
              exit 1
            fi

            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "Timed out waiting for CI to pass on $TARGET_SHA" >&2
              printf '%s\n' "$runs" >&2
              exit 1
            fi

            echo "Waiting for CI to pass on $TARGET_SHA..."
            sleep 20
          done

  build:
    name: Build host bundle
    needs: [dev-bundle-gate, ci-gate]
    if: needs.dev-bundle-gate.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      # In-app auth routes; defaults keep Clerk off the hosted Account Portal.
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${{ vars.NEXT_PUBLIC_CLERK_SIGN_IN_URL || '/sign-in' }}
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${{ vars.NEXT_PUBLIC_CLERK_SIGN_UP_URL || '/sign-up' }}
      NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY || vars.NEXT_PUBLIC_POSTHOG_KEY }}
      NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ secrets.NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN || vars.NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN }}
      NEXT_PUBLIC_POSTHOG_HOST: ${{ vars.NEXT_PUBLIC_POSTHOG_HOST || 'https://eu.posthog.com' }}
      # Relative /relay rides the shell's same-origin PostHog rewrite, so
      # capture calls stay first-party on every user subdomain (ad blockers
      # block *.posthog.com and shared proxy hosts).
      NEXT_PUBLIC_POSTHOG_API_HOST: ${{ vars.NEXT_PUBLIC_POSTHOG_API_HOST || '/relay' }}
      # Optional PostHog source-map upload credentials. When absent, next.config
      # exports the plain config and the build is byte-identical to today.
      # POSTHOG_HOST is the private API host (EU: https://eu.posthog.com), not
      # the eu.i.posthog.com ingestion host used above.
      POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY || '' }}
      POSTHOG_PROJECT_ID: ${{ vars.POSTHOG_PROJECT_ID || '' }}
      POSTHOG_HOST: ${{ vars.POSTHOG_HOST || 'https://eu.posthog.com' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      channel: ${{ steps.channel.outputs.channel }}
      bundle_path: ${{ steps.build.outputs.bundle_path }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: oven-sh/setup-bun@v2

      - uses: erlef/setup-beam@v1
        with:
          otp-version: 28
          elixir-version: 1.19

      - name: Validate public build environment
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}" ]; then
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is required for host bundle releases." >&2
            exit 1
          fi
          if [ "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" = "pk_test_Y2xlcmsuZXhhbXBsZS5jb20k" ]; then
            echo "Refusing to publish a host bundle with the example Clerk publishable key." >&2
            exit 1
          fi

      - name: Generate version
        id: version
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="v$(date -u +%Y.%m.%d)-${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Generated version: $VERSION"

      - name: Resolve release channel
        id: channel
        run: |
          set -euo pipefail
          CHANNEL="${{ inputs.channel || '' }}"
          if [ -z "$CHANNEL" ]; then
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              CHANNEL="canary"
            else
              CHANNEL="dev"
            fi
          fi
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "Resolved channel: $CHANNEL"

      - name: Build host bundle
        id: build
        env:
          HOST_BUNDLE_VERSION: ${{ steps.version.outputs.version }}
          HOST_BUNDLE_CHANNEL: ${{ steps.channel.outputs.channel }}
          MATRIX_BUILD_SHA: ${{ github.sha }}
          MATRIX_BUILD_REF: ${{ github.ref_name }}
          MATRIX_BUILD_DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          set -euo pipefail
          ./scripts/build-host-bundle.sh
          echo "bundle_path=dist/host-bundle/matrix-host-bundle.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: host-bundle
          path: |
            dist/host-bundle/matrix-host-bundle.tar.gz
            dist/host-bundle/matrix-host-bundle.tar.gz.sha256
            dist/host-bundle/incremental-manifest.json
            dist/host-bundle/objects/**
            dist/host-bundle/manifest.json
            dist/host-bundle/release.json
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish to R2
    needs: [dev-bundle-gate, build]
    if: needs.dev-bundle-gate.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_BUNDLES_ACCOUNT_ID || secrets.R2_ACCOUNT_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_BUNDLES_ACCESS_KEY_ID || secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_BUNDLES_SECRET_ACCESS_KEY || secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ vars.R2_BUNDLES_BUCKET || vars.R2_BUCKET || 'matrixos-sync' }}
      R2_ENDPOINT: ${{ vars.R2_BUNDLES_ENDPOINT || vars.R2_ENDPOINT || format('https://{0}.r2.cloudflarestorage.com', secrets.R2_BUNDLES_ACCOUNT_ID || secrets.R2_ACCOUNT_ID) }}
      PLATFORM_PUBLIC_URL: ${{ vars.PLATFORM_PUBLIC_URL || 'https://app.matrix-os.com' }}
      PLATFORM_SECRET: ${{ secrets.PLATFORM_SECRET }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download bundle artifact
        uses: actions/download-artifact@v8
        with:
          name: host-bundle
          path: dist/host-bundle-artifact

      - name: Normalize downloaded bundle artifact
        run: |
          set -euo pipefail
          ARTIFACT_DIR="dist/host-bundle-artifact"
          TARGET_DIR="dist/host-bundle"
          BUNDLE_FILE="$(find "$ARTIFACT_DIR" -type f -name matrix-host-bundle.tar.gz -print -quit)"
          if [ -z "$BUNDLE_FILE" ]; then
            echo "Downloaded host bundle artifact did not contain matrix-host-bundle.tar.gz" >&2
            find "$ARTIFACT_DIR" -maxdepth 4 -type f -print >&2
            exit 1
          fi
          SOURCE_DIR="$(dirname "$BUNDLE_FILE")"
          mkdir -p "$TARGET_DIR"
          for file in matrix-host-bundle.tar.gz matrix-host-bundle.tar.gz.sha256 incremental-manifest.json manifest.json release.json; do
            if [ ! -f "$SOURCE_DIR/$file" ]; then
              echo "Downloaded host bundle artifact is missing $file" >&2
              find "$ARTIFACT_DIR" -maxdepth 4 -type f -print >&2
              exit 1
            fi
            cp "$SOURCE_DIR/$file" "$TARGET_DIR/$file"
          done
          if [ ! -d "$SOURCE_DIR/objects" ]; then
            echo "Downloaded host bundle artifact is missing objects/" >&2
            find "$ARTIFACT_DIR" -maxdepth 4 -type f -print >&2
            exit 1
          fi
          cp -a "$SOURCE_DIR/objects" "$TARGET_DIR/objects"

      - name: Install AWS CLI
        run: |
          set -euo pipefail
          if ! command -v aws &>/dev/null; then
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp
            sudo /tmp/aws/install
          fi

      - name: Resolve severity and changelog
        id: meta
        env:
          PLATFORM_PUBLIC_URL: ${{ vars.PLATFORM_PUBLIC_URL || 'https://app.matrix-os.com' }}
          PUBLISH_CHANNEL: ${{ needs.build.outputs.channel }}
          INPUT_CHANGELOG: ${{ inputs.changelog || '' }}
        run: |
          set -euo pipefail
          # Default to "normal" for push-triggered runs
          SEVERITY="${{ inputs.severity || 'normal' }}"
          CHANGELOG="$INPUT_CHANGELOG"
          if [ -z "$CHANGELOG" ] && [ "$PUBLISH_CHANNEL" = "stable" ]; then
            BASE_SHA="$(curl --fail --silent --show-error --max-time 10 "${PLATFORM_PUBLIC_URL%/}/system-bundles/channels/stable.json" | jq -r '.gitCommit // ""' || true)"
            if [ -n "$BASE_SHA" ] && git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
              CHANGELOG="$(node scripts/release-changelog.mjs --base "$BASE_SHA" --head "$GITHUB_SHA")"
            else
              CHANGELOG="$(node scripts/release-changelog.mjs --head "$GITHUB_SHA")"
            fi
          fi
          echo "severity=$SEVERITY" >> "$GITHUB_OUTPUT"
          DELIMITER="CHANGELOG_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}_${GITHUB_SHA}"
          {
            echo "changelog<<$DELIMITER"
            printf '%s\n' "$CHANGELOG"
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release
        env:
          HOST_BUNDLE_DIST_DIR: dist/host-bundle
          HOST_BUNDLE_CHANNEL: ${{ needs.build.outputs.channel }}
          PUBLISH_VERSION: ${{ needs.build.outputs.version }}
          PUBLISH_SEVERITY: ${{ steps.meta.outputs.severity }}
          PUBLISH_CHANGELOG: ${{ steps.meta.outputs.changelog }}
        run: |
          set -euo pipefail
          ARGS=("$PUBLISH_VERSION")
          if [ -n "$PUBLISH_SEVERITY" ] && [ "$PUBLISH_SEVERITY" != "normal" ]; then
            ARGS+=("--severity" "$PUBLISH_SEVERITY")
          fi
          if [ -n "$PUBLISH_CHANGELOG" ]; then
            ARGS+=("--changelog" "$PUBLISH_CHANGELOG")
          fi

          ./scripts/publish-release.sh "${ARGS[@]}"

  deploy:
    name: Deploy published host bundle
    needs: [dev-bundle-gate, build, publish]
    if: ${{ needs.dev-bundle-gate.outputs.should_build == 'true' && ((github.event_name == 'push' && github.ref_type == 'branch' && github.ref_name == 'main') || inputs.deploy_after_publish) }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PLATFORM_PUBLIC_URL: ${{ vars.PLATFORM_PUBLIC_URL || 'https://app.matrix-os.com' }}
      PLATFORM_SECRET: ${{ secrets.PLATFORM_SECRET }}
    steps:
      - name: Trigger exact-version VPS deploy
        run: |
          set -euo pipefail
          VERSION="${{ needs.build.outputs.version }}"
          if [ -z "${PLATFORM_SECRET:-}" ]; then
            echo "PLATFORM_SECRET is required to deploy published host bundles." >&2
            exit 1
          fi
          echo "Triggering VPS deploy for $VERSION..."
          DEPLOY_RESPONSE="$(curl --fail --silent --show-error --max-time 30 \
            -X POST "${PLATFORM_PUBLIC_URL%/}/vps/deploy" \
            -H "Authorization: Bearer ${PLATFORM_SECRET}" \
            -H "Content-Type: application/json" \
            -d "{\"version\":\"$VERSION\"}")"
          printf '%s\n' "$DEPLOY_RESPONSE" | jq .
          failed="$(printf '%s' "$DEPLOY_RESPONSE" | jq -r '.failed // 0')"
          triggered="$(printf '%s' "$DEPLOY_RESPONSE" | jq -r '.triggered // 0')"
          if [ "$failed" -gt 0 ] || [ "$triggered" -eq 0 ]; then
            echo "Exact-version VPS deploy did not update the fleet cleanly: triggered=$triggered failed=$failed" >&2
            exit 1
          fi
          echo "Deploy triggered successfully: triggered=$triggered failed=$failed"
