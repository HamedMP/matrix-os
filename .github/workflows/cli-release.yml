name: CLI Release

# Publishes only the installable Matrix CLI package (`@finnaai/matrix`),
# standalone CLI binaries, and its matching `cli-v<version>` GitHub release/
# Homebrew formula. Push a `cli-v<version>` tag for the default release path,
# or dispatch manually for recovery.
on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "CLI version to publish (semver, no leading v, e.g. 0.3.1)"
        required: true
        type: string
      update_homebrew:
        description: "Update FinnaAI/homebrew-tap after npm publish"
        required: true
        default: true
        type: boolean
      allow_existing_npm:
        description: "Recovery mode: continue if this version is already on npm"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: cli-release-${{ github.ref_type == 'tag' && github.ref_name || format('cli-v{0}', inputs.version) }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish CLI to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.version }}
      npm_exists: ${{ steps.version.outputs.npm_exists }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2

      - name: Validate version
        id: version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#cli-v}"
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "version '$VERSION' is not valid semver (expected X.Y.Z or X.Y.Z-prerelease)" >&2
            exit 1
          fi

          PACKAGE_VERSION="$(node -p "require('./packages/sync-client/package.json').version")"
          if [ "$PACKAGE_VERSION" != "$VERSION" ]; then
            echo "packages/sync-client/package.json is $PACKAGE_VERSION, expected $VERSION" >&2
            exit 1
          fi

          NPM_EXISTS=false
          if npm view "@finnaai/matrix@$VERSION" version >/dev/null 2>&1; then
            if [ "${{ inputs.allow_existing_npm }}" != "true" ]; then
              echo "@finnaai/matrix@$VERSION already exists on npm" >&2
              exit 1
            fi
            NPM_EXISTS=true
          fi

          if [ "$GITHUB_REF_TYPE" != "tag" ] && git ls-remote --exit-code --tags origin "refs/tags/cli-v${VERSION}" >/dev/null 2>&1; then
            echo "tag cli-v${VERSION} already exists" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "npm_exists=${NPM_EXISTS}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI package
        run: pnpm --filter @finnaai/matrix build

      - name: Test CLI package
        run: pnpm --filter @finnaai/matrix test

      - name: Verify publish shape
        run: pnpm --filter @finnaai/matrix exec node ./scripts/check-publish.mjs

      - name: Verify package runners
        run: pnpm --filter @finnaai/matrix exec node ./scripts/validate-package-runners.mjs

      - name: Pack CLI package
        working-directory: packages/sync-client
        run: npm pack --dry-run

      - name: Publish to npm
        if: ${{ steps.version.outputs.npm_exists != 'true' }}
        working-directory: packages/sync-client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Verify npm publish
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          for _ in $(seq 1 30); do
            if npm view "@finnaai/matrix@$VERSION" version >/dev/null 2>&1; then break; fi
            sleep 10
          done
          npm view "@finnaai/matrix@$VERSION" version
          npm view "@finnaai/matrix@$VERSION" dist.tarball

  build-binaries:
    name: Build standalone binaries
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build standalone CLI binaries
        env:
          MATRIX_CLI_VERSION: ${{ needs.publish.outputs.version }}
        run: pnpm --filter @finnaai/matrix build:binaries

      - name: Upload standalone CLI binaries
        uses: actions/upload-artifact@v7
        with:
          name: cli-binaries
          path: dist/cli-binaries/*
          if-no-files-found: error

  github-release:
    name: Create GitHub release
    needs: [publish, build-binaries]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Download standalone CLI binaries
        uses: actions/download-artifact@v8
        with:
          name: cli-binaries
          path: dist/cli-binaries

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: cli-v${{ needs.publish.outputs.version }}
          name: cli-v${{ needs.publish.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            scripts/install.sh
            dist/cli-binaries/*
          fail_on_unmatched_files: false

  homebrew:
    name: Update Homebrew tap
    needs: [publish, github-release]
    if: ${{ github.event_name == 'push' || inputs.update_homebrew }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          repository: FinnaAI/homebrew-tap
          token: ${{ secrets.TAP_PUSH_TOKEN }}
          path: tap

      - name: Update formula
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          set -euo pipefail
          TARBALL="https://registry.npmjs.org/@finnaai/matrix/-/matrix-${VERSION}.tgz"

          for _ in $(seq 1 30); do
            if curl -fsIL --max-time 15 "$TARBALL" >/dev/null; then break; fi
            sleep 10
          done
          curl -fsIL --max-time 15 "$TARBALL" >/dev/null || {
            echo "npm tarball not available after 5 minutes of polling" >&2
            exit 1
          }

          SHA256="$(curl -fsSL --max-time 60 "$TARBALL" | shasum -a 256 | awk '{print $1}')"
          export TARBALL SHA256

          cd tap
          FORMULA="Formula/matrix.rb"
          if [ ! -f "$FORMULA" ]; then
            echo "formula $FORMULA missing in tap repo; bootstrap it first." >&2
            exit 1
          fi

          python3 - <<'PY'
          import os, re, pathlib
          path = pathlib.Path("Formula/matrix.rb")
          tarball = os.environ["TARBALL"]
          sha = os.environ["SHA256"]
          version = os.environ["VERSION"]
          text = path.read_text()
          text = re.sub(r'url\s+".*"', f'url "{tarball}"', text, count=1)
          text = re.sub(r'sha256\s+".*"', f'sha256 "{sha}"', text, count=1)
          text = re.sub(r'version\s+".*"', f'version "{version}"', text, count=1)
          path.write_text(text)
          PY
          git diff -- Formula/matrix.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FORMULA"
          git commit -m "matrix ${VERSION}"
          git push
