# Platform preview revision per PR (spec 093) -- scaffold
#
# Label a same-repo PR with `preview-platform` to deploy the platform image to
# a DEDICATED preview Cloud Run service as a tagged, zero-traffic revision:
#   https://pr-<N>---<preview-service-url>
#
# Safety model: the preview service (matrix-platform-preview) is a separate
# Cloud Run service running as a dedicated runtime SA
# (matrix-platform-preview-runner) that can only read preview/staging
# secrets: the staging database, preview-generated platform/jwt/edge-router
# secrets, the Clerk keys, the R2 bundles credentials, and Stripe TEST-mode
# secrets (test secret key, test webhook secret, test price IDs). Production
# CLOUD_RUN_SERVICE, its runtime SA, and its secrets are never referenced, and
# only test-mode Stripe keys are mounted -- a preview can never touch live money
# or the production database.
#
# Exposure: the service runs with public ingress (--allow-unauthenticated),
# exactly like the production platform -- the app enforces its own Clerk/JWT
# auth on every route, and the operator API stays gated by the preview
# PLATFORM_SECRET. It is fronted by the browser-reachable host
# https://preview.matrix-os.com so onboarding/billing PRs can be walked end to
# end before merge. Previews are still per-PR tagged, zero-traffic revisions;
# to walk a specific PR, route its tag to the host:
#   gcloud run services update-traffic matrix-platform-preview \
#     --region europe-west3 --to-tags pr-<N>=100
# then reset when done. No Hetzner token is mounted, so previews still cannot
# provision real VPSes (enabling the provisioned hand-off slice is a separate,
# deliberate change -- a preview-scoped Hetzner token plus VPS reaping).
# Config lives in the GitHub "Preview" environment; the jobs no-op with a
# notice when it is absent. Neon branch databases per PR remain deferred
# (spec 093).

name: Preview Platform

on:
  pull_request:
    types: [labeled, synchronize, closed]
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number to deploy a platform preview for"
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: preview-platform-${{ github.event.pull_request.number || inputs.pr }}
  cancel-in-progress: true

jobs:
  preview:
    name: Deploy preview revision
    if: >-
      (github.event_name == 'workflow_dispatch' ||
       (github.event.pull_request.head.repo.full_name == github.repository &&
        github.event.action != 'closed' &&
        ((github.event.action == 'labeled' && github.event.label.name == 'preview-platform') ||
         (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'preview-platform')))))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: Preview
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      ARTIFACT_REPOSITORY: ${{ vars.ARTIFACT_REPOSITORY }}
      CLOUD_RUN_PREVIEW_SERVICE: ${{ vars.CLOUD_RUN_PREVIEW_SERVICE }}
      CLOUD_RUN_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_PREVIEW_SERVICE_ACCOUNT }}
      PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr }}
    steps:
      - name: Check preview configuration
        id: config
        run: |
          set -euo pipefail
          if [ -z "${CLOUD_RUN_PREVIEW_SERVICE:-}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUD_RUN_PREVIEW_SERVICE is not configured; platform previews are disabled. See specs/093-preview-environments/."
            exit 0
          fi
          if [ -z "${CLOUD_RUN_SERVICE_ACCOUNT:-}" ]; then
            echo "CLOUD_RUN_PREVIEW_SERVICE_ACCOUNT must be set in the Preview environment; refusing to fall back to another SA." >&2
            exit 1
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        if: steps.config.outputs.configured == 'true'
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Authenticate to Google Cloud
        if: steps.config.outputs.configured == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Build platform image
        if: steps.config.outputs.configured == 'true'
        run: |
          set -euo pipefail
          head_sha="${{ github.event.pull_request.head.sha || github.sha }}"
          image="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPOSITORY}/matrix-platform:pr-${PR_NUMBER}-${head_sha::12}"
          gcloud builds submit . \
            --project "$GCP_PROJECT_ID" \
            --config cloudbuild.platform.yaml \
            --substitutions "_IMAGE=$image" \
            --quiet
          echo "IMAGE=$image" >> "$GITHUB_ENV"

      - name: Deploy zero-traffic tagged revision to preview service
        if: steps.config.outputs.configured == 'true'
        run: |
          set -euo pipefail
          service_base_url="$(gcloud run services describe "$CLOUD_RUN_PREVIEW_SERVICE" \
            --project "$GCP_PROJECT_ID" --region "$GCP_REGION" --format='value(status.url)')"
          if [ -z "$service_base_url" ]; then
            echo "Preview service URL is unavailable; refusing a shared control-plane fallback." >&2
            exit 1
          fi
          PREVIEW_API_ORIGIN="https://pr-${PR_NUMBER}---${service_base_url#https://}"
          # Browser-reachable preview host (custom domain routed to this service).
          # Origins/redirects and Stripe return URLs resolve to this host.
          PREVIEW_PUBLIC_URL="${PREVIEW_PUBLIC_URL:-https://preview.matrix-os.com}"
          # Derive the bare host so MATRIX_APP_DOMAIN_HOSTS always tracks
          # PREVIEW_PUBLIC_URL (origin/CORS checks must match the real host).
          PREVIEW_DOMAIN="${PREVIEW_PUBLIC_URL#http://}"
          PREVIEW_DOMAIN="${PREVIEW_DOMAIN#https://}"
          PREVIEW_DOMAIN="${PREVIEW_DOMAIN%%/*}"
          gcloud run deploy "$CLOUD_RUN_PREVIEW_SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --image "$IMAGE" \
            --service-account "$CLOUD_RUN_SERVICE_ACCOUNT" \
            --tag "pr-${PR_NUMBER}" \
            --no-traffic \
            --allow-unauthenticated \
            --set-env-vars "PLATFORM_RUNTIME_MODE=cloud_run,PLATFORM_PORT=8080,PLATFORM_PREVIEW=true,CUSTOMER_VPS_ENABLED=true,CUSTOMER_VPS_IMAGE_VERSION=dev,CUSTOMER_VPS_CLOUD_INIT_PATH=distro/customer-vps/cloud-init.yaml,AUTH_SHELL_HOST=127.0.0.1,AUTH_SHELL_PORT=3200,MATRIX_LEGACY_CONTAINER_ROUTING_ENABLED=false,MATRIX_STRIPE_BILLING_ENABLED=true,PLATFORM_PUBLIC_URL=${PREVIEW_PUBLIC_URL},MATRIX_API_ORIGIN=${PREVIEW_API_ORIGIN},MATRIX_APP_URL=${PREVIEW_PUBLIC_URL},MATRIX_APP_DOMAIN_HOSTS=${PREVIEW_DOMAIN}" \
            --set-secrets "PLATFORM_DATABASE_URL=platform-database-url-staging:latest,PLATFORM_SECRET=platform-preview-secret:latest,PLATFORM_JWT_SECRET=platform-preview-jwt-secret:latest,EDGE_ROUTER_SECRET=edge-router-preview-secret:latest,CLERK_SECRET_KEY=clerk-secret-key:latest,NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=next-public-clerk-publishable-key:latest,R2_BUNDLES_ACCOUNT_ID=r2-bundles-account-id:latest,R2_BUNDLES_BUCKET=r2-bundles-bucket:latest,R2_BUNDLES_ENDPOINT=r2-bundles-endpoint:latest,R2_BUNDLES_ACCESS_KEY_ID=r2-bundles-access-key-id:latest,R2_BUNDLES_SECRET_ACCESS_KEY=r2-bundles-secret-access-key:latest,STRIPE_SECRET_KEY=stripe-secret-key-test:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook-secret-test:latest,STRIPE_PRICE_MATRIX_STARTER_MONTHLY=stripe-price-matrix-starter-monthly-test:latest,STRIPE_PRICE_MATRIX_STARTER_ANNUAL=stripe-price-matrix-starter-annual-test:latest,STRIPE_PRICE_MATRIX_BUILDER_MONTHLY=stripe-price-matrix-builder-monthly-test:latest,STRIPE_PRICE_MATRIX_BUILDER_ANNUAL=stripe-price-matrix-builder-annual-test:latest,STRIPE_PRICE_MATRIX_MAX_MONTHLY=stripe-price-matrix-max-monthly-test:latest,STRIPE_PRICE_MATRIX_MAX_ANNUAL=stripe-price-matrix-max-annual-test:latest" \
            --cpu 1 --memory 1Gi --concurrency 10 --timeout 300 --min-instances 0 --max-instances 2 \
            --quiet
          url=""
          revision=""
          for _attempt in {1..10}; do
            desc="$(gcloud run services describe "$CLOUD_RUN_PREVIEW_SERVICE" \
              --project "$GCP_PROJECT_ID" --region "$GCP_REGION" --format json)"
            url="$(jq -r --arg tag "pr-${PR_NUMBER}" \
              '[(.status.traffic // [])[] | select(.tag == $tag) | .url] | first // ""' <<< "$desc")"
            revision="$(jq -r --arg tag "pr-${PR_NUMBER}" \
              '[(.status.traffic // [])[] | select(.tag == $tag) | .revisionName] | first // ""' <<< "$desc")"
            if [ -n "$url" ] && [ -n "$revision" ]; then
              break
            fi
            sleep 3
          done
          if [ -z "$url" ] || [ -z "$revision" ]; then
            echo "PR-tagged preview revision metadata did not become ready." >&2
            exit 1
          fi
          if [ "$url" != "$PREVIEW_API_ORIGIN" ]; then
            echo "Tagged preview URL does not match MATRIX_API_ORIGIN." >&2
            exit 1
          fi
          expected_digest="$(gcloud artifacts docker images describe "$IMAGE" \
            --project "$GCP_PROJECT_ID" --format='value(image_summary.digest)')"
          revision_image="$(gcloud run revisions describe "$revision" \
            --project "$GCP_PROJECT_ID" --region "$GCP_REGION" \
            --format='value(spec.containers[0].image)')"
          expected_digest_image="${IMAGE%:*}@${expected_digest}"
          if [ -z "$expected_digest" ] || { [ "$revision_image" != "$IMAGE" ] && [ "$revision_image" != "$expected_digest_image" ]; }; then
            echo "PR-tagged preview revision does not run the exact built image." >&2
            exit 1
          fi
          curl --fail --silent --show-error --retry 5 --retry-all-errors \
            --connect-timeout 5 --max-time 10 "${PREVIEW_API_ORIGIN}/health" > /dev/null
          echo "PREVIEW_URL=$url" >> "$GITHUB_ENV"
          echo "PREVIEW_PUBLIC_URL=$PREVIEW_PUBLIC_URL" >> "$GITHUB_ENV"
          echo "PREVIEW_API_ORIGIN=$PREVIEW_API_ORIGIN" >> "$GITHUB_ENV"

      - name: Comment preview URL on PR
        if: steps.config.outputs.configured == 'true' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          body="**Platform preview revision deployed**

          - Browser-reachable host: ${PREVIEW_PUBLIC_URL} (route this PR's tag to it: \`gcloud run services update-traffic ${CLOUD_RUN_PREVIEW_SERVICE} --region ${GCP_REGION} --to-tags pr-${PR_NUMBER}=100\`, then reset when done)
          - Desktop control-plane origin: ${PREVIEW_API_ORIGIN}
          - Revision URL: ${PREVIEW_URL}
          - Service: \`${CLOUD_RUN_PREVIEW_SERVICE}\` (deployed zero-traffic, tag \`pr-${PR_NUMBER}\`)

          Runs as the preview runtime SA against the staging database with Stripe TEST-mode keys; production service, SA, database, and live Stripe keys are untouched."
          existing="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --jq '[.[] | select(.body | startswith("**Platform preview revision deployed**"))] | .[0].id // ""')"
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${existing}" -f body="$body" > /dev/null
          else
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" -f body="$body" > /dev/null
          fi

  teardown:
    name: Remove preview revision
    if: >-
      github.event.action == 'closed' &&
      contains(github.event.pull_request.labels.*.name, 'preview-platform')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Preview
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      CLOUD_RUN_PREVIEW_SERVICE: ${{ vars.CLOUD_RUN_PREVIEW_SERVICE }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Check preview configuration
        id: config
        run: |
          set -euo pipefail
          if [ -z "${CLOUD_RUN_PREVIEW_SERVICE:-}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUD_RUN_PREVIEW_SERVICE is not configured; nothing to tear down."
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        if: steps.config.outputs.configured == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Remove tag and delete tagged revisions
        if: steps.config.outputs.configured == 'true'
        run: |
          set -euo pipefail
          revisions="$(gcloud run services describe "$CLOUD_RUN_PREVIEW_SERVICE" \
            --project "$GCP_PROJECT_ID" --region "$GCP_REGION" --format json |
            jq -r --arg tag "pr-${PR_NUMBER}" \
              '[(.status.traffic // [])[] | select(.tag == $tag) | .revisionName] | unique | .[]')"
          if [ -z "$revisions" ]; then
            echo "No revisions tagged pr-${PR_NUMBER}; nothing to tear down."
            exit 0
          fi
          gcloud run services update-traffic "$CLOUD_RUN_PREVIEW_SERVICE" \
            --project "$GCP_PROJECT_ID" --region "$GCP_REGION" \
            --remove-tags "pr-${PR_NUMBER}" --quiet
          for rev in $revisions; do
            gcloud run revisions delete "$rev" \
              --project "$GCP_PROJECT_ID" --region "$GCP_REGION" --quiet
            echo "Deleted revision $rev"
          done
