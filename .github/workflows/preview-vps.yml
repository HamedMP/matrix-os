# Preview VPS per PR (spec 093)
#
# Label a same-repo PR with `preview-vps` to get a disposable Hetzner VPS
# running that PR's host bundle, reachable at app.matrix-os.com/vm/pr-<N>.
#
# Flow:
#   deploy   — on label / push while labeled: build bundle v<date>-pr<N>-<sha7>,
#              publish register-only (--channel none, never promoted),
#              provision pr-<N> if absent, deploy the exact version, comment.
#   teardown — on PR close: delete the pr-<N> VPS.
#   reaper   — daily: delete any pr-* VPS whose PR is closed or older than 72h,
#              so orphans cannot accumulate Hetzner cost.
#
# Centralized logs: enroll once from the ops box with
#   ./scripts/enable-vps-logship.sh pr-<N> preview
# then query with ./scripts/preview-logs.sh --handle pr-<N>.

name: Preview VPS

on:
  pull_request:
    types: [labeled, synchronize, reopened, closed]
  schedule:
    - cron: "23 5 * * *"
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number to deploy a preview VPS for"
        required: true
        type: string
      version:
        description: "Optional existing version pinned to this PR head"
        required: false
        type: string
      verify_inventory:
        description: "Only verify the deployed preview in the authenticated computer inventory"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-vps-${{ github.event.pull_request.number || inputs.pr || 'reaper' }}
  cancel-in-progress: ${{ github.event.action != 'closed' && github.event_name != 'schedule' }}

env:
  PREVIEW_TTL_HOURS: 72

jobs:
  gate:
    name: Gate
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.decide.outputs.action }}
      pr: ${{ steps.decide.outputs.pr }}
      handle: ${{ steps.decide.outputs.handle }}
      head_sha: ${{ steps.decide.outputs.head_sha }}
      head_ref: ${{ steps.decide.outputs.head_ref }}
      requested_version: ${{ steps.decide.outputs.requested_version }}
    steps:
      - name: Decide action
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr }}
          LABELED_NAME: ${{ github.event.label.name }}
          HAS_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'preview-vps') }}
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          EVENT_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          REQUESTED_VERSION: ${{ inputs.version }}
          VERIFY_INVENTORY: ${{ inputs.verify_inventory }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          action="skip"
          if ! printf '%s' "$PR_NUMBER" | grep -Eq '^[0-9]+$'; then
            echo "Invalid PR number" >&2
            exit 1
          fi

          head_sha="$EVENT_HEAD_SHA"
          head_ref="$EVENT_HEAD_REF"
          head_repo="$EVENT_HEAD_REPO"
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            pr_json="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}")"
            head_sha="$(jq -r .head.sha <<< "$pr_json")"
            head_ref="$(jq -r .head.ref <<< "$pr_json")"
            head_repo="$(jq -r .head.repo.full_name <<< "$pr_json")"
          fi
          if [ "$head_repo" != "$GITHUB_REPOSITORY" ]; then
            echo "Fork PRs never get preview VPSes (secrets are not exposed to them anyway)."
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$VERIFY_INVENTORY" = "true" ]; then
              action="verify"
            elif [ -n "$REQUESTED_VERSION" ]; then
              action="deploy_existing"
            else
              action="deploy"
            fi
          elif [ "$EVENT_ACTION" = "closed" ]; then
            if [ "$HAS_LABEL" = "true" ]; then action="teardown"; fi
          elif [ "$EVENT_ACTION" = "labeled" ]; then
            if [ "$LABELED_NAME" = "preview-vps" ]; then action="deploy"; fi
          elif [ "$HAS_LABEL" = "true" ]; then
            action="deploy"
          fi
          if [ "$action" != "skip" ] && ! printf '%s' "$head_sha" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Invalid PR head SHA" >&2
            exit 1
          fi
          if [ "$action" = "deploy_existing" ]; then
            if ! printf '%s' "$REQUESTED_VERSION" |
              grep -Eq "^v[0-9]{4}\\.[0-9]{2}\\.[0-9]{2}-pr${PR_NUMBER}-[0-9a-f]{7}$" ||
              [ "${REQUESTED_VERSION##*-}" != "${head_sha:0:7}" ]; then
              echo "Invalid pinned preview version" >&2
              exit 1
            fi
          fi
          {
            echo "action=$action"
            echo "pr=$PR_NUMBER"
            echo "handle=pr-$PR_NUMBER"
            echo "head_sha=$head_sha"
            echo "head_ref=$head_ref"
            echo "requested_version=$REQUESTED_VERSION"
          } >> "$GITHUB_OUTPUT"
          echo "action=$action pr=$PR_NUMBER"

  build:
    name: Build preview bundle
    needs: gate
    if: needs.gate.outputs.action == 'deploy'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY || vars.NEXT_PUBLIC_POSTHOG_KEY }}
      NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ secrets.NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN || vars.NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN }}
      NEXT_PUBLIC_POSTHOG_HOST: ${{ vars.NEXT_PUBLIC_POSTHOG_HOST || 'https://eu.posthog.com' }}
      NEXT_PUBLIC_POSTHOG_API_HOST: ${{ vars.NEXT_PUBLIC_POSTHOG_API_HOST || '/relay' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.head_sha }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: oven-sh/setup-bun@v2

      - uses: erlef/setup-beam@v1
        with:
          otp-version: 28
          elixir-version: 1.19

      - name: Validate public build environment
        run: |
          set -euo pipefail
          if [ -z "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}" ]; then
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is required." >&2
            exit 1
          fi
          if [ "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" = "pk_test_Y2xlcmsuZXhhbXBsZS5jb20k" ]; then
            echo "Refusing to build a preview bundle with the example Clerk key." >&2
            exit 1
          fi

      - name: Generate preview version
        id: version
        env:
          PR_NUMBER: ${{ needs.gate.outputs.pr }}
          HEAD_SHA: ${{ needs.gate.outputs.head_sha }}
          REQUESTED_VERSION: ${{ needs.gate.outputs.requested_version }}
        run: |
          set -euo pipefail
          VERSION="${REQUESTED_VERSION:-v$(date -u +%Y.%m.%d)-pr${PR_NUMBER}-${HEAD_SHA:0:7}}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Preview version: $VERSION"

      - name: Build host bundle
        env:
          HOST_BUNDLE_VERSION: ${{ steps.version.outputs.version }}
          HOST_BUNDLE_CHANNEL: none
          MATRIX_BUILD_SHA: ${{ needs.gate.outputs.head_sha }}
          MATRIX_BUILD_REF: ${{ needs.gate.outputs.head_ref }}
        run: |
          set -euo pipefail
          ./scripts/build-host-bundle.sh

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: preview-bundle-${{ needs.gate.outputs.pr }}
          path: |
            dist/host-bundle/matrix-host-bundle.tar.gz
            dist/host-bundle/matrix-host-bundle.tar.gz.sha256
            dist/host-bundle/incremental-manifest.json
            dist/host-bundle/objects/**
            dist/host-bundle/manifest.json
            dist/host-bundle/release.json
          if-no-files-found: error
          retention-days: 3

  deploy:
    name: Publish and deploy preview VPS
    needs: [gate, build]
    if: always() && ((needs.gate.outputs.action == 'deploy' && needs.build.result == 'success') || needs.gate.outputs.action == 'deploy_existing')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_BUNDLES_ACCOUNT_ID || secrets.R2_ACCOUNT_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_BUNDLES_ACCESS_KEY_ID || secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_BUNDLES_SECRET_ACCESS_KEY || secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ vars.R2_BUNDLES_BUCKET || vars.R2_BUCKET || 'matrixos-sync' }}
      R2_ENDPOINT: ${{ vars.R2_BUNDLES_ENDPOINT || vars.R2_ENDPOINT || format('https://{0}.r2.cloudflarestorage.com', secrets.R2_BUNDLES_ACCOUNT_ID || secrets.R2_ACCOUNT_ID) }}
      PLATFORM_PUBLIC_URL: ${{ vars.PLATFORM_PUBLIC_URL || 'https://app.matrix-os.com' }}
      PLATFORM_SECRET: ${{ secrets.PLATFORM_SECRET }}
      PREVIEW_CLERK_USER_ID: ${{ secrets.PREVIEW_CLERK_USER_ID }}
      HANDLE: ${{ needs.gate.outputs.handle }}
      VERSION: ${{ needs.gate.outputs.action == 'deploy_existing' && needs.gate.outputs.requested_version || needs.build.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        if: needs.gate.outputs.action == 'deploy'
        with:
          ref: ${{ needs.gate.outputs.head_sha }}

      - name: Download bundle artifact
        if: needs.gate.outputs.action == 'deploy'
        uses: actions/download-artifact@v8
        with:
          name: preview-bundle-${{ needs.gate.outputs.pr }}
          path: dist/host-bundle

      - name: Publish release (register-only, no channel)
        if: needs.gate.outputs.action == 'deploy'
        run: |
          set -euo pipefail
          ./scripts/publish-release.sh "$VERSION" --channel none \
            --changelog "Preview bundle for PR #${{ needs.gate.outputs.pr }}"

      - name: Provision or resume preview VPS
        run: |
          set -euo pipefail
          if [ -z "${PREVIEW_CLERK_USER_ID:-}" ]; then
            echo "PREVIEW_CLERK_USER_ID secret is not configured." >&2
            exit 1
          fi

          fleet_machine="$(curl -fsS --max-time 30 \
            -H "authorization: Bearer ${PLATFORM_SECRET}" \
            "${PLATFORM_PUBLIC_URL}/vps/fleet" |
            jq -c --arg h "$HANDLE" \
              '[.machines[]
                | select(.handle == $h and .status != "deleted")
                | . + { _preview_rank:
                    (if .status == "running" then 0
                     elif .status == "provisioning" then 1
                     elif .status == "failed" then 2
                     else 3 end) }]
               | sort_by(._preview_rank, (if .runtimeSlot == $h then 0 else 1 end), .provisionedAt)
               | (.[0] // {status: "absent", machineId: ""})
               | del(._preview_rank)')"
          status="$(jq -r '.status' <<< "$fleet_machine")"
          accepted_machine_id="$(jq -r '.machineId // ""' <<< "$fleet_machine")"
          echo "Fleet status for ${HANDLE}: ${status}"

          case "$status" in
            provisioning|running)
              if [ -z "$accepted_machine_id" ]; then
                echo "Fleet returned an active preview without a machine ID." >&2
                exit 1
              fi
              echo "Reusing existing ${HANDLE} machine ${accepted_machine_id} (${status})"
              ;;
            absent|failed)
              provision_body="$(jq -cn \
                --arg owner "$PREVIEW_CLERK_USER_ID" \
                --arg handle "$HANDLE" \
                '{clerkUserId: $owner, handle: $handle, runtimeSlot: $handle}')"
              code="$(curl -sS --max-time 60 -o /tmp/provision.json -w '%{http_code}' \
                -X POST "${PLATFORM_PUBLIC_URL}/vps/preview/provision" \
                -H "authorization: Bearer ${PLATFORM_SECRET}" \
                -H "content-type: application/json" \
                --data-binary "$provision_body")"
              if [ "$code" != "202" ]; then
                echo "Preview provision failed with HTTP ${code}." >&2
                exit 1
              fi
              if ! accepted_machine_id="$(jq -er '
                if (
                  type == "object"
                  and (.machineId | type == "string" and test("^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"))
                  and (.status == "provisioning" or .status == "running")
                  and (.etaSeconds | type == "number" and . >= 0)
                ) then .machineId else error("invalid response") end
              ' /tmp/provision.json)"; then
                echo "Preview provision returned an invalid response." >&2
                exit 1
              fi
              ;;
            *)
              echo "Preview ${HANDLE} is in an unsupported state (${status})." >&2
              exit 1
              ;;
          esac

          status="$(curl -fsS --max-time 30 \
            -H "authorization: Bearer ${PLATFORM_SECRET}" \
            "${PLATFORM_PUBLIC_URL}/vps/fleet" |
            jq -r --arg h "$HANDLE" --arg id "$accepted_machine_id" \
              '[.machines[] | select(.handle == $h and .machineId == $id)] | .[0].status // "absent"')"
          echo "Immediate fleet visibility for ${HANDLE}: ${status}"
          if [ "$status" != "provisioning" ] && [ "$status" != "running" ]; then
            echo "Accepted preview machine is not durably visible in the fleet." >&2
            exit 1
          fi

          if [ "$status" = "provisioning" ]; then
            echo "Waiting for the VPS to come up..."
            deadline=$((SECONDS + 600))
            while true; do
              sleep 15
              status="$(curl -fsS --max-time 30 \
                -H "authorization: Bearer ${PLATFORM_SECRET}" \
                "${PLATFORM_PUBLIC_URL}/vps/fleet" |
                jq -r --arg h "$HANDLE" --arg id "$accepted_machine_id" \
                  '[.machines[] | select(.handle == $h and .machineId == $id)] | .[0].status // "absent"')"
              [ "$status" = "running" ] && break
              if [ "$status" = "failed" ]; then
                echo "Provisioning failed for ${HANDLE}" >&2
                exit 1
              fi
              if [ "$SECONDS" -ge "$deadline" ]; then
                echo "Timed out waiting for ${HANDLE} to reach running (last: ${status})" >&2
                exit 1
              fi
              sleep 15
            done
          fi

      - name: Deploy preview bundle to preview VPS
        run: |
          set -euo pipefail
          attempt() {
            curl -sS --max-time 120 -o /tmp/deploy.json -w '%{http_code}' \
              -X POST "${PLATFORM_PUBLIC_URL}/vps/deploy" \
              -H "authorization: Bearer ${PLATFORM_SECRET}" \
              -H "content-type: application/json" \
              -d "{\"version\":\"${VERSION}\",\"handle\":\"${HANDLE}\"}"
          }
          code="$(attempt)"
          if [ "$code" != "200" ]; then
            echo "Deploy returned HTTP ${code}; retrying once in 30s..."
            sleep 30
            code="$(attempt)"
          fi
          if [ "$code" != "200" ]; then
            echo "Deploy failed with HTTP ${code} (body in workflow log)" >&2
            cat /tmp/deploy.json >&2
            exit 1
          fi
          jq . /tmp/deploy.json

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ needs.gate.outputs.pr }}
        run: |
          set -euo pipefail
          body="**Preview VPS deployed**

          - Shell: https://app.matrix-os.com/vm/${HANDLE}
          - Bundle: \`${VERSION}\`
          - Logs (from the ops box): \`./scripts/preview-logs.sh --handle ${HANDLE}\` (enroll first with \`./scripts/enable-vps-logship.sh ${HANDLE} preview\`)

          The VPS is deleted when this PR closes, or by the daily reaper after ${PREVIEW_TTL_HOURS}h."
          existing="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" \
            --jq '[.[] | select(.body | startswith("**Preview VPS deployed**"))] | .[0].id // ""')"
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${existing}" -f body="$body" > /dev/null
          else
             gh api "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" -f body="$body" > /dev/null
           fi

  verify_inventory:
    name: Verify preview computer inventory
    needs: gate
    if: needs.gate.outputs.action == 'verify'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      PREVIEW_CLERK_USER_ID: ${{ secrets.PREVIEW_CLERK_USER_ID }}
      PLATFORM_PUBLIC_URL: ${{ vars.PLATFORM_PUBLIC_URL || 'https://api.matrix-os.com' }}
      APP_PUBLIC_URL: https://app.matrix-os.com
      HANDLE: ${{ needs.gate.outputs.handle }}
    steps:
      - name: Verify authenticated inventory projection
        run: |
          set -euo pipefail
          if [ -z "${CLERK_SECRET_KEY:-}" ] || [ -z "${PREVIEW_CLERK_USER_ID:-}" ]; then
            echo "Preview inventory verification is not configured." >&2
            exit 1
          fi

          task_id=""
          cleanup() {
            if [ -n "$task_id" ]; then
              curl -fsS --max-time 30 -o /dev/null \
                -X POST "https://api.clerk.com/v1/agents/tasks/${task_id}/revoke" \
                -H "authorization: Bearer ${CLERK_SECRET_KEY}" \
                -H "Clerk-API-Version: 2025-11-10" || true
            fi
          }
          trap cleanup EXIT

          redirect_url="${APP_PUBLIC_URL}/runtime"
          task_body="$(jq -cn \
            --arg user_id "$PREVIEW_CLERK_USER_ID" \
            --arg redirect_url "$redirect_url" \
            '{on_behalf_of: {user_id: $user_id}, permissions: "*", agent_name: "matrix-preview-verifier", task_description: "Verify preview computer inventory", redirect_url: $redirect_url, session_max_duration_in_seconds: 300}')"
          task_code="$(curl -sS --max-time 30 -o /tmp/clerk-task.json -w '%{http_code}' \
            -X POST "https://api.clerk.com/v1/agents/tasks" \
            -H "authorization: Bearer ${CLERK_SECRET_KEY}" \
            -H "Clerk-API-Version: 2025-11-10" \
            -H "content-type: application/json" \
            --data-binary "$task_body")"
          case "$task_code" in
            200|201) ;;
            *)
              task_error="$(jq -r '.errors[0].code // "unknown" | select(type == "string" and test("^[a-z0-9_]{1,80}$"))' /tmp/clerk-task.json 2>/dev/null || true)"
              echo "Temporary preview verification task failed with HTTP ${task_code} (${task_error:-unknown})." >&2
              exit 1
              ;;
          esac
          task_id="$(jq -er '.id | select(type == "string" and test("^[A-Za-z0-9_-]{1,128}$"))' /tmp/clerk-task.json)"
          task_url="$(jq -er '.url | select(type == "string" and length <= 4096 and startswith("https://"))' /tmp/clerk-task.json)"
          curl -fsS --max-time 30 --max-redirs 10 -c /tmp/clerk-cookies.txt -b /tmp/clerk-cookies.txt \
            -o /dev/null -L "$task_url"

          inventory_code="$(curl -sS --max-time 30 -o /tmp/computers.json -w '%{http_code}' \
            "${PLATFORM_PUBLIC_URL}/api/auth/computers" \
            -b /tmp/clerk-cookies.txt)"
          if [ "$inventory_code" != "200" ]; then
            echo "Authenticated computer inventory is unavailable." >&2
            exit 1
          fi
          if ! jq -e --arg h "$HANDLE" \
            '[.items[] | select(.handle == $h and .runtimeSlot == $h and .kind == "preview")] | length == 1' \
            /tmp/computers.json > /dev/null; then
            echo "Preview computer is not selectable in the authenticated inventory." >&2
            exit 1
          fi
          echo "Verified ${HANDLE} in the authenticated computer inventory."

  teardown:
    name: Teardown preview VPS
    needs: gate
    if: needs.gate.outputs.action == 'teardown'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PLATFORM_PUBLIC_URL: ${{ vars.PLATFORM_PUBLIC_URL || 'https://app.matrix-os.com' }}
      PLATFORM_SECRET: ${{ secrets.PLATFORM_SECRET }}
      HANDLE: ${{ needs.gate.outputs.handle }}
    steps:
      - name: Delete preview VPS
        run: |
          set -euo pipefail
          machine_id="$(curl -fsS --max-time 30 \
            -H "authorization: Bearer ${PLATFORM_SECRET}" \
            "${PLATFORM_PUBLIC_URL}/vps/fleet" |
            jq -r --arg h "$HANDLE" \
              '[.machines[] | select(.handle == $h and .status != "deleted")] | .[0].machineId // ""')"
          if [ -z "$machine_id" ]; then
            echo "No active VPS for ${HANDLE}; nothing to tear down."
            exit 0
          fi
          code="$(curl -sS --max-time 60 -o /tmp/delete.json -w '%{http_code}' \
            -X DELETE "${PLATFORM_PUBLIC_URL}/vps/${machine_id}" \
            -H "authorization: Bearer ${PLATFORM_SECRET}")"
          if [ "$code" != "200" ]; then
            echo "Delete failed with HTTP ${code} (body in workflow log)" >&2
            cat /tmp/delete.json >&2
            exit 1
          fi
          echo "Deleted ${HANDLE} (${machine_id})"

  reaper:
    name: Reap stale preview VPSes
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PLATFORM_PUBLIC_URL: ${{ vars.PLATFORM_PUBLIC_URL || 'https://app.matrix-os.com' }}
      PLATFORM_SECRET: ${{ secrets.PLATFORM_SECRET }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Delete previews for closed PRs and expired previews
        run: |
          set -euo pipefail
          now="$(date +%s)"
          ttl_secs=$((PREVIEW_TTL_HOURS * 3600))
          lookup_failures=/tmp/reaper-lookup-failures
          delete_failures=/tmp/reaper-delete-failures
          : > "$lookup_failures"
          : > "$delete_failures"
          curl -fsS --max-time 30 \
            -H "authorization: Bearer ${PLATFORM_SECRET}" \
            "${PLATFORM_PUBLIC_URL}/vps/fleet" |
            jq -c '.machines[] | select((.handle | test("^pr-[0-9]+$")) and .status != "deleted")' |
            while IFS= read -r machine; do
              handle="$(jq -r .handle <<< "$machine")"
              machine_id="$(jq -r .machineId <<< "$machine")"
              provisioned="$(jq -r '.provisionedAt // empty' <<< "$machine")"
              pr="${handle#pr-}"
              pr_state="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr}" --jq .state 2>/dev/null || echo unknown)"
              # Fail-safe: never delete on unconfirmed PR state (spec 093).
              if [ "$pr_state" = "unknown" ]; then
                echo "Skipping ${handle}: could not confirm PR #${pr} state" >&2
                echo "$handle" >> "$lookup_failures"
                continue
              fi
              reason=""
              if [ "$pr_state" = "closed" ]; then
                reason="PR #${pr} is closed"
              # failed/provisioning VPSes can have a null provisionedAt; a
              # date crash here would abort the whole sweep under set -e.
              elif provisioned_epoch="$(date -d "$provisioned" +%s 2>/dev/null)" && [ -n "$provisioned" ]; then
                age=$((now - provisioned_epoch))
                if [ "$age" -gt "$ttl_secs" ]; then
                  reason="older than ${PREVIEW_TTL_HOURS}h"
                else
                  echo "Keeping ${handle} (PR ${pr_state}, age $((age / 3600))h)"
                  continue
                fi
              else
                echo "Keeping ${handle} (PR ${pr_state}, no valid provisionedAt; age-based reaping skipped)"
                continue
              fi
              echo "Reaping ${handle}: ${reason}"
              code="$(curl -sS --max-time 60 -o /dev/null -w '%{http_code}' \
                -X DELETE "${PLATFORM_PUBLIC_URL}/vps/${machine_id}" \
                -H "authorization: Bearer ${PLATFORM_SECRET}")"
              if [ "$code" != "200" ]; then
                echo "Failed to delete ${handle} (HTTP ${code})" >&2
                echo "$handle" >> "$delete_failures"
              fi
            done
          failed=0
          if [ -s "$lookup_failures" ]; then
            echo "Reaper could not confirm PR state for: $(tr '\n' ' ' < "$lookup_failures")" >&2
            echo "Those VPSes were skipped (fail-safe)." >&2
            failed=1
          fi
          if [ -s "$delete_failures" ]; then
            echo "Reaper could not delete: $(tr '\n' ' ' < "$delete_failures")" >&2
            failed=1
          fi
          if [ "$failed" -ne 0 ]; then
            echo "Failing the job so skips/failed deletes are visible instead of silently accumulating cost." >&2
            exit 1
          fi
