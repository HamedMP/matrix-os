name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Gate 1: Mechanical checks ──
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # TODO: remove continue-on-error once baseline type errors in kernel are fixed
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check all packages
        run: bun run typecheck

  patterns:
    name: Pattern Scan
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Run CLAUDE.md pattern scanner on changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ./scripts/review/check-patterns.sh --diff origin/${{ github.base_ref }}
          else
            # On push: only scan files changed in this push range.
            # github.event.before is the pre-push tip; on force-push or first
            # push it may be 000... — fall back to HEAD^ in that case.
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              BEFORE="HEAD^"
            fi
            if ! git rev-parse --verify "$BEFORE" >/dev/null 2>&1; then
              BEFORE="HEAD^"
            fi
            ./scripts/review/check-patterns.sh --diff "$BEFORE"
          fi

  # ── Gate 2: Tests ──
  unit:
    name: Unit Tests
    needs: [typecheck, patterns]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Configure git for tests
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@matrix-os.com"

      - run: pnpm install --frozen-lockfile

      - run: bun run test

  e2e:
    name: E2E Tests
    needs: unit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Configure git for tests
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@matrix-os.com"

      - run: pnpm install --frozen-lockfile

      - name: Run E2E tests
        run: bun run test:e2e

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: tests/e2e/
          retention-days: 7
