name: CI

on:
  workflow_dispatch:
  merge_group:
  push:
    branches: [main]
  pull_request:
    branches: [main, "stack/**"]
    types: [labeled, ready_for_review]

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name != 'ready-for-ci' && github.run_id || 'shared' }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect CI-relevant changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      should_run: ${{ steps.changed.outputs.should_run }}
      docs_contract_tests: ${{ steps.changed.outputs.docs_contract_tests }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect source changes
        id: changed
        env:
          PR_ACTION: ${{ github.event.action || '' }}
          PR_LABEL_NAME: ${{ github.event.label.name || '' }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before || '' }}
        run: |
          set -euo pipefail

          # Manual and merge-queue runs must execute CI regardless of changed paths.
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] || [ "$GITHUB_EVENT_NAME" = "merge_group" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "docs_contract_tests=false" >> "$GITHUB_OUTPUT"
            echo "CI relevant changes: true ($GITHUB_EVENT_NAME always runs)"
            exit 0
          fi

          should_run_trigger=true
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            should_run_trigger=false
            if [ "$PR_ACTION" = "ready_for_review" ] || { [ "$PR_ACTION" = "labeled" ] && [ "$PR_LABEL_NAME" = "ready-for-ci" ]; }; then
              should_run_trigger=true
            fi
          fi

          if [ "$should_run_trigger" != "true" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "docs_contract_tests=false" >> "$GITHUB_OUTPUT"
            echo "CI trigger not requested; add the ready-for-ci label, mark the PR ready for review, or run manually."
            exit 0
          fi

          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "$GITHUB_BASE_REF"
            changed_files="$(git diff --name-only "origin/$GITHUB_BASE_REF" "$GITHUB_SHA")"
          else
            zero_sha="0000000000000000000000000000000000000000"
            if [ -n "${GITHUB_EVENT_BEFORE:-}" ] && [ "$GITHUB_EVENT_BEFORE" != "$zero_sha" ] && git cat-file -e "${GITHUB_EVENT_BEFORE}^{commit}" 2>/dev/null; then
              changed_files="$(git diff --name-only "$GITHUB_EVENT_BEFORE" "$GITHUB_SHA")"
            else
              changed_files="$(git show --pretty= --name-only "$GITHUB_SHA")"
            fi
          fi

          should_run=false
          docs_contract_tests=false
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              docs/*|specs/*|*.md) docs_contract_tests=true ;;
              *) should_run=true; docs_contract_tests=false; break ;;
            esac
          done <<EOF
          $changed_files
          EOF

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"
          echo "docs_contract_tests=$docs_contract_tests" >> "$GITHUB_OUTPUT"
          echo "CI relevant changes: $should_run"
          echo "Docs contract tests: $docs_contract_tests"

  # ── Gate 1: Mechanical checks ──
  typecheck:
    name: Type Check
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # TODO: remove continue-on-error once baseline type errors in kernel are fixed
    continue-on-error: true
    steps:
      - name: Skip expensive CI for docs-only changes
        if: needs.changes.outputs.should_run != 'true'
        run: echo "No CI-relevant source changes detected; skipping typecheck."

      - uses: actions/checkout@v6
        if: needs.changes.outputs.should_run == 'true'

      - uses: oven-sh/setup-bun@v2
        if: needs.changes.outputs.should_run == 'true'

      - uses: pnpm/action-setup@v6
        if: needs.changes.outputs.should_run == 'true'

      - uses: actions/setup-node@v6
        if: needs.changes.outputs.should_run == 'true'
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: needs.changes.outputs.should_run == 'true'

      - name: Type check all packages
        if: needs.changes.outputs.should_run == 'true'
        run: bun run typecheck

  shell-production-build:
    name: Shell Production Build
    needs: [changes, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Skip expensive CI for docs-only changes
        if: needs.changes.outputs.should_run != 'true'
        run: echo "No CI-relevant source changes detected; skipping shell production build."

      - uses: actions/checkout@v6
        if: needs.changes.outputs.should_run == 'true'

      - uses: oven-sh/setup-bun@v2
        if: needs.changes.outputs.should_run == 'true'

      - uses: pnpm/action-setup@v6
        if: needs.changes.outputs.should_run == 'true'

      - uses: actions/setup-node@v6
        if: needs.changes.outputs.should_run == 'true'
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: needs.changes.outputs.should_run == 'true'

      - name: Build shell production bundle
        if: needs.changes.outputs.should_run == 'true'
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2ktc2FmZS5leGFtcGxlLmNvbSQ=
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
          NEXT_PUBLIC_POSTHOG_KEY: phc_ci_shell_build
          NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN: phc_ci_shell_build
          NEXT_PUBLIC_POSTHOG_HOST: https://eu.posthog.com
          NEXT_PUBLIC_POSTHOG_API_HOST: /relay
        run: bun run build:shell:production

  patterns:
    name: Pattern Scan
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Skip expensive CI for docs-only changes
        if: needs.changes.outputs.should_run != 'true'
        run: echo "No CI-relevant source changes detected; skipping pattern scan."

      - uses: actions/checkout@v6
        if: needs.changes.outputs.should_run == 'true'
        with:
          fetch-depth: 0

      - name: Install ripgrep
        if: needs.changes.outputs.should_run == 'true'
        run: sudo apt-get install -y ripgrep

      - name: Run CLAUDE.md pattern scanner on changed files
        if: needs.changes.outputs.should_run == 'true'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ./scripts/review/check-patterns.sh --diff origin/${{ github.base_ref }}
          else
            # On push: only scan files changed in this push range.
            # github.event.before is the pre-push tip; on force-push or first
            # push it may be 000... — fall back to HEAD^ in that case.
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              BEFORE="HEAD^"
            fi
            if ! git rev-parse --verify "$BEFORE" >/dev/null 2>&1; then
              BEFORE="HEAD^"
            fi
            ./scripts/review/check-patterns.sh --diff "$BEFORE"
          fi

  react-doctor:
    name: React Doctor
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 6
    # Non-blocking during rollout (matches typecheck baseline). Remove once the
    # React audit baseline is clean, then it gates merges. https://github.com/millionco/react-doctor
    continue-on-error: true
    steps:
      - name: Skip expensive CI for docs-only changes
        if: needs.changes.outputs.should_run != 'true'
        run: echo "No CI-relevant source changes detected; skipping React audit."

      - uses: actions/checkout@v6
        if: needs.changes.outputs.should_run == 'true'
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        if: needs.changes.outputs.should_run == 'true'
        with:
          node-version: 24

      - name: Audit React code (project dirs with changed .tsx/.jsx)
        if: needs.changes.outputs.should_run == 'true'
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "$BASE_REF"
            base="origin/$BASE_REF"
          else
            base="HEAD^"
            git rev-parse --verify "$base" >/dev/null 2>&1 || base="HEAD"
          fi
          mapfile -t react_files < <(git diff --name-only "$base" "$HEAD_SHA" | grep -E '\.(tsx|jsx)$' || true)
          if [ "${#react_files[@]}" -eq 0 ]; then
            echo "No changed React files; skipping react-doctor."
            exit 0
          fi
          # react-doctor scans a project DIRECTORY (needs a React package.json), not files.
          # Map changed React files to their owning project dir and audit each unique one.
          declare -A dirs=()
          for f in "${react_files[@]}"; do
            case "$f" in
              shell/*) dirs["shell"]=1 ;;
              packages/ui/*) dirs["packages/ui"]=1 ;;
              # home/apps/** are mostly root-toolchain (no package.json); audited pre-commit, skipped here.
            esac
          done
          if [ "${#dirs[@]}" -eq 0 ]; then
            echo "Changed React files are not in an audited project dir; skipping."
            exit 0
          fi
          for d in "${!dirs[@]}"; do
            echo "::group::react-doctor $d"
            npx --yes react-doctor@latest "$d" || echo "react-doctor reported findings in $d"
            echo "::endgroup::"
          done

  sync-client:
    name: Sync Client Package
    needs: [changes, patterns]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Skip expensive CI for docs-only changes
        if: needs.changes.outputs.should_run != 'true'
        run: echo "No CI-relevant source changes detected; skipping sync-client checks."

      - uses: actions/checkout@v6
        if: needs.changes.outputs.should_run == 'true'

      - uses: pnpm/action-setup@v6
        if: needs.changes.outputs.should_run == 'true'

      - uses: actions/setup-node@v6
        if: needs.changes.outputs.should_run == 'true'
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: needs.changes.outputs.should_run == 'true'

      - name: Build sync client
        if: needs.changes.outputs.should_run == 'true'
        run: pnpm --filter @finnaai/matrix build

      - name: Test sync client
        if: needs.changes.outputs.should_run == 'true'
        run: pnpm --filter @finnaai/matrix test

      - name: Verify publish shape
        if: needs.changes.outputs.should_run == 'true'
        run: pnpm --filter @finnaai/matrix exec node ./scripts/check-publish.mjs

  # ── Gate 2: Tests ──
  unit:
    name: Unit Tests (${{ matrix.shard }}/4)
    needs: [changes, patterns, sync-client]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Skip expensive CI for docs-only changes
        if: needs.changes.outputs.should_run != 'true'
        run: echo "No CI-relevant source changes detected; skipping unit shard."

      - uses: actions/checkout@v6
        if: needs.changes.outputs.should_run == 'true'

      - uses: oven-sh/setup-bun@v2
        if: needs.changes.outputs.should_run == 'true'

      - uses: pnpm/action-setup@v6
        if: needs.changes.outputs.should_run == 'true'

      - uses: actions/setup-node@v6
        if: needs.changes.outputs.should_run == 'true'
        with:
          node-version: 24
          cache: pnpm

      - name: Configure git for tests
        if: needs.changes.outputs.should_run == 'true'
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@matrix-os.com"

      - run: pnpm install --frozen-lockfile
        if: needs.changes.outputs.should_run == 'true'

      - run: bun run test -- --shard=${{ matrix.shard }}/4
        if: needs.changes.outputs.should_run == 'true'

  docs-contract:
    name: Docs Contract Tests
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Skip docs contract tests
        if: needs.changes.outputs.docs_contract_tests != 'true'
        run: echo "No docs-only changes detected; skipping docs contract tests."

      - uses: actions/checkout@v6
        if: needs.changes.outputs.docs_contract_tests == 'true'

      - uses: pnpm/action-setup@v6
        if: needs.changes.outputs.docs_contract_tests == 'true'

      - uses: actions/setup-node@v6
        if: needs.changes.outputs.docs_contract_tests == 'true'
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: needs.changes.outputs.docs_contract_tests == 'true'

      - name: Run docs contract tests
        if: needs.changes.outputs.docs_contract_tests == 'true'
        run: pnpm exec vitest run tests/repository/site-extraction.test.ts

  e2e:
    name: E2E Tests
    needs: [changes, sync-client, unit]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Skip expensive CI for docs-only changes
        if: needs.changes.outputs.should_run != 'true'
        run: echo "No CI-relevant source changes detected; skipping e2e tests."

      - uses: actions/checkout@v6
        if: needs.changes.outputs.should_run == 'true'

      - uses: oven-sh/setup-bun@v2
        if: needs.changes.outputs.should_run == 'true'

      - uses: pnpm/action-setup@v6
        if: needs.changes.outputs.should_run == 'true'

      - uses: actions/setup-node@v6
        if: needs.changes.outputs.should_run == 'true'
        with:
          node-version: 24
          cache: pnpm

      - name: Configure git for tests
        if: needs.changes.outputs.should_run == 'true'
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@matrix-os.com"

      - run: pnpm install --frozen-lockfile
        if: needs.changes.outputs.should_run == 'true'

      - name: Run E2E tests
        if: needs.changes.outputs.should_run == 'true'
        run: bun run test:e2e

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: tests/e2e/
          retention-days: 7

  ci-results:
    name: CI Results
    needs: [changes, typecheck, shell-production-build, patterns, react-doctor, sync-client, unit, docs-contract, e2e]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Summarize required CI jobs
        env:
          SHOULD_RUN: ${{ needs.changes.outputs.should_run }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          SHELL_PRODUCTION_BUILD_RESULT: ${{ needs.shell-production-build.result }}
          PATTERNS_RESULT: ${{ needs.patterns.result }}
          REACT_DOCTOR_RESULT: ${{ needs.react-doctor.result }}
          SYNC_CLIENT_RESULT: ${{ needs.sync-client.result }}
          UNIT_RESULT: ${{ needs.unit.result }}
          DOCS_CONTRACT_RESULT: ${{ needs.docs-contract.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
        run: |
          set -euo pipefail

          {
            echo "### CI Results"
            echo
            echo "Branch protection should require this aggregate job, not each internal shard."
            echo
            echo "CI relevant source changes: ${SHOULD_RUN:-unknown}"
            echo
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| Detect CI-relevant changes | $CHANGES_RESULT |"
            echo "| Type Check | $TYPECHECK_RESULT |"
            echo "| Shell Production Build | $SHELL_PRODUCTION_BUILD_RESULT |"
            echo "| Pattern Scan | $PATTERNS_RESULT |"
            echo "| React Doctor | $REACT_DOCTOR_RESULT |"
            echo "| Sync Client Package (Node 20) | $SYNC_CLIENT_RESULT |"
            echo "| Unit Tests | $UNIT_RESULT |"
            echo "| Docs Contract Tests | $DOCS_CONTRACT_RESULT |"
            echo "| E2E Tests | $E2E_RESULT |"
          } >> "$GITHUB_STEP_SUMMARY"

          failed=false
          for result in "$CHANGES_RESULT" "$TYPECHECK_RESULT" "$SHELL_PRODUCTION_BUILD_RESULT" "$PATTERNS_RESULT" "$REACT_DOCTOR_RESULT" "$SYNC_CLIENT_RESULT" "$UNIT_RESULT" "$DOCS_CONTRACT_RESULT" "$E2E_RESULT"; do
            case "$result" in
              success|skipped)
                ;;
              *)
                failed=true
                ;;
            esac
          done

          if [ "$failed" = "true" ]; then
            echo "One or more required CI jobs failed or were cancelled." >&2
            exit 1
          fi
