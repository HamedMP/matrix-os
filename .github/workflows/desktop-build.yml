name: Desktop Build

on:
  workflow_call:
    inputs:
      channel:
        description: Desktop update channel.
        required: true
        type: string
      version_suffix:
        description: Optional prerelease suffix appended to desktop/package.json.
        required: false
        type: string
        default: ""
      version:
        description: Exact desktop/package.json version for release builds.
        required: false
        type: string
        default: ""
      artifact_prefix:
        description: Prefix for uploaded artifacts.
        required: true
        type: string
      retention_days:
        description: Artifact retention.
        required: false
        type: number
        default: 14

permissions:
  contents: read

jobs:
  mac:
    name: macOS ${{ matrix.arch }}
    runs-on: macos-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    env:
      MATRIX_DESKTOP_UPDATE_CHANNEL: ${{ inputs.channel }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD || secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare mac signing environment
        shell: bash
        env:
          MAC_CERTIFICATE: ${{ secrets.MATRIX_DESKTOP_MAC_CERTIFICATE || secrets.CSC_LINK }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MATRIX_DESKTOP_MAC_CERTIFICATE_PASSWORD || secrets.CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${MAC_CERTIFICATE:-}" ]; then
            cert_delimiter="MATRIX_DESKTOP_CERT_$(uuidgen | tr '[:lower:]' '[:upper:]' | tr -d '-')"
            password_delimiter="MATRIX_DESKTOP_CERT_PASSWORD_$(uuidgen | tr '[:lower:]' '[:upper:]' | tr -d '-')"
            {
              echo "CSC_LINK<<$cert_delimiter"
              printf '%s\n' "$MAC_CERTIFICATE"
              echo "$cert_delimiter"
              echo "CSC_KEY_PASSWORD<<$password_delimiter"
              printf '%s\n' "${MAC_CERTIFICATE_PASSWORD:-}"
              echo "$password_delimiter"
            } >> "$GITHUB_ENV"
          else
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          fi

      - name: Validate Apple notarization secrets
        shell: bash
        run: |
          set -euo pipefail
          present=0
          missing=0
          for var in APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -n "${!var:-}" ]; then
              present=$((present + 1))
            else
              missing=$((missing + 1))
            fi
          done
          if [ "$present" -gt 0 ] && [ "$missing" -gt 0 ]; then
            echo "APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, and APPLE_TEAM_ID must be set together for notarization." >&2
            exit 1
          fi

      - name: Apply desktop release version
        if: ${{ inputs.version != '' || inputs.version_suffix != '' }}
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          VERSION_SUFFIX: ${{ inputs.version_suffix }}
        run: |
          node --input-type=module -e "import { readFile, writeFile } from 'node:fs/promises'; const p='desktop/package.json'; const j=JSON.parse(await readFile(p,'utf8')); const exact=process.env.RELEASE_VERSION || ''; const suffix=process.env.VERSION_SUFFIX || ''; j.version = exact || (j.version.replace(/-.*/, '') + '-' + suffix); await writeFile(p, JSON.stringify(j, null, 2) + '\n');"

      - name: Build desktop app
        run: pnpm --filter desktop build

      - name: Package desktop app
        working-directory: desktop
        run: pnpm exec electron-builder --config electron-builder.yml --mac --${{ matrix.arch }} --publish never

      - name: Resolve mac artifact metadata
        id: mac_artifact
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./desktop/package.json').version")"
          {
            echo "package_version=$package_version"
            echo "artifact_base=Matrix-OS-${package_version}-mac-${{ matrix.arch }}"
          } >> "$GITHUB_OUTPUT"

      - name: Verify packaged update resources
        shell: bash
        env:
          ARTIFACT_BASE: ${{ steps.mac_artifact.outputs.artifact_base }}
        run: |
          set -euo pipefail
          if [ ! -f desktop/dist/latest-mac.yml ]; then
            echo "Missing macOS update manifest: desktop/dist/latest-mac.yml" >&2
            exit 1
          fi
          if [ ! -f "desktop/dist/${ARTIFACT_BASE}.dmg" ]; then
            echo "Missing macOS DMG artifact: desktop/dist/${ARTIFACT_BASE}.dmg" >&2
            exit 1
          fi
          if [ ! -f "desktop/dist/${ARTIFACT_BASE}.zip" ]; then
            echo "Missing macOS ZIP artifact: desktop/dist/${ARTIFACT_BASE}.zip" >&2
            exit 1
          fi
          if [ ! -f "desktop/dist/${ARTIFACT_BASE}.dmg.blockmap" ]; then
            echo "Missing macOS DMG blockmap: desktop/dist/${ARTIFACT_BASE}.dmg.blockmap" >&2
            exit 1
          fi
          if [ ! -f "desktop/dist/${ARTIFACT_BASE}.zip.blockmap" ]; then
            echo "Missing macOS ZIP blockmap: desktop/dist/${ARTIFACT_BASE}.zip.blockmap" >&2
            exit 1
          fi
          unexpected_artifact="$(
            find desktop/dist -maxdepth 1 -type f \
              \( -name "Matrix-OS-*-mac-*.dmg" -o -name "Matrix-OS-*-mac-*.zip" -o -name "Matrix-OS-*-mac-*.blockmap" \) \
              ! -name "${ARTIFACT_BASE}.dmg" \
              ! -name "${ARTIFACT_BASE}.zip" \
              ! -name "${ARTIFACT_BASE}.dmg.blockmap" \
              ! -name "${ARTIFACT_BASE}.zip.blockmap" \
              -print -quit
          )"
          if [ -n "$unexpected_artifact" ]; then
            echo "macOS ${{ matrix.arch }} build produced unexpected artifact: $unexpected_artifact" >&2
            exit 1
          fi
          if ! find desktop/dist -path "*/Matrix OS.app/Contents/Resources/app-update.yml" -type f -print -quit | grep -q .; then
            echo "Missing packaged macOS app-update.yml" >&2
            exit 1
          fi

      - name: Smoke test macOS DMG mount
        shell: bash
        env:
          ARTIFACT_BASE: ${{ steps.mac_artifact.outputs.artifact_base }}
        run: |
          set -euo pipefail
          dmg_path="desktop/dist/${ARTIFACT_BASE}.dmg"
          mount_dir="$(mktemp -d)"
          copy_dir="$(mktemp -d)"
          cleanup() {
            hdiutil detach "$mount_dir" -quiet || true
            rm -rf "$mount_dir" "$copy_dir"
          }
          trap cleanup EXIT
          hdiutil attach "$dmg_path" -mountpoint "$mount_dir" -nobrowse -readonly
          ditto "$mount_dir/Matrix OS.app" "$copy_dir/Matrix OS.app"
          if [ ! -x "$copy_dir/Matrix OS.app/Contents/MacOS/Matrix OS" ]; then
            echo "Copied macOS app is missing executable entrypoint" >&2
            exit 1
          fi

      - name: Rename mac update manifest for arch
        shell: bash
        env:
          CHANNEL: ${{ inputs.channel }}
        run: |
          set -euo pipefail
          mv desktop/dist/latest-mac.yml "desktop/dist/${{ matrix.arch }}-mac.yml"
          if [ "$CHANNEL" != "stable" ] && [ -f "desktop/dist/${CHANNEL}-mac.yml" ]; then
            mv "desktop/dist/${CHANNEL}-mac.yml" "desktop/dist/${{ matrix.arch }}-${CHANNEL}-mac.yml"
          fi
          find desktop/dist -maxdepth 1 -type f -name '*-mac.yml' \
            ! -name "${{ matrix.arch }}-mac.yml" \
            ! -name "${{ matrix.arch }}-${CHANNEL}-mac.yml" \
            -delete

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_prefix }}-macos-${{ matrix.arch }}
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.blockmap
            desktop/dist/*-mac.yml
          if-no-files-found: error
          retention-days: ${{ inputs.retention_days }}

  linux:
    name: Linux x64
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      MATRIX_DESKTOP_UPDATE_CHANNEL: ${{ inputs.channel }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply desktop release version
        if: ${{ inputs.version != '' || inputs.version_suffix != '' }}
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          VERSION_SUFFIX: ${{ inputs.version_suffix }}
        run: |
          node --input-type=module -e "import { readFile, writeFile } from 'node:fs/promises'; const p='desktop/package.json'; const j=JSON.parse(await readFile(p,'utf8')); const exact=process.env.RELEASE_VERSION || ''; const suffix=process.env.VERSION_SUFFIX || ''; j.version = exact || (j.version.replace(/-.*/, '') + '-' + suffix); await writeFile(p, JSON.stringify(j, null, 2) + '\n');"

      - name: Build desktop app
        run: pnpm --filter desktop build

      - name: Package desktop app
        working-directory: desktop
        run: pnpm exec electron-builder --config electron-builder.yml --linux AppImage --x64 --publish never

      - name: Verify packaged update resources
        shell: bash
        run: |
          set -euo pipefail
          if ! find desktop/dist -maxdepth 1 -type f -name "*.AppImage" -print -quit | grep -q .; then
            echo "Missing Linux AppImage artifact in desktop/dist" >&2
            exit 1
          fi
          if [ ! -f desktop/dist/latest-linux.yml ]; then
            echo "Missing Linux update manifest: desktop/dist/latest-linux.yml" >&2
            exit 1
          fi

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_prefix }}-linux-x64
          path: |
            desktop/dist/*.AppImage
            desktop/dist/*.blockmap
            desktop/dist/*-linux.yml
          if-no-files-found: error
          retention-days: ${{ inputs.retention_days }}
