name: Host Bundle

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "distro/customer-vps/**"
      - "packages/gateway/**"
      - "packages/kernel/**"
      - "packages/sync-client/**"
      - "shell/**"
      - "scripts/build-host-bundle.sh"
      - "scripts/publish-release.sh"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/host-bundle.yml"
  workflow_dispatch:
    inputs:
      imageVersion:
        description: "Host image version key under system-bundles/"
        required: false
        default: "matrix-os-host-dev"
        type: string
      channel:
        description: "Release channel pointer to update"
        required: false
        default: "dev"
        type: choice
        options:
          - stable
          - canary
          - dev
      deploy:
        description: "Trigger fleet deploy after publish"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: host-bundle-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish host bundle
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE_VERSION_INPUT: ${{ inputs.imageVersion || '' }}
      CHANNEL_INPUT: ${{ inputs.channel || '' }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID || vars.R2_ACCOUNT_ID }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT || secrets.S3_ENDPOINT || vars.R2_ENDPOINT || vars.S3_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET || secrets.S3_BUCKET || vars.R2_BUCKET || vars.S3_BUCKET || 'matrixos-sync' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID || secrets.S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY || secrets.S3_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      HOST_BUNDLE_PUBLISHABLE_CLERK_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_Y2xlcmsuZXhhbXBsZS5jb20k' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: oven-sh/setup-bun@v2

      - name: Resolve release metadata
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            image_version="${GITHUB_REF_NAME}"
            channel="${CHANNEL_INPUT:-stable}"
          else
            image_version="${IMAGE_VERSION_INPUT:-matrix-os-host-dev}"
            channel="${CHANNEL_INPUT:-canary}"
          fi
          if ! [[ "$image_version" =~ ^[A-Za-z0-9._-]{1,128}$ ]]; then
            echo "Invalid image version: $image_version" >&2
            exit 1
          fi
          if ! [[ "$channel" =~ ^(stable|canary|dev)$ ]]; then
            echo "Invalid channel: $channel" >&2
            exit 1
          fi
          echo "IMAGE_VERSION=$image_version" >> "$GITHUB_ENV"
          echo "HOST_BUNDLE_VERSION=$image_version" >> "$GITHUB_ENV"
          echo "HOST_BUNDLE_CHANNEL=$channel" >> "$GITHUB_ENV"
          echo "MATRIX_BUILD_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "MATRIX_BUILD_REF=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "MATRIX_BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Validate image version
        run: |
          set -euo pipefail
          if ! [[ "$IMAGE_VERSION" =~ ^[A-Za-z0-9._-]{1,128}$ ]]; then
            echo "Invalid image version: $IMAGE_VERSION" >&2
            exit 1
          fi

      - name: Build host bundle
        run: ./scripts/build-host-bundle.sh

      - name: Publish to R2
        if: ${{ env.HOST_BUNDLE_PUBLISHABLE_CLERK_KEY != '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' && (env.R2_ENDPOINT != '' || env.R2_ACCOUNT_ID != '') }}
        env:
          MATRIX_IMAGE_VERSION: ${{ env.IMAGE_VERSION }}
        run: |
          set -euo pipefail
          VERSION="0.0.0-${GITHUB_SHA::8}"
          ./scripts/publish-release.sh "$VERSION"

      - name: Skip R2 upload when credentials are absent
        if: ${{ env.HOST_BUNDLE_PUBLISHABLE_CLERK_KEY == '' || env.AWS_ACCESS_KEY_ID == '' || env.AWS_SECRET_ACCESS_KEY == '' || (env.R2_ENDPOINT == '' && env.R2_ACCOUNT_ID == '') }}
        run: |
          echo "Publish credentials are not fully configured; built host bundle but skipped publish."

      - name: Deploy to fleet
        if: ${{ inputs.deploy == true }}
        env:
          PLATFORM_URL: ${{ secrets.PLATFORM_URL }}
          PLATFORM_SECRET: ${{ secrets.PLATFORM_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${PLATFORM_URL:-}" ] || [ -z "${PLATFORM_SECRET:-}" ]; then
            echo "PLATFORM_URL or PLATFORM_SECRET not configured — skipping deploy" >&2
            exit 0
          fi
          VERSION="0.0.0-${GITHUB_SHA::8}"
          echo "Triggering fleet deploy for $VERSION..."
          curl --fail --silent --show-error --max-time 30 \
            -H "authorization: Bearer ${PLATFORM_SECRET}" \
            -H "content-type: application/json" \
            -d "{\"version\":\"$VERSION\"}" \
            "${PLATFORM_URL%/}/vps/deploy"
