name: Host Bundle

on:
  push:
    branches:
      - main
    paths:
      - "distro/customer-vps/**"
      - "packages/gateway/**"
      - "packages/kernel/**"
      - "packages/sync-client/**"
      - "shell/**"
      - "scripts/build-host-bundle.sh"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/host-bundle.yml"
  workflow_dispatch:
    inputs:
      imageVersion:
        description: "Host image version key under system-bundles/"
        required: true
        default: "matrix-os-host-dev"
        type: string

permissions:
  contents: read

concurrency:
  group: host-bundle-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish host bundle
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE_VERSION: ${{ inputs.imageVersion || 'matrix-os-host-dev' }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID || vars.R2_ACCOUNT_ID }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT || secrets.S3_ENDPOINT || vars.R2_ENDPOINT || vars.S3_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET || secrets.S3_BUCKET || vars.R2_BUCKET || vars.S3_BUCKET || 'matrixos-sync' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID || secrets.S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY || secrets.S3_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: oven-sh/setup-bun@v2

      - name: Validate image version
        run: |
          set -euo pipefail
          if ! [[ "$IMAGE_VERSION" =~ ^[A-Za-z0-9._-]{1,128}$ ]]; then
            echo "Invalid image version: $IMAGE_VERSION" >&2
            exit 1
          fi

      - name: Build host bundle
        run: ./scripts/build-host-bundle.sh

      - name: Upload to R2
        run: |
          set -euo pipefail
          endpoint="${R2_ENDPOINT:-}"
          if [ -z "$endpoint" ] && [ -n "${R2_ACCOUNT_ID:-}" ]; then
            endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          fi
          if [ -z "$endpoint" ] || [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "R2 credentials are not configured" >&2
            exit 1
          fi
          key="system-bundles/${IMAGE_VERSION}"
          aws --endpoint-url "$endpoint" s3 cp dist/host-bundle/matrix-host-bundle.tar.gz "s3://${R2_BUCKET}/${key}/matrix-host-bundle.tar.gz"
          aws --endpoint-url "$endpoint" s3 cp dist/host-bundle/matrix-host-bundle.tar.gz.sha256 "s3://${R2_BUCKET}/${key}/matrix-host-bundle.tar.gz.sha256"
