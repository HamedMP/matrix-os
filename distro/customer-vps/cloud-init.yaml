#cloud-config
groups:
  - matrix
  - docker

users:
  - name: matrix
    primary_group: matrix
    system: true
    homedir: /home/matrix
    shell: /bin/bash
    groups:
      - docker

write_files:
  - path: /etc/profile.d/matrix-runtime.sh
    owner: root:root
    permissions: "0644"
    content: |
      if [ "$(id -un 2>/dev/null || true)" = "matrix" ]; then
        export MATRIX_HOME="${MATRIX_HOME:-/home/matrix/home}"
        export HOME="$MATRIX_HOME"
        export HERMES_HOME="${HERMES_HOME:-$HOME/.hermes}"
        export XDG_CONFIG_HOME="${XDG_CONFIG_HOME:-$HOME/.config}"
        export XDG_DATA_HOME="${XDG_DATA_HOME:-$HOME/.local/share}"
        export XDG_CACHE_HOME="${XDG_CACHE_HOME:-$HOME/.cache}"
        export PATH="$HOME/.local/bin:/opt/matrix/bin:/opt/matrix/runtime/node/bin:$PATH"
      else
        export PATH="/opt/matrix/bin:/opt/matrix/runtime/node/bin:$PATH"
      fi
      if [ -x /home/linuxbrew/.linuxbrew/bin/brew ]; then
        export HOMEBREW_PREFIX="/home/linuxbrew/.linuxbrew"
        export HOMEBREW_CELLAR="/home/linuxbrew/.linuxbrew/Cellar"
        export HOMEBREW_REPOSITORY="/home/linuxbrew/.linuxbrew/Homebrew"
        export PATH="/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:$PATH"
        export MANPATH="/home/linuxbrew/.linuxbrew/share/man:${MANPATH:-}:"
        export INFOPATH="/home/linuxbrew/.linuxbrew/share/info:${INFOPATH:-}"
      fi
  - path: /opt/matrix/postgres-compose.yml
    owner: root:root
    permissions: "0644"
    content: |
      services:
        postgres:
          image: postgres:16
          restart: unless-stopped
          env_file:
            - /opt/matrix/env/postgres.env
          volumes:
            - matrix-postgres:/var/lib/postgresql/data
          ports:
            - "127.0.0.1:5432:5432"

      volumes:
        matrix-postgres:
  - path: /etc/systemd/system/matrix-restore.service
    owner: root:root
    permissions: "0644"
    content: |
      [Unit]
      Description=Matrix OS customer restore gate
      After=docker.service
      Requires=docker.service

      [Service]
      Type=oneshot
      User=matrix
      Group=matrix
      EnvironmentFile=/opt/matrix/env/host.env
      ExecStart=/opt/matrix/bin/matrix-restore.sh
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
  - path: /etc/systemd/system/matrix-gateway.service
    owner: root:root
    permissions: "0644"
    content: |
      [Unit]
      Description=Matrix OS customer gateway
      After=matrix-restore.service docker.service
      Requires=matrix-restore.service docker.service
      ConditionPathExists=/opt/matrix/restore-complete
      ConditionPathExists=/opt/matrix/bin/matrix-gateway

      [Service]
      User=matrix
      Group=matrix
      EnvironmentFile=/opt/matrix/env/host.env
      Environment=SYMPHONY_PORT=4766
      WorkingDirectory=/opt/matrix
      ExecStart=/opt/matrix/bin/matrix-gateway
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
  - path: /etc/systemd/system/matrix-shell.service
    owner: root:root
    permissions: "0644"
    content: |
      [Unit]
      Description=Matrix OS customer shell
      After=matrix-gateway.service
      Requires=matrix-gateway.service
      ConditionPathExists=/opt/matrix/bin/matrix-shell

      [Service]
      User=matrix
      Group=matrix
      EnvironmentFile=/opt/matrix/env/host.env
      WorkingDirectory=/opt/matrix
      ExecStart=/opt/matrix/bin/matrix-shell
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
  - path: /etc/systemd/system/matrix-code.service
    owner: root:root
    permissions: "0644"
    content: |
      [Unit]
      Description=Matrix OS customer code editor
      After=matrix-restore.service
      Requires=matrix-restore.service
      ConditionPathExists=/opt/matrix/restore-complete
      ConditionPathExists=/opt/matrix/bin/matrix-code

      [Service]
      User=matrix
      Group=matrix
      EnvironmentFile=/opt/matrix/env/host.env
      WorkingDirectory=/opt/matrix
      ExecStart=/opt/matrix/bin/matrix-code
      Restart=on-failure
      RestartSec=5
      TimeoutStartSec=1800

      [Install]
      WantedBy=multi-user.target
  - path: /etc/systemd/system/matrix-code-server.service
    owner: root:root
    permissions: "0644"
    content: |
      [Unit]
      Description=Install Matrix OS code-server runtime
      After=network-online.target matrix-restore.service
      Wants=network-online.target
      Requires=matrix-restore.service
      ConditionPathExists=/opt/matrix/restore-complete
      ConditionPathExists=/opt/matrix/bin/matrix-install-tool-pack
      ConditionPathExists=!/opt/matrix/runtime/code-server/bin/code-server

      [Service]
      Type=oneshot
      User=root
      Group=root
      EnvironmentFile=/opt/matrix/env/host.env
      ExecStart=/opt/matrix/bin/matrix-install-tool-pack code-server
      Restart=on-failure
      RestartSec=10m
      TimeoutStartSec=900

      [Install]
      WantedBy=multi-user.target
  - path: /etc/systemd/system/matrix-sync-agent.service
    owner: root:root
    permissions: "0644"
    content: |
      [Unit]
      Description=Matrix OS customer sync agent
      After=network-online.target
      Wants=network-online.target
      ConditionPathExists=/opt/matrix/bin/matrix-sync-agent

      [Service]
      User=matrix
      Group=matrix
      EnvironmentFile=/opt/matrix/env/host.env
      WorkingDirectory=/opt/matrix
      ExecStart=/opt/matrix/bin/matrix-sync-agent
      Restart=on-failure
      RestartSec=10

      [Install]
      WantedBy=multi-user.target
  - path: /etc/systemd/system/matrix-hermes.service
    owner: root:root
    permissions: "0644"
    content: |
      [Unit]
      Description=Install Matrix OS optional Hermes agent
      After=network-online.target
      Wants=network-online.target
      ConditionPathExists=/opt/matrix/bin/matrix-install-hermes

      [Service]
      Type=oneshot
      User=root
      Group=root
      ExecStart=/opt/matrix/bin/matrix-install-hermes
      ExecStartPost=-/bin/systemctl start matrix-code.service
      Restart=on-failure
      RestartSec=10m
      TimeoutStartSec=1800

      [Install]
      WantedBy=multi-user.target
  - path: /etc/systemd/system/matrix-hermes-dashboard.service
    owner: root:root
    permissions: "0644"
    content: |
      [Unit]
      Description=Matrix OS Hermes dashboard API (loopback)
      After=matrix-hermes.service network-online.target
      Wants=network-online.target
      ConditionPathExists=/opt/matrix/bin/matrix-hermes-dashboard

      [Service]
      User=matrix
      Group=matrix
      EnvironmentFile=/opt/matrix/env/host.env
      WorkingDirectory=/opt/matrix
      ExecStart=/opt/matrix/bin/matrix-hermes-dashboard
      Restart=on-failure
      RestartSec=10

      [Install]
      WantedBy=multi-user.target
  - path: /etc/systemd/system/matrix-linux-tools.service
    owner: root:root
    permissions: "0644"
    content: |
      [Unit]
      Description=Install Matrix OS optional Linux developer tools
      After=network-online.target
      Wants=network-online.target
      ConditionPathExists=/opt/matrix/bin/matrix-install-linux-tools

      [Service]
      Type=oneshot
      User=matrix
      Group=matrix
      Environment=MATRIX_HOME=/home/matrix/home
      Environment=HOME=/home/matrix/home
      Environment=XDG_CONFIG_HOME=/home/matrix/home/.config
      Environment=XDG_DATA_HOME=/home/matrix/home/.local/share
      Environment=XDG_CACHE_HOME=/home/matrix/home/.cache
      ExecStart=/opt/matrix/bin/matrix-install-linux-tools
      Restart=on-failure
      RestartSec=10m
      TimeoutStartSec=1800

      [Install]
      WantedBy=multi-user.target
  - path: /etc/systemd/system/matrix-db-backup.service
    owner: root:root
    permissions: "0644"
    content: |
      [Unit]
      Description=Matrix OS customer database backup
      After=docker.service network-online.target
      Requires=docker.service
      Wants=network-online.target

      [Service]
      Type=oneshot
      User=matrix
      Group=matrix
      EnvironmentFile=/opt/matrix/env/host.env
      EnvironmentFile=/opt/matrix/env/postgres.env
      EnvironmentFile=-/opt/matrix/env/r2.env
      ExecStart=/opt/matrix/bin/matrix-db-backup.sh
      TimeoutStartSec=600
  - path: /etc/systemd/system/matrix-db-backup.timer
    owner: root:root
    permissions: "0644"
    content: |
      [Unit]
      Description=Run Matrix OS customer database backup hourly

      [Timer]
      OnCalendar=hourly
      Persistent=true
      RandomizedDelaySec=5m

      [Install]
      WantedBy=timers.target
  - path: /etc/nginx/sites-available/matrix
    owner: root:root
    permissions: "0644"
    content: |
      server {
        listen 443 ssl http2;
        server_name code.matrix-os.com;

        ssl_certificate /opt/matrix/tls/cert.pem;
        ssl_certificate_key /opt/matrix/tls/key.pem;

        client_max_body_size 10m;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Matrix-Code-Proxy-Token $http_x_matrix_code_proxy_token;

        location / {
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_pass http://127.0.0.1:8787;
        }
      }

      server {
        listen 443 ssl http2 default_server;
        server_name _;

        ssl_certificate /opt/matrix/tls/cert.pem;
        ssl_certificate_key /opt/matrix/tls/key.pem;

        client_max_body_size 10m;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;

        if ($http_x_forwarded_host = "code.matrix-os.com") {
          return 418;
        }
        error_page 418 = @matrix_code_proxy;

        location @matrix_code_proxy {
          proxy_http_version 1.1;
          proxy_set_header Host code.matrix-os.com;
          proxy_set_header X-Forwarded-Host code.matrix-os.com;
          proxy_set_header X-Forwarded-Proto https;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Matrix-Code-Proxy-Token $http_x_matrix_code_proxy_token;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_pass http://127.0.0.1:8787;
        }

        location /api/ {
          proxy_pass http://127.0.0.1:4000;
        }

        location /files/ {
          proxy_pass http://127.0.0.1:4000;
        }

        location /icons/ {
          proxy_pass http://127.0.0.1:4000;
        }

        location /apps/ {
          proxy_pass http://127.0.0.1:4000;
        }

        location /health {
          proxy_pass http://127.0.0.1:4000;
        }

        location /ws {
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_pass http://127.0.0.1:4000;
        }

        location / {
          proxy_pass http://127.0.0.1:3000;
        }
      }
  - path: /opt/matrix/env/host.env
    owner: root:root
    permissions: "0640"
    content: |
      MATRIX_MACHINE_ID={{machineId}}
      MATRIX_CLERK_USER_ID={{clerkUserId}}
      MATRIX_HANDLE={{handle}}
      MATRIX_RUNTIME_SLOT={{runtimeSlot}}
      MATRIX_DEVELOPER_TOOLS='{{developerTools}}'
      MATRIX_IMAGE_VERSION={{imageVersion}}
      MATRIX_UPDATE_CHANNEL={{updateChannel}}
      MATRIX_PLATFORM_REGISTER_URL={{platformRegisterUrl}}
      PLATFORM_INTERNAL_URL={{platformInternalUrl}}
      UPGRADE_TOKEN={{platformVerificationToken}}
      MATRIX_AUTH_TOKEN={{platformVerificationToken}}
      MATRIX_CODE_PROXY_TOKEN={{platformVerificationToken}}
      MATRIX_R2_BUCKET={{r2Bucket}}
      MATRIX_R2_PREFIX={{r2Prefix}}
      MATRIX_HOST_BUNDLE_URL={{hostBundleUrl}}
      POSTHOG_TOKEN={{posthogToken}}
      POSTHOG_PROJECT_TOKEN={{posthogProjectToken}}
      POSTHOG_HOST={{posthogHost}}
      NEXT_PUBLIC_POSTHOG_KEY={{posthogToken}}
      NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN={{posthogProjectToken}}
      NEXT_PUBLIC_POSTHOG_HOST={{posthogPublicHost}}
      NEXT_PUBLIC_POSTHOG_API_HOST={{posthogApiHost}}
      DATABASE_URL=postgresql://matrix:{{postgresPassword}}@127.0.0.1:5432/matrix
  - path: /opt/matrix/env/symphony.env
    owner: root:root
    permissions: "0640"
    content: |
      MATRIX_HANDLE={{handle}}
      PLATFORM_INTERNAL_URL={{platformInternalUrl}}
      UPGRADE_TOKEN={{platformVerificationToken}}
  - path: /opt/matrix/env/r2.env
    owner: root:root
    permissions: "0640"
    content: |
      AWS_ACCESS_KEY_ID='{{r2AccessKeyId}}'
      AWS_SECRET_ACCESS_KEY='{{r2SecretAccessKey}}'
      R2_ENDPOINT='{{r2Endpoint}}'
      R2_ACCOUNT_ID='{{r2AccountId}}'
  - path: /opt/matrix/env/postgres.env
    owner: root:root
    permissions: "0640"
    content: |
      POSTGRES_DB=matrix
      POSTGRES_USER=matrix
      POSTGRES_PASSWORD={{postgresPassword}}
  - path: /opt/matrix/env/registration.env
    owner: root:root
    permissions: "0640"
    content: |
      MATRIX_REGISTRATION_TOKEN={{registrationToken}}

runcmd:
  - |
    set -eu
    apt_get_update() {
      apt-get update \
        -o Acquire::Retries=5 \
        -o Acquire::http::Timeout=20 \
        -o Acquire::https::Timeout=20
    }

    if ! apt_get_update; then
      find /etc/apt -type f \( -name '*.list' -o -name '*.sources' \) -exec sed -i \
          -e 's|https://mirror.hetzner.com/ubuntu/packages|http://archive.ubuntu.com/ubuntu|g' \
          -e 's|https://mirror.hetzner.com/ubuntu/security|http://security.ubuntu.com/ubuntu|g' \
          {} +
      apt_get_update
    fi

    DEBIAN_FRONTEND=noninteractive apt-get install -y software-properties-common
    add-apt-repository -y universe
    apt_get_update

    DEBIAN_FRONTEND=noninteractive apt-get install -y build-essential ca-certificates cmatrix curl docker.io elixir erlang-base erlang-crypto erlang-inets erlang-public-key erlang-ssl erlang-tools file git postgresql-client procps nginx openssl sudo unzip
    native_app_packages="dbus-x11 x11-apps xauth xpra xterm"
    if apt-cache show xpra-html5 >/dev/null 2>&1; then
      native_app_packages="${native_app_packages} xpra-html5"
    fi
    DEBIAN_FRONTEND=noninteractive apt-get install -y ${native_app_packages}
    curl --fail --location --retry 3 --retry-delay 5 --retry-all-errors --connect-timeout 10 --max-time 120 https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip -o /tmp/awscliv2.zip
    unzip -q /tmp/awscliv2.zip -d /tmp
    /tmp/aws/install --bin-dir /usr/local/bin --install-dir /usr/local/aws-cli

    install -d -o root -g matrix -m 0770 /opt/matrix
    install -d -o root -g matrix -m 0750 /opt/matrix/env /opt/matrix/bin /opt/matrix/tls
    install -d -o matrix -g matrix -m 0755 /opt/matrix/messaging /opt/matrix/messaging/bin
    install -d -o matrix -g matrix -m 0755 /home/matrix /home/matrix/home /home/matrix/home/.local /home/matrix/home/.local/bin /home/matrix/home/.local/share /home/matrix/home/.cache /home/matrix/home/.config
    install -d -o matrix -g matrix -m 0755 /home/matrix/home/.config/systemd /home/matrix/home/.config/systemd/user
    install -d -o root -g root -m 0750 /etc/sudoers.d
    printf 'matrix ALL=(ALL) NOPASSWD:ALL\n' >/etc/sudoers.d/matrix
    chmod 0440 /etc/sudoers.d/matrix
    visudo -cf /etc/sudoers.d/matrix
    usermod -d /home/matrix/home matrix
    install -d -o matrix -g matrix -m 0750 /home/matrix/home /home/matrix/home/projects /home/matrix/projects /var/lib/matrix/db/snapshots /var/lib/matrix/logs
    ensure_owner_link() {
      local name="$1" mode="$2" legacy="/home/matrix/$1" target="/home/matrix/home/$1"
      install -d -o matrix -g matrix -m "$mode" "$target"
      if [ -d "$legacy" ] && [ ! -L "$legacy" ]; then
        if cp -an "$legacy/." "$target/"; then
          rm -rf "$legacy"
        else
          echo "matrix-host: failed to migrate $legacy; skipping removal" >&2
        fi
      fi
      if [ ! -e "$legacy" ] || [ -L "$legacy" ]; then
        ln -sfn "$target" "$legacy"
        chown -h matrix:matrix "$legacy"
      else
        echo "matrix-host: $legacy remains a real path; skipping symlink" >&2
      fi
    }
    ensure_owner_link .local 0755
    ensure_owner_link .cache 0755
    ensure_owner_link .config 0755
    ensure_owner_link .hermes 0700
    install -d -o matrix -g matrix -m 0700 /home/matrix/home/.config/gh
    install -d -o matrix -g matrix -m 0700 /home/matrix/home/.ssh
    if [ -d /home/matrix/.ssh ] && [ ! -L /home/matrix/.ssh ]; then
      if cp -an /home/matrix/.ssh/. /home/matrix/home/.ssh/; then
        rm -rf /home/matrix/.ssh
      else
        echo "matrix-host: failed to migrate .ssh; skipping removal" >&2
      fi
    fi
    if [ ! -e /home/matrix/.ssh ] || [ -L /home/matrix/.ssh ]; then
      ln -sfn /home/matrix/home/.ssh /home/matrix/.ssh
      chown -h matrix:matrix /home/matrix/.ssh
    else
      echo "matrix-host: .ssh remains a real directory; skipping symlink" >&2
    fi
    install -d -o root -g root -m 0755 /home/matrixos
    ln -sfn /home/matrix/home /home/matrixos/home
    chown root:matrix /opt/matrix/postgres-compose.yml /opt/matrix/env/host.env /opt/matrix/env/symphony.env /opt/matrix/env/postgres.env /opt/matrix/env/registration.env

    . /opt/matrix/env/host.env
    [ -n "${MATRIX_HOST_BUNDLE_URL:-}" ] || { echo "matrix-host: MATRIX_HOST_BUNDLE_URL is required" >&2; exit 1; }
    curl --fail --location --retry 3 --retry-delay 5 --retry-all-errors --connect-timeout 10 --max-time 900 "$MATRIX_HOST_BUNDLE_URL" -o /tmp/matrix-host.tgz
    curl --fail --location --retry 3 --retry-delay 5 --retry-all-errors --connect-timeout 10 --max-time 30 "${MATRIX_HOST_BUNDLE_URL}.sha256" -o /tmp/matrix-host.tgz.sha256
    expected="$(awk '{print $1}' /tmp/matrix-host.tgz.sha256)"
    actual="$(sha256sum /tmp/matrix-host.tgz | awk '{print $1}')"
    [ "$expected" = "$actual" ] || { echo "matrix-host: bundle sha256 mismatch" >&2; exit 1; }
    tar -xzf /tmp/matrix-host.tgz -C /opt/matrix
    chown -R root:matrix /opt/matrix/bin /opt/matrix/app /opt/matrix/runtime
    chmod -R g+rwX /opt/matrix/app
    if [ -f /opt/matrix/release.json ]; then
      bundle_version="$(sed -n 's/^[[:space:]]*"version"[[:space:]]*:[[:space:]]*"\([^"]\+\)".*/\1/p' /opt/matrix/release.json | head -n 1)"
      if [ -n "$bundle_version" ]; then
        printf '%s\n' "$bundle_version" >/opt/matrix/app/BUNDLE_VERSION
        chown matrix:matrix /opt/matrix/app/BUNDLE_VERSION
      else
        echo "matrix-host: release metadata has no version; leaving BUNDLE_VERSION unchanged" >&2
      fi
    elif [ -f /opt/matrix/app/BUNDLE_VERSION ]; then
      chown matrix:matrix /opt/matrix/app/BUNDLE_VERSION
    else
      echo "matrix-host: release metadata missing; leaving BUNDLE_VERSION absent" >&2
    fi
    if [ -d /opt/matrix/systemd ]; then
      install -d -o root -g root -m 0755 /etc/systemd/system
      install -o root -g root -m 0644 /opt/matrix/systemd/*.service /etc/systemd/system/
    fi
    if [ -f /opt/matrix/release.json ]; then
      chown root:matrix /opt/matrix/release.json
      chmod 0644 /opt/matrix/release.json
    fi
    for required_bin in matrixctl matrix-db-backup.sh matrix-restore.sh matrix-owner-env matrix-gateway matrix-shell matrix-code matrix-sync-agent matrix-symphony matrix-symphony-control matrix-install-hermes; do
      chmod 0750 "/opt/matrix/bin/${required_bin}"
    done
    for optional_bin in matrix-hermes-dashboard matrix-install-linux-tools matrix-install-developer-tools matrix-messaging-health matrix-messaging-backup matrix-messaging-restore; do
      if [ -e "/opt/matrix/bin/${optional_bin}" ]; then
        chmod 0750 "/opt/matrix/bin/${optional_bin}"
      fi
    done
    for cli in node npm npx claude codex opencode pi code-server uv uvx; do
      if [ -x "/opt/matrix/runtime/node/bin/${cli}" ]; then
        ln -sf "/opt/matrix/runtime/node/bin/${cli}" "/usr/local/bin/${cli}"
      fi
    done
    if [ -x /opt/matrix/bin/zellij ]; then
      ln -sf /opt/matrix/bin/zellij /usr/local/bin/zellij
    fi
    openssl req -x509 -newkey rsa:2048 -nodes -days 30 -subj "/CN=customer-vps.matrix-os.local" -keyout /opt/matrix/tls/key.pem -out /opt/matrix/tls/cert.pem
    chown root:matrix /opt/matrix/tls/key.pem /opt/matrix/tls/cert.pem
    chmod 0640 /opt/matrix/tls/key.pem
    rm -f /etc/nginx/sites-enabled/default
    ln -sf /etc/nginx/sites-available/matrix /etc/nginx/sites-enabled/matrix
    nginx -t

    if docker ps --format '{{.Names}}' | grep -qx matrix-postgres; then
      :
    elif docker ps -a --format '{{.Names}}' | grep -qx matrix-postgres; then
      docker start matrix-postgres >/dev/null
    else
      docker volume create matrix-postgres >/dev/null
      docker run -d \
        --name matrix-postgres \
        --restart unless-stopped \
        --env-file /opt/matrix/env/postgres.env \
        -v matrix-postgres:/var/lib/postgresql/data \
        -p 127.0.0.1:5432:5432 \
        postgres:16 >/dev/null
    fi

    systemctl daemon-reload
    loginctl enable-linger matrix
    systemctl start "user@$(id -u matrix).service"
    systemctl enable matrix-restore.service matrix-gateway.service matrix-shell.service matrix-code-server.service matrix-code.service matrix-sync-agent.service matrix-symphony.service matrix-hermes.service matrix-hermes-dashboard.service matrix-linux-tools.service matrix-developer-tools.service matrix-db-backup.timer nginx
    systemctl start matrix-restore.service matrix-gateway.service matrix-shell.service matrix-sync-agent.service matrix-symphony.service
    systemctl start --no-block matrix-code-server.service || echo "matrix-host: code-server runtime install will retry via systemd" >&2
    systemctl start --no-block matrix-code.service || echo "matrix-host: code editor will retry via systemd" >&2
    systemctl start --no-block matrix-hermes.service || echo "matrix-host: optional Hermes install will retry via systemd" >&2
    systemctl start --no-block matrix-hermes-dashboard.service || echo "matrix-host: optional Hermes dashboard will retry via systemd" >&2
    systemctl start --no-block matrix-linux-tools.service || echo "matrix-host: optional Linux tools install will retry via systemd" >&2
    systemctl start --no-block matrix-developer-tools.service || echo "matrix-host: optional developer tools install will retry via systemd" >&2
    if [ -x /opt/matrix/messaging/bin/synapse ] && [ -x /opt/matrix/messaging/bin/mautrix-telegram ] && [ -x /opt/matrix/messaging/bin/mautrix-whatsapp ]; then
      systemctl enable matrix-homeserver.service matrix-bridge-telegram.service matrix-bridge-whatsapp.service
      systemctl start --no-block matrix-homeserver.service matrix-bridge-telegram.service matrix-bridge-whatsapp.service || echo "matrix-host: optional messaging services will retry via systemd" >&2
    else
      echo "matrix-host: messaging runtimes not installed; units installed but not enabled" >&2
    fi
    systemctl restart nginx
    systemctl start matrix-db-backup.timer
