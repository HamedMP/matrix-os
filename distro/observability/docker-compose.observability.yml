# Observability stack overlay
# Usage: docker compose -f distro/docker-compose.platform.yml -f distro/observability/docker-compose.observability.yml up -d

services:
  prometheus:
    image: prom/prometheus:latest
    # Loopback only: no auth on the Prometheus API; reach it via SSH tunnel.
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerting/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: wget -qO- http://localhost:9090/-/healthy || exit 1
      interval: 15s
      timeout: 5s
      start_period: 10s
    restart: unless-stopped
    networks:
      - observability
      - matrixos-net

  loki:
    image: grafana/loki:latest
    # Loopback only: Loki has no auth; local promtail reaches it over the
    # docker network, remote shippers must come through an authenticated edge.
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./observability/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - observability
      - matrixos-net

  grafana:
    image: grafana/grafana:latest
    # Loopback only: public access goes through the cloudflared tunnel
    # (grafana.matrix-os.com -> grafana:3000 on the docker network).
    ports:
      - "127.0.0.1:3200:3000"
    volumes:
      - ./observability/provisioning/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./observability/provisioning/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./observability/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      - GF_SERVER_ROOT_URL=https://grafana.matrix-os.com
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_SNAPSHOTS_EXTERNAL_ENABLED=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
    healthcheck:
      test: curl -sf http://localhost:3000/api/health || exit 1
      interval: 15s
      timeout: 5s
      start_period: 30s
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - observability
      - matrixos-net

  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./observability/promtail.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - observability
      - matrixos-net

volumes:
  prometheus-data:
  loki-data:
  grafana-data:

networks:
  observability:
    name: observability
  matrixos-net:
    external: true
    name: matrixos-net
