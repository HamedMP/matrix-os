# Production multi-tenant platform
# Usage: docker compose -f distro/docker-compose.platform.yml up -d
#
# Prerequisites:
#   - Cloudflare tunnel created: cloudflared tunnel create matrix-os
#   - Credentials at /etc/cloudflared/credentials.json
#   - DNS: CNAME *.matrix-os.com -> <tunnel-id>.cfargotunnel.com
#   - DNS: CNAME api.matrix-os.com -> <tunnel-id>.cfargotunnel.com
#   - DNS: CNAME matrix.matrix-os.com -> <tunnel-id>.cfargotunnel.com
#
# User containers are created dynamically by the platform orchestrator
# via dockerode -- they are NOT defined in this compose file.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=128MB
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: matrixos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-matrixos}
      POSTGRES_DB: matrixos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matrixos"]
      interval: 10s
      timeout: 5s
      start_period: 10s
    networks:
      - matrixos-net

  conduit:
    image: matrixconduit/matrix-conduit:latest
    environment:
      - CONDUIT_SERVER_NAME=matrix-os.com
      - CONDUIT_DATABASE_PATH=/var/lib/matrix-conduit
      - CONDUIT_DATABASE_BACKEND=rocksdb
      - CONDUIT_PORT=6167
      - CONDUIT_ALLOW_REGISTRATION=false
      - CONDUIT_ALLOW_FEDERATION=true
      - CONDUIT_MAX_REQUEST_SIZE=20000000
      - CONDUIT_TRUSTED_SERVERS=["matrix.org"]
    volumes:
      - conduit-data:/var/lib/matrix-conduit
    healthcheck:
      test: wget -qO- http://localhost:6167/_matrix/client/versions || exit 1
      interval: 10s
      timeout: 3s
      start_period: 10s
    restart: unless-stopped
    networks:
      - matrixos-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    volumes:
      - ./cloudflared.yml:/etc/cloudflared/config.yml:ro
      - cloudflared-creds:/etc/cloudflared
    depends_on:
      platform:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - matrixos-net

  platform:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
    entrypoint: ["node", "--import=tsx"]
    command: ["packages/platform/src/main.ts"]
    environment:
      - PLATFORM_PORT=9000
      - PLATFORM_DB_PATH=/data/platform.db
      - PLATFORM_SECRET=${PLATFORM_SECRET}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - POSTGRES_URL=postgresql://matrixos:${POSTGRES_PASSWORD:-matrixos}@postgres:5432
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      - PIPEDREAM_CLIENT_ID=${PIPEDREAM_CLIENT_ID:-}
      - PIPEDREAM_CLIENT_SECRET=${PIPEDREAM_CLIENT_SECRET:-}
      - PIPEDREAM_PROJECT_ID=${PIPEDREAM_PROJECT_ID:-}
      - PIPEDREAM_ENVIRONMENT=${PIPEDREAM_ENVIRONMENT:-development}
      - PIPEDREAM_WEBHOOK_SECRET=${PIPEDREAM_WEBHOOK_SECRET:-}
      - PLATFORM_IMAGE=${PLATFORM_IMAGE:-ghcr.io/hamedmp/matrix-os:latest}
      - AUTH_SHELL_PORT=3200
      - AUTH_SHELL_HOST=auth-shell
    ports:
      - "9000:9000"
    volumes:
      - platform-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - user-data:/data/users
    depends_on:
      postgres:
        condition: service_healthy
      auth-shell:
        condition: service_healthy
    healthcheck:
      test: wget -qO- http://localhost:9000/health || exit 1
      interval: 10s
      timeout: 3s
      start_period: 5s
    restart: unless-stopped
    networks:
      - matrixos-net

  auth-shell:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
    entrypoint: ["node", "node_modules/next/dist/bin/next", "start", "shell", "-p", "3200"]
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_SIGN_IN_URL=/sign-in
      - CLERK_SIGN_UP_URL=/sign-up
      - CLERK_SIGN_IN_FALLBACK_REDIRECT_URL=/
      - CLERK_SIGN_UP_FALLBACK_REDIRECT_URL=/
    healthcheck:
      test: wget -qO- http://localhost:3200/sign-in || exit 1
      interval: 10s
      timeout: 3s
      start_period: 15s
    restart: unless-stopped
    networks:
      - matrixos-net

  proxy:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
    entrypoint: ["node", "--import=tsx"]
    command: ["packages/proxy/src/main.ts"]
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PROXY_PORT=8080
      - PROXY_DB_PATH=/data/proxy.db
    ports:
      - "8080:8080"
    volumes:
      - proxy-data:/data
    healthcheck:
      test: wget -qO- http://localhost:8080/health || exit 1
      interval: 10s
      timeout: 3s
      start_period: 5s
    restart: unless-stopped
    networks:
      - matrixos-net

volumes:
  pgdata:
  cloudflared-creds:
  conduit-data:
  platform-data:
  proxy-data:
  user-data:

networks:
  matrixos-net:
    name: matrixos-net
