<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matrix OS</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --sidebar-width: 64px;
        --sidebar-expanded-width: 200px;
        --tab-bar-height: 36px;
        --bg: #0a0a0a;
        --surface: #141414;
        --border: #262626;
        --text: #e5e5e5;
        --text-secondary: #a3a3a3;
        --accent: #3b82f6;
        --green: #22c55e;
        --yellow: #eab308;
        --red: #ef4444;
      }
      html, body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        font-size: 13px;
        overflow: hidden;
      }
      #app {
        height: 100%;
      }
      #sidebar {
        display: none;
      }
      #main-area {
        height: 100%;
      }
      #tab-bar {
        height: var(--tab-bar-height);
        background: var(--surface);
        display: flex;
        align-items: center;
        padding: 0 8px;
        padding-left: 78px; /* space for macOS traffic lights */
        -webkit-app-region: drag;
        gap: 2px;
        overflow-x: auto;
      }
      #tab-bar > * {
        -webkit-app-region: no-drag;
      }
      #content-area {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="sidebar"></div>
      <div id="main-area">
        <div id="tab-bar"></div>
        <div id="content-area"></div>
      </div>
    </div>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
